body:
  text: 讀書續録卷八明薛瑄撰今天地闔闢之前方其明白時天地間萬物亦如今之所有若天地再闔再闢之後天地間萬物亦與今無異誠以太極有一定之理雖萬闔萬闢而天地萬物不易也因有一定之理故天地萬物常如此程子曰動靜無端隂陽無始天地之闔闢莫測其端倪也生於程朱之後者何幸如之以四書有成説而大道明也程子論禮書至矣孔子射於矍相之圃使子路等執弓矢之類以病人之短不敢信其必然浩然之氣即乾元之氣也朱子言易中器字皆謂有形之實事也性本善反之而惡如水性本下摶激之可使過顙在山亦反水之性也然其就下之性終在故反性為惡而本善常在伊尹曰臣罔以寵利居成功有易道焉程子曰愛情仁性不可以愛為仁然仁是愛之性愛是仁之情程子之意但謂不可以情為性耳而愛之情終自仁之性出故論仁以愛為仁固不可而仁之情實不外乎愛也八索九丘之書在唐虞之前然唐虞三代之書無引其一言者以是知其書之不傳也久矣孔安國乃謂孔子黜之恐不然漢髙帝時臣下無章奏而聞諫即聽至元成哀帝之間章奏愈繁而言不見用此亦可以觀世道矣明道得志使萬物各得其所學者亦不可無此志二帝三王公天下之心萬世可見伊尹在畎畝樂堯舜之道即隱居以求其志及其相湯即行義以逹其道諸葛孔明與昭烈草廬之論及請救孫權之談其素藴可知矣天地生物之心即乾元也其大無方其遠無盡三代之佐格心兼論事後世之佐論事多而格心者少見好仁者無以尚之巍巍乎舜禹之有天下也而不與焉人皆知曹操為漢賊而不知袁紹亦為漢賊未成者觀其與曹操論取天下之䇿及臧洪之事可見列傳稱其善下士過矣知正之所在而固守之弗去為知如知父子之仁長幼之禮君臣之義之類固守而弗去則為知矣由辭以得意讀書之至要無過於是允執厥中朱子謂堯之一言至矣盡矣蓋中者天命之性萬理不外乎中故朱子云然因具於沖漠無朕之中者有無窮之象故見於卦畫者有無窮之數大學出於書如克明峻德作新民之類是也始條理之事有缺則終條理之事不全道無有不到處亦無有間斷處釋氏出家修行是有不到處專務上逹而無下學是有間斷處又焉得為道乎識進則量進性純是天理故有善而無惡心雜乎氣故不能無善惡朱子曰心比理則微有迹比氣則又靈又曰心是氣之精爽程子曰有是心則有是迹王通言心迹之判便是非道以此而觀心迹既不可判則人為善之迹固出於心而為惡之迹亦出於心也明矣聖人雖有心然動以天順理而已復何為哉故程子曰聖人有心而無為因看厯日曰乾元亨利貞之道皆具於此矣經書言性自書始言學亦自書始自古姦雄若曹瞞之徒雖逞欲一時而終遺臭萬世孔子之後知作易之本原者程明道邵康節發明二子之學者朱子也陰精陽氣聚而成物即所謂天地之塞吾其體不使他事勝好學之心則有進朱子詩曰若識無中含有象即無極而太極也惠雖不能周於人而心當常存於厚注焉而不滿其量無窮酌焉而不竭其源無盡朱子本義依吕氏所定經二卷傳十卷古易之次序後儒以本義附今易程傳之次失朱子之意矣解春秋者以己意為聖人之意不知果得聖人之意否至誠無息之體與萬物各得其所之用渾然無間朱子以易有太極即周子所謂無極而太極易所謂是生兩儀即周子所謂太極動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根分陰分陽兩儀立焉易言兩儀生四象即周子所謂水火木金以是而觀則易所言太極之生萬象周子所言太極之生萬物同一理也人之精神即隂精陽氣聚而為物者故與天地之氣流通而無間人晝之所為夜之所夢吉凶善惡各以類應也消息盈虛造化自然之理聖人知之故順之而吉衆人不知故逆之而凶畫前之易沖漠無朕之中萬象森然已具既畫之易即卦即爻一理沖漠無朕朱子論太極曰惟其理有許多故其物亦有許多蓋理有許多者沖漢無朕之中萬象森然已具也故其物亦有許多者皆由理有許多也精義入神是致知明善之事於天下之理知之極其明致用是力行之事於天下之理行之無不至朱子言公私邪正廢興存亡皆原於幾蓋知幾則公正興存不知幾則私邪廢亡心統性之靜氣未用事心正則性亦善心統情之動氣已用事心正則情亦正心有不正則情亦不正矣乾元萬物無時不資始坤元萬物無時不資生動靜無端隂陽無始兩言括盡造化之妙妄念忽然而起然即覺其妄但不能絶於再起此所以為難也廓然而大公者性也物來而順應者情也性者情之體情者性之用此性所以無內外也滿天地間皆是天所賦之命物所受之性但人自不察耳天之蒼蒼其正色邪其遠而無所至極邪其視下也亦若是則已矣此論天之色體俱盡明善是明仁義禮智之性誠身是實性之善無一毫之妄明善是格物致知知性知天之事誠身是誠意正心養性事天修身之事性即理也理即堯舜至於塗人一也故復性則可以入堯舜之道陽之成形者莫大於天隂之成形者莫大於地凡性理字皆聖人所制以明難明之道無聲無臭至矣况可以言語形容之哉性情之外無道滿天地是生物之心滿腔子是惻隱之心劉康公曰民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也周子定之以中正仁義而主靜之定字蓋出於此朱子曰命即理也書曰顧諟天之明命詩曰永言配命孔子五十而知天命子思天命之謂性命皆以理言也孔子曰焉用殺論語二十篇無以殺字論為政者聖人之仁心大矣帝王公以為治霸者公以假名聖人為治推其固有之善及人才有私意即入於權謀術數矣論語一書未有言人之惡者熟讀之可見聖賢之氣象心虛涵萬理易曰由辨之不早辨也朱子曰李光祖云不早辨也直到得郎當了却方辨剗地激成事來此説最好愚按此説凡事皆當謹之於微性與天道內外合一其大無窮讀書續録卷八
