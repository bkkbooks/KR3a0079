body:
  text: 讀書録卷九明薛瑄撰舉天地萬物皆物也天地萬物之理其則也無物不有無時不然此言宜時時深體之無極而太極天地本然之性也隂陽太極氣質之性也天地本然之性就氣質中指出不雜者言之氣質之性即本然之性堕在氣質中者初非二性也雷電風雨參錯交動於下而太虛之本體自若萬事萬變紛紜膠擾於外而吾心之本體自如孟子曰君子深造以道欲其自得之也道者進為之方如學問思辨博文約禮之類是也循此而進潛翫積乆則有自得之妙不循此而進徒事於記誦辭章之末欲求自得之妙難矣書載堯舜之行事皆先德行而後事功事功之大者莫大於用人之一事觀諸二典可見矣有物有則於六十四卦三百八十四爻見之陳仲子亡親戚君臣上下其廉為小節釋氏滅天理人倫以潔其身果何道哉敬之詩曰學有緝熈於光明則成王之學日進於髙明矣感而遂通天下之故者元亨誠之通寂然不動者利貞誠之復元亨利貞亦於人心見之觀敬之詩成王眞得傳心之學者也視箴曰蔽交於前其中則遷所謂蔽者非止謂非禮之色凡見一切可好之物目逐之而動者皆是也讀西銘如見天之大為學第一在變化成質不然只是講說耳西銘自乾父坤母至兄弟顛連而無告者一節皆狀仁之體自于時保之至没吾寜也皆求仁之方余病頭風乆不敢讀書因念克伐怨欲不行可以為難之語原憲之學尚未至於仁况未至於憲之學者可不勉乎聴人之言便識其學之淺深聖人之博博而約以其有此理也衆人之博但務聞見之廣而不察其理之有無此所以異於聖人之博也好為怪異不經之談者不明理也朱子小學一書理與事而已内篇之立教明倫敬身通論言其理也稽古之立教明倫敬身通論實之以事也外篇嘉言之廣立教明倫敬身又以理言也善行實立教明倫敬身又實之以事也然理精也本也事粗也末也本末精粗一以貫之其小學之書乎先儒月映萬川之喻最好喻太極盖萬川總是一月光萬物統體一太極也川川各具一月光物物各具一太極也其統體之太極即各具之一本其各具之太極即全體之萬殊非有二太極也推之於前不見其始引之於後不見其終此所謂動静無端隂陽無始也仁義禮智信五字括盡小學一書亦括盡五經四書人纔動即有差故君子慎動見理明則處事熟如庖丁解牛矣太極中涵隂陽五行男女萬物之理體用一原也隂陽五行男女萬物具太極之理顯微無間也體用一原顯微無間見道器合一之妙周子太極圗畫出理氣示人體用一原顯微無間動靜無端隂陽無始其大無外其小無内非知道者孰能知之周子太極圗說字字貼在圗上朱子解亦然聖人言性與天道惟於賛易極言之耳平日與門人言者極少道以渾淪言之義以條理言之孔門弟子知孔子者不過顔曾二子其次惟子貢庶幾焉張子曰富有者大無外日新者乆無窮其㫖深矣自矜自伐者皆不能克有已之私也大而無外天道之於穆也乆而無窮天道之不已也動靜者隂陽也所以動靜者太極也盖太極有動之理故動而生陽太極有靜之理故靜而生隂天地公共之理人得之為性人能盡其性是亦公共之理耳無可矜伐者故程子曰達理則樂天而不競内充故退讓而不矜在在處處時時刻刻事事物物皆道也須要識得聖人之言如蓍龜曰吉則吉曰凶則凶禮樂只在進反之間盖進而盈溢樂也以反為文退而收歛禮也以進為文惟正足以服人孔子微辭奥義多在繋辭伊川微辭奥義多在易傳徳是得於心行是徳之見於事者如仁義禮智徳也仁形於孝親義形於事君禮形於長㓜智形於夫婦之類皆行也治夷狄之法只當謹守疆場勿使侵軼而已窮治不已必為中國患如秦皇漢武是也二十三四夜深時月初出東方其終魄于東之光比未望載魄之光尤光明者盖初昇之日光尤甚西下之日色故其光明如此舍五經四書與周程張朱之書不讀而讀他書者是猶惡覩泰山而喜丘垤也聖人不怨天不尤人心地多少灑落自在常人纔與人不合即尤人纔不得於天即怨天其心忿忮勞擾無一時之寧泰與聖人之心何啻霄壤必上達乃有知天之妙中庸言知天地之化育是聖人之心與天為一論語言知我者其天乎是天與聖人之心為一學者多以言語觀聖人而不察其天理流行之實有不待言而顯者是以徒得其言而不得其所以言盖能得其所以言則於聖人之言仁便知聖人身上何者是仁言義便知聖人身上何者是義以至聖人凡所言之理皆於聖人身上求其實則天理流行之實有不待言而著者可黙識矣宋儒亦有流於禪者不可不察偶見一伶人於三層卓上頭頂一小童可謂危矣因笑自喻曰此伶此際俱無邪心何也以恐懼之心勝也賤技且然君子學道必常存戒懼之心如處至危之地斯無邪心矣茍安於怠惰放肆則無限之邪心竊從而生矣處事識為先斷次之當大任有一毫私心人必見之人不自知其過者不明也作官常知不能盡其職則過人逺矣處大事不宜大厲聲色付之當然可也以己之欲知人之欲亦由是以己之勞知人之勞亦由是當推以同之省察存養不可毫髮間斷作官一事不可茍朱子曰觀其始合之不正知其終之有敝盖人之相交始合不以正欲其無隙於終者難矣故交在謹始人以説而動未有不失其正者礎潤而天雨霜降而鐘鳴氣類相感也心無妄思言無妄言身無妄動安得有差故有差者皆妄也無妄之義大矣道無待於言而著無非道也識者鮮矣人譽之使無可譽之實不可為之加喜人毁之使無可毁之實不可為之加戚惟篤於自信而已人之自立當斷於心若實見得是當决意為之不可因人言以前却而易其守纔呼即吸纔吸即呼無纎毫之間隂陽消息亦然天人之理一也察於安危寧於禍福謹於去就莫之能害也莊生之言亦可取輕言則人厭故謹言為自修之要靜可以制動大者弗察掇拾小者以為之不知類甚矣人真實有命不可以僥倖易其守心有開時開時見是理無物不有無時不然塞時則不見矣故為學要時時提醒此心勿令昏塞孔子曰死生有命富貴在天是皆一定之理君子知之故行義以俟命小人不知故行險以僥倖為治逺者大者不務而近小是急衆人之見也為政須通經有學術者不學無術雖有小能不達大體所為不過胥吏法律之事爾識量大則毁譽欣戚不足以動其中必能忍人不能忍之觸忤斯能為人不能為之事功人不知而不慍最為難事今人少被人侮慢即有不平之意是誠徳之未至也一念之善景星慶雲一念之惡烈風疾雨恒人不可與言上正猶徐無鬼武侯之對也許魯齋曰世間巧拙俱相伴不許區區智力爭此言宜念劉靖修髙士也百世之下聞其風者莫不為之興起誠足以廉頑立懦側媚小人惟得是務不自知其可賤也劉靖修有鳳凰翔於千仞之氣象未同而與言古人所深恥要當渾厚中有分辨者在乃可真是天理民彛不可冺滅立得脚定却須寛和以處之但當自求所未至者知不知在人我何與焉法者輔治之具當以教化為先習於見聞之乆則事之雖非者亦莫覺其非矣所貴於智者為能别賢否分是非也是非賢否不能辨烏足以言智舉萬物莫能尚其過人逺矣昔周子惟程珦知之宜其生二程為道學之宗也千萬人一人宜其識非常人所及止末作禁游民所以敦財利之源省妄費去冗食所以裕財利之用聖賢惡異端為其陷人心耗財用貽害之大財出於民費用廣則財不足財不足則賦斂重賦斂重則民窮民窮則力竭力竭則本摇矣伍舉曰私欲𢎞侈則徳義鮮少徳義不行則近者騷離逺者違距亦名言也無深逺之慮樂淺近之事者恒人也其何能淑載胥及溺詩之意深逺矣非孟子孰能知之無妄語入誠之門深宜體此與人言宜和氣從容氣忿則不平色厲則取怨民至愚而神不可欺也惟至誠足以動之劉立之謂從明道年乆未嘗見其有暴厲之容宜觀明道之氣象徳冠古今功滿天下皆分内事與人一毫殊不相干何矜伐之有進将有為退必自修君子出處惟此二事記曾㸃之言志獨詳其本末亦見道之大意者與宋鑑取予是非未當者多讀者宜自謹擇顔子為仁之效天下歸仁仲弓為仁之效邦家無怨其大小可見漢初君臣大抵尚詐如躡足封信蕭何賤市民田漢祖詐遊雲夢之類此其為雜霸之治人有以自樂則窮通為一太史公作屈平傳有感而然也太史公作賈誼傳不載治安䟽載弔屈原鵩鳥賦亦有感而然漢法去秦無幾觀武帝時可見天地上下同流是乾道變化萬物各得其所是各正性命為學只要分理欲二字程子言惡亦不可不謂性也此指理在氣中荀子言性惡則專主氣言故有不同孔子因堯舜三代之遺典故得以刪述賛修朱子因濂洛諸儒之遺論故得以折𠂻去取堯舜之道非孔子無以明濂洛之道非朱子無以發周子程子張子之學非得朱子為之發明後世紛紛莫知所定論矣理無形也假象以顯義易卦太極圗皆然使堯舜禹湯文武周孔顔曽思孟周程張子之道昭然明于萬世而異端邪說莫能雜者朱子之功也韓子謂孟子之功不在禹下余亦謂朱子之功不在孟子下氣有消息理無窮盡理無方體無窮盡朱子門人陳北溪論理切實程子曰在物為理處物為義陳北溪曰理是在物當然之理義所以處此理行道而有得於心之謂徳不但動時如此雖静而有得於心即所謂徳黙而存之有得於心非所謂徳乎非禮勿視聽言動便是克己視聽言動之合禮處便是復禮程子曰不仁者無所知覺指知覺為仁則不可竊疑知覺之所以能知覺者由生理之流行而無間也生理是仁知覺是智如人一身生理周流無間是仁有是仁方能知覺痛痒生理不周流則不仁不仁則不知痛痒所謂手足痿痺不仁也仁則滿腔子是惻隠之心故有知覺不仁則此心頑然無知覺矣知覺不可訓仁所以能知覺者仁也體言理用言象體用一源言理而象在其中顯言象微言理顯微無間以象言而理在其中天以一理賦與萬物人得其全物得其偏於全之中又有氣質昬明強弱之不齊惟生知上聖氣得其清於全者無所蔽中人以下則氣質昬濁而全者不能無蔽與物之偏者無異此人有近於物者物於偏之中又有得其一端之明者如雎鳩有别蜂蟻君臣之類此物有近於人者但物之氣質之偏終為所拘不能通乎理之全惟人能變化氣質則有可通之理故張子曰善變之則天地之性存焉氣質之性君子有弗性者焉不知言則無以知人盖知言則理明於人之賢否無遯情如鑑之照物臨川呉氏曰太極無動静故朱子釋太極圗曰太極之有動静是天命之流行也此是為周子分解太極不當言動静以天命有流行故只得以動静言竊謂天命即天道也天道非太極乎天命既有流行太極豈無動静乎朱子曰太極本然之妙也動静所乘之機也是則動静雖属隂陽而所以能動静者實太極為之也使太極無動静則為枯寂無用之物又焉能為造化之樞紐品彚之根柢乎以是而觀則太極能為動静也明矣宋髙宗中興之主陳少陽岳飛皆死于讒佞信用汪黄秦檜之奸邪其不亡者幸而已水火木金土五行雖各具一性却總是一箇太極之理但五行之氣各有所偏故所得不全耳如普照萬物總是一箇日光而得其光者有偏全由物有大小不同而日光則本無不全也朱子所謂五行各一其性而太極渾然之全體無不各具於一物之中而性無不在者此也宋徽宗崇道教真宗啟之也其效可見矣語大天下莫能載萬物統體一太極也語小天下莫能破萬物各具一太極也戰國之時舉世趨利而孟子言仁義是以所如不合性如水水本清被泥沙濁了便濁了也只得謂之水性本善被氣質夾雜惡了便惡了也只得謂之性故程子曰惡亦不可不謂之性者此也人心無一毫私意便與天地萬物之理相合為一聖人教人只是文行忠信未嘗極論髙逺教人言理太髙使人無可依據聖人未嘗輕以理之本原語人也讀書録卷九
