body:
  text: 御製讀薛文清讀書録孔孟既云沒邪説浸倡熾祖龍焚坑之吾道益失墜漢唐千載間孰為傳道器宋氏正學明乃能闢邪詖周程與張朱前後緒相繼卓哉薛文清為學知取棄獨宗五子語可謂得大意茲讀讀書録聿見平生志自云心所開取以相劄記如香象度河步步皆實地淡泊味有餘中庸行多愧所欽道聖賢文章乃餘事欽定四庫全書子部一讀書録儒家類提要臣等謹案讀書録十一卷續録十二卷明薛瑄撰瑄字德溫河津人永樂辛丑進士官至禮部右侍郎入閣預機務贈禮部尚書諡文清事迹具明史本傳其書皆躬行心得之言兩録之首皆有自記言其因程子心有所開不思則塞之語是以自録隨時所得以備屢省其後萬厯中有侯鶴齡者因所記錯雜更為編次刪去重復名讀書全録然去取之間頗失瑄本意今仍録原書以存其舊瑄嘗言樂有雅鄭書亦有之小學四書六經濓洛關閩諸聖賢之書雅也嗜者嘗少以其味之淡也百家小説淫辭綺語怪誕不經之書鄭也莫不喜談而樂道之蓋不待教督而好之矣以其味之甘也淡則人心平而天理存甘則人心迷而人欲肆觀瑄是録可謂不愧所言矣乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
