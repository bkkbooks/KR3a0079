body:
  text: 讀書續録卷九明薛瑄撰人心所具之性即天所賦之命人能常存仁義禮智之性即不咈乎天之所命或有一之未盡即咈乎天命而自絶於天矣天命之流注於人心而為性者其來源源無窮人能常存此性則天命無時不流注而其本無窮矣分正百職各司其事此唐虞三代大公至正之法也後世有內相之稱非相之職行相之事失公正矣唐太宗過鄴祭魏武夫魏武漢賊也祭之過矣胡氏以魏武唐太宗才優於德夫唐太宗雖假仁義猶有及人之德魏武則殘賊生民潛移漢鼎弒伏后及皇子殺害忠良乃天下萬世不道大賊也何德之有胡氏以之與唐太宗並稱恐非至論處大事貴乎明而能斷不明固無以知事之當斷然明而不斷亦不免於後艱矣中庸言明善不言明性善即性也言善則性在其中言性則善在其中善性無二理也逝者如斯夫不舍晝夜即元亨利貞之理濂溪先生在當時知之者少故從遊者不多惟程珦知之使二子從學遂明斯道之傳是則周子從遊者雖少反勝於從遊者之多也人之一呼一吸之息不停即天地之化不停也朱子言人心最靈而有以通貫乎性命之全體心性命一理也性即理也滿天地間皆性也朱子本義依古易次序自為一書不與程傳雜最可見象占卜筮教人之本意後儒摘以附程傳之次失朱子之意矣費隱是顯微無間朱子本義簡切明白深得聖人作易之意雜慮少則漸近道古聖賢多言私欲為人性之蔽至張子程子皆論氣質之性則知為人性之蔽不獨私欲而亦拘於氣質故朱子論人性之蔽必兼私欲氣質言之朱子曰明命赫然罔有內外是性無內外也性情之德具於人心此道不可須臾離也由經以求道由辭以得意程子教人切要之言程朱之書吾寤寐敬畏之不敢慢也漢馬融絳帳女樂為權姦作奏害忠良得罪名教大矣猶配饗孔子廟廡謂宜黜罷之可也語之而不惰者子獨稱顔子則其餘聞夫子之言而惰者亦恐多矣人心即食色之性道心即天命之性聖人立法皆修道之謂教非於道之外強立法制也若雜霸立法則非修道之教矣自得之全在因書之辭以得其意得其辭不得其意程子所謂糟粕耳程子有曰帝王以道治天下者蓋自天德推之巨道也其曰後世只是以智力把持天下者則無天德以行王道但用智力之私以防制之耳漢詔多引咎責躬恤民之意最為近古為人須做徹表徹裏一般人自孔子後知易者周子程子邵子朱子也堯命舜慎徽五典舜命契敬敷五教臯陶言勑我五典湯肇修人紀武王重民五教五典五教人紀天理人倫道莫出乎是朱子至精至粹之言己見於四書集注章句及易本義詩傳中其文集語類之屬所載者或有非定論者讀者擇焉可也聖人之德莫大於孝故書首稱舜克諧以孝孟子書首言利之害千萬世人之失皆由於此老吾老以及人之老幼吾幼以及人之幼聖人之仁政皆自此推之道從天出是有本之學文章俗學所以淺者由不知大本大原自天出而賦於人物故雖博極羣書識逹古今馳騁文章建立事功終為無本原而淺故君子貴乎知道知性知天則理無不明矣惟天之一字足以包括萬理聖人所以為聖人無一毫之不實處程子論邵子為人直是無禮不恭恐與聖人之學異水為摶激之可使過顙在山而就下之性常在性為氣質物欲拘蔽為惡而善之性常在孔子稱孟之反不伐如漢丙吉深厚不伐善恐孟之反不能過也天地之一陰一陽一闔一闢一晝一夜一寒一暑一㿩一雨人之一動一靜一語一默一作一止一寤一寐一呼一吸皆易道也孟子董子韓子論王道與霸術誠偽貴賤不同司馬氏言王霸無異道胡氏論之明矣盛衰皆隂陽之變萬古如此不明善而行者冥行也乾健不息故運而成晝夜成四時成古今故曰但謂之乾而無所不包矣易非邵子羲晝不明非程子周經不明非朱子本義不明三君子大有功於易者也四書經文集注為聖為賢皆由此入惟讀者真知實得乃有其效耳率性而行即孟子所謂大智也天者萬物之祖無一物一理不出於天周程之學非朱子無以發四時行百物生即逝者如斯夫不舍晝夜之意天理發見流行之實不但四時行百物生而已如雨露霜雪風霆鬼神星辰雲物山峙川流凡有形有色有動有息者皆天理發見流行之實也周子之學得於易者多發明大學語孟中庸者少然其理則同也克己復禮為仁則盡性矣維天之命於穆不已忠也道之體也萬殊之所以一本也乾道變化各正性命恕也道之用也一本之所以萬殊也中也者天下之大本也道之體也萬殊之所以一本也和也者天下之逹道也道之用也一本之所以萬殊也大德敦化者道之體也萬殊之所以一本也小德川流者道之用也一本之所以萬殊也萬物統體一太極者道之體也萬殊之所以一本也萬物各具一太極者道之用也一本之所以萬殊也大哉乾元萬物資始誠之源也道之體也萬殊之所以一本也乾道變化各正性命誠斯立焉道之用也一本之所以萬殊也然凡言體用不可分而為二史雖紀事然事皆有理即事而窮其理亦致知格物之一端也明善即是知性克伐怨欲不行心尚為四者之纍而不虛必四者淨盡則心虛而仁全矣漢唐宋之君未聞有知道者所以治效止於如此聖人不輕許人以仁蓋専言之仁則包四德仁則四德全而盡性矣故不輕許人以仁也孟子曰道一而已矣朱子注曰古今聖愚本同一性是則自堯舜至於塗人同一性也如書言俊德玄德迪德大德一德敬德以至言道心言中言降衷言天之明命之類雖所主有殊而莫非性之理也故自堯舜禹湯文武周公孔子顔曾思孟相傳之道又豈外於性哉所謂道一而已矣者於是可見復則吉迷復凶古之亡國之君敗家之子皆迷復者也復而無妄聖人矣道體無內外無古今必君臣同德乃可有為仁義禮智之性日用無時無處不發見但人自不察耳論性不論氣不備言孟子論性善固得性之本原然不論氣則不知有清濁昏明之異故未備論氣不論性不明言告子以知覺運動之氣為性而不知性之善故不明論性不論氣此氣字指氣質之性而言論氣不論性此氣字指告子以知覺運動之氣而言蓋告子論氣亦不知有清濁昏明氣質之性也二之則不是言性不離氣氣不離性分性氣為二則不是讀書續録卷九
