body:
  text: 讀書續録卷七明薛瑄撰通天地萬物之理皆善也人胡不為善用之則行最難自聖人以下雖大賢用之未免有過不及處聖人見幾明决未有至於事幾之難處者色斯舉矣翔而後集可以人而不如鳥乎天理人事精粗無二致故下學人事即所以上逹天理也大哉乾元元者性善之源也千載之下得易之本義者朱子一人而已孟子言性善擴前聖之未發程子性即理也與張子皆論氣質之性又擴孟子之未發至朱子會萃張程之論性至矣大哉乾元萬物資始乃統天道莫大乎是孟子之後道不明只是性之一字不明朱子論專言偏言之仁皆本於程子四德之元猶五常之仁偏言則一事專言則包四者之語其論性命皆本於程子天所賦為命物所受為性之語其論本然之性皆本於程子性即理也之語其論氣質之性皆本於程張論氣質之性如論致知格物之類皆本於程子居處恭即吾心之天對越在天之天如顧諟天之明命畏天命尊德性皆是恭之實雖明善而反諸身不誠終未有得也程子曰性即理也發明性善無餘藴矣性無聲臭不可以物形容之理無形只是事物所當然已然者朱子之後諸儒有失朱子之本義者至魯齊許氏尊朱子之學至矣忠信所以進德修辭立其誠所以居業業之存於心者為德德之見於事者為業如仁義禮智是德行仁義禮智之德見於人倫事物之實為業德業非有二也漢文帝即位之後除收孥相坐律却貢獻定賑窮養老之令除誹謗妖言律以至免租之類皆仁政之大端也三代以下誠為賢君孟子言左右逄其源即自得之者理即在氣中不可脫去氣而言理仁者天地生物之心人之所得以為心即專言仁則包四德隂精陽氣聚而為物神之伸也即人之始而生魂游魄降散而為變鬼之屈也即人之終而死此所謂人者鬼神之會也與用之則行最難所以孔子言行義以逹其道未見其人也仰之彌髙鑽之彌堅瞻之在前忽焉在後此言性也性無窮盡無方體朱子謂之道道即性也但當循理不可使氣非知周乎萬物者不能辨天下之惑繼之者善性之原也成之者性善之在人者也動靜者隂陽也所以動靜者道也中庸惟聖人能之所謂惟天下至誠為能盡其性鬼神之屈伸伸之極為屈屈則伸之氣已往而遂盡其屈而復伸者乃方生之氣非藉夫已屈之氣復為方伸之氣也程子曰不必將既屈之氣復為方伸之氣生生之理自然不息朱子亦曰往者過來者續見到至處人或可及行到至處人鮮能及也明本然之性氣質之性與喜怒哀樂未發已發之性情了然無疑此本領之學也古之學者為已顔曽之徒是也中庸不可能者以天命人心之理極其至也博學而詳說之將以反說約也約乃理之統會一原上天之載無聲無臭至矣為學能使理勝氣則可以變化氣質之性而反天地之性若氣勝理則不能矣雖盡明五經四書之理而反諸身不誠猶未有得也有人談道理浩博無窮至其心則無實得處故其行事與所談者無一句相合即程子譏韓持國如談禪者是也程子之門人論未發之中無致知格物皆失程子本意至朱子發明至矣朱子大本原皆得程子之學就氣質中指出仁義禮智不雜氣質而言謂之天地之性以仁義禮智雜氣質而言故謂氣質之性非有二也有氣即有性有性即有氣性雖不雜乎氣亦不離乎氣人之物欲淺深由於氣質之有清濁也氣質極清者自無物欲之纍其次雖或有之亦淺而易去氣質極濁則物欲深而去之也難氣質之拘最大變化之功極難然亦不可畏其難而不加變化之功也孟子曰人之可使為不善其性亦猶是也此亦言氣質之性至善之所在在天為元亨利貞在人為仁義禮智在人倫為五常以至一事一物莫不有天理之極是皆至善之所在也夏書止四篇商書稍多周書最多人心通貫天地之心得聖學之真則知異學之妄重外輕內學者之通患朱子盡得程子之學故曰亦幸私淑而與有聞焉衛武公年九十五猶作懿戒以自警朱子稱陶淵明有髙志逺識默識性與天道內外合一無處不有無時不然孟子曰知其性則知天矣天者性之所自出即天命之性也張子曰形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉此言氣質昏濁則天地之性為其所蔽故為氣質之性善反之而變其昏濁則天地之性復明若氣質本清則天地之性自存初無待於反之之功也性情得其正者聖人也大德敦化理氣之一原小德川流理氣之殊泒造化密移無一息之停常在目前人自不察精義入神乃知至之事致用所以行其知也道理物我無間天人一致堯舜之治不可及已君德盛氣化盛也灑掃應對亦精義入神致用之事吾德性之善念念不忘人曰用之理性情而已漢唐歷代以來賢人君子雖鮮克聞道而其嘉言善行髙風偉節見於傳記者多矣不可謂世無其人也言乾則元亨利貞已具言性則仁義禮智已具道則萬古不易氣化則日新萬物皆有始終惟道無始終先儒論孟子言齊魯之封皆方百里與王制同與周禮異然孔子曰安見方六七十里五六十里非邦也者則孟子所言為是後來齊魯之大皆兼併而然非始封之制矣凡聖賢之書皆先知先覺覺後知後覺之言讀其書而無知覺可乎堯典舜典首言其德禹謨則言文命敷于四海祇承于帝所言有不同矣詩曰其人如玉君子之德必如玉斯無一毫之㸃汚氣質之性以理在氣中而言氣質之濁者理為之蔽性固有不善氣質之清者理無所蔽性焉有不善乎未能盡顔子之學則不能知顔子之樂滿天地間皆中庸之理人自不察性與天道無內外無限量無止息元者善之長亨利貞皆善也仁為善之長禮義智皆善也性命一理也有善而無惡也明矣禀氣之濁者心不開明善言不能入見外物重則氣象卑矣好仁者無以尚之顔子簞瓢陋巷不改其樂與細思千古以來窮奢極欲者漠然無存矣但留不令之名於不泯耳漢唐間英主大抵能用言則能成事功人之吸極而呼者退極而進柔變而趨於剛也呼極而吸者進極而退剛化而趨於柔也既變而剛則闢矣既化為柔則闔矣張子曰人之有息蓋剛柔相摩乾坤闔闢之象其斯之謂與朱子解孟子孔子登東山章言聖人之道大而有本即天命之性也朱子曰已升之氣便散矣觀此言則方生之氣自是新者非既散之氣復為方生之氣也程子論呼吸亦如此釋氏出世法天地隂陽古今皆世也而可出乎沖漠無朕之中萬象森然已具竊意萬象如人與鳥獸草木昆蟲之類莫不有一定之象具於沖漠無朕之中及隂陽流行之後其可見之象即沖漠無朕中之象也是則人物之偏正通塞雖曰禀氣賦形於有生之初各有不同然其已定之理固已具於沖漠無朕之中矣孔子曰我非生而知之者蓋以氣質言也故朱子曰生知者氣質清明義理昭著程子曰陽無可盡之理蓋陽即乾元之氣也又豈有盡乎堯典春夏秋冬之四仲即乾之元亨利貞也孟子言取之左右逢其原即天命之性也性無時不發見於日用之間故取之左右逢其原原如水之有來處人物之生各接得天賦之命以為性勢亦甚大如趙宋之有遼夏勢不可去若欲以力勝即有患惟若古帝王修德以來之則無患矣論語曰吾莫如之何也已矣言人自絶於善雖聖人之教亦無所施也不輕妄則重厚不昏塞則虛明其要在主敬東漢之季雖使陳竇得行其計可復治乎朱子有言意蓋如此漢髙惠文景皆少私欲故程子謂其近於善人為邦之效朱子曰心有善惡性無不善若論氣質之性則有不善宋理宗雖崇理學而不能行理學安得有致治之效宋理宗用賈似道卒至僨國此任小人之效也讀書續録卷七
