body:
  text: 讀書録卷八明薛瑄撰所謂知幾者扵事未形著而識其㣲也非聖人其孰能之凡禍患伏扵無形之中惟聖人則知幾而防之扵未然故能消其禍衆人不知幾而圖之扵已著則已無及矣迷扵利欲者如醉酒之人人不堪其醜而已不覺也耳目之聪明為魄魄者形之神也口鼻之呼吸為魂魂者氣之神也人有許多聰明知識者魄之為也有許多呼吸運動者魂之為也堯之欽明俊德以至黎民於變時雍舜之慎徽五典以至烈風雷雨弗迷與孔子之立之斯立道之斯行綏之斯來動之斯和皆聖人作用神速功效史臣首叙堯舜禹之事有乾坤之道焉堯曰欽明舜曰重華禹曰祗承則堯舜為乾禹為坤可見帝降而王殆以此歟後人不知人臣之道但得高官厚禄即有自滿之色觀臣克艱厥臣及為臣不易之語禄位果可自滿乎動而不息者陽魂也静而有識者隂魄也夜氣如泉源淆之數亦不能清矣君子所以貴乎存息也仁是嫩物譬之草木嫩則生老則枯寂而感虛而實此吾儒與釋子不同處變化無須㬰之止息自不知其所以然而然者造化也天地之大德曰生無間斷無空缺知而不仁如老莊之流是也静中之識曰魄動中之靈曰魂草木之敷榮暢茂者神之迹其凋落枯悴者鬼之迹知至至之窮理也知終終之盡性以至扵命也朱子曰誠之有物不待形而有盖雖冲漠無朕之中而萬象森然已具矣理義之心不可少有間斷孟子所謂無忘是也心斯須不存即與理義背馳可不念哉烝民之詩二五之疇同一義也至誠無息者大德之敦化萬物各得其所者小德之川流一本萬殊殊與本不可分而為二朱子曰聖人作易因隂陽之實體為卦爻之法象此見作易之本義天地設位而易行乎其中天之生生不已也成性存存道義之門理之生生不已也知禮皆性也人能知崇如天禮卑如地便是成性存存而道義自此出也人之知不能如天之高禮不能如地之卑是壞其性而不存道義何自而出哉反此則成性存存而道義出矣只知崇禮卑便是成性存存知崇禮卑成性存存應天地設位道義之門應易在其中矣博文知崇也約禮禮卑也中庸之道問學致廣大盡精㣲極高明温故知新皆易知崇之事尊徳性道中庸敦厚崇禮皆易禮卑之事天者陽氣之實體地者隂形之實體成性即天地存存即設位道義之門即易行乎其中夫子之徳温良屬仁儉屬義㳟讓屬禮近世易書詩春秋四書傳註之外世儒纂集諸家之說附釋其後雖時有發明其實太繁複汗漫而學者終不能遍觀而盡讀反扵正經本㫖日至蔽隔支離先儒燭籠之譬正如此道之不明科舉之學害之也四書集註章句之外倪氏集釋最為精簡其他割裂舊說附㑹己意但欲起學者之觀聴圖已名之不朽駁雜浩穣害理尤甚自朱子沒而道之所寄不越乎言語文辭之間能因文辭而得朱子之心學者許魯齋一人而已雲而雨者自無而有雨而晴者自有而無雷霆風露之類亦然太極中無所不有分而為隂陽五行男女萬物無所不在元亨利貞文王之言也其理無窮聖賢之書垂訓萬世本欲開明天理使人反求諸身心而得其實自朱子沒士子誦習其說者率多以為出身干禄之階梯而不知反已以求其實聖賢垂訓之意果安在乎寒暑徃來有一定之節萬物生育有一定之形人倫綱常有一定之理是皆太極為之主窮天地亘古今而不易者也新竹有露者津液上行結而為露也如人髪中有汗然曹縣分司偶觀新竹記此因觀烏鳥哺其雛仁心藹然可見天地分明一大父母生出無限小父母來知道則自簡漢高祖取天下大抵能用群䇿如下陳留用酈生之䇿還軍霸上攻嶢闗用樊噲張良之䇿從漢中東兵用韓信之䇿守滎陽成臯又用酈生之䇿捐金間楚用陳平之䇿封韓信齊王追項羽垓下以地封韓彭英布使自為戰又用良平之䇿及天下已定徙都闗中用劉敬之䇿悉收群䇿而用其長此所以破秦滅楚不五載而成帝業枚乗曰欲人無聞莫若勿言欲人無知莫若勿為又曰積徳累行不知其善有時而用棄義背理不知其惡有時而亡此皆名言也朱子曰其心明乎正理而無蔽然後其言平正通達而無病此知言所以能知人也天地萬物皆一理也天地萬物各有其一分分殊也通書一誠字括盡通書與太極圖表裏只一復卦多少義理天道人事無不備讀易在識時勢存心不失為中應事不差為和中也者至徳也和也者要道也地泥城隍墻皆土也孝慈恤愛惻怛皆仁也理一分殊扵此亦可見親親而仁民仁民而愛物其理一為仁分殊為義隂陽合則魄凝魂聚而有生隂陽判則䰟升為神魄降為鬼易大傳所謂精氣為物逰魂為變故知鬼神之情狀者正以明此書所謂徂落者亦以升降為言耳此中庸或問朱子之言死生之說不過如此昔人訓皇為太極為中皆虛字也朱子非之謂皇為君極猶屋極之極則二字皆實矣盖謂極居此物之中則可便謂極為中則不可近因道出武定州北隅觀郵亭撮頂一木居中衆木四面輳之此正所謂極也因朱子之説而記余之所見如此太極圖假象以顯義無輕民事惟艱無安厥位惟危豈惟為人君當然哉凡為人臣者亦當守此以為愛民保已之法也周公作無逸告成王逺舉殷之三宗皆繼體守成之君欲成王有所法也近舉太王王季文王皆周先哲王欲成王有所嚴憚以脩其徳也其意切矣闕理上天之載無聲無臭又即天命之性矣不論人之賢否但見勢利即傾慕豈非失其本心乎噫弊也久矣高則明博則厚觀之天地可見凡物虛則有神如皷虛則響鐘虛則鳴心虛則靈日入而群動息日出而群動作一息一作者其易之謂與大聲不入扵里耳折揚皇荂則嗑然而咲高言不止扵衆人之心驗之世俗誠然朱子註四書明聖賢之道正欲學者務為己之學後世皆藉此以為進身之階梯夫豈朱子註書之初意哉夏葛冬裘饑食渴飲朝作暮息之得其正者皆時中也張之極者必翕强之極者必弱興之極者必廢與之極者必奪乃造化消息盈虛自然之理老子意欲翕之乃固張之意欲弱之乃固强之意欲廢之乃固興之意欲奪之乃固與之此程子所謂竊弄闔闢而為術也太極圖只是隂陽兩端循環不已而理為之主太極圖天地古今隂陽寒暑晝夜死生剛柔動静無不括盡太極圖逺而萬古近而一息無能外者先天圖十月純坤初爻中已有十一月復卦初爻之根即太極圖右半隂中陽也先天圖四月純乾初爻中已有五月姤卦初爻之根即太極左半陽中隂也由是觀之先天與太極圖亦未嘗不合静㸔太極圖斯須離之不可得也謙者聖人之誠心非為有所取於人而然也老子乃曰聖人欲上民必以言下之欲先民必以身後之則是出於有意之私而非聖人誠心之謙徳矣史記日者季主之言深有中於墨者古人用字最宻如冐色之冐字是也火木陽也生於隂隂中有陽也水金隂也生於陽陽中有隂也心所具之理為太極心之動静為隂陽忠信立身之本惟誠無間斷破缺周程張朱真儒也四子辨佛老之非至矣學者讀四子之書而乃匍匐佛老之奴𨽻是豈真知四子而能讀其書者哉學者得如周程張朱之為人亦可矣四子不好佛而學者乃好之則是為人不求如四子之賢而好佛乃求過於四子也惑之甚矣即無極而太極觀之沖漠無朕之中萬象森然已具所謂體用一源也即隂陽五行男女萬物觀之而此理無所不在所謂顯微無間也體用一源不可分體用為二顯微無間不可分道器為二以武王之聖而不知夷齊之賢豈非命歟只是一箇性分而為仁義禮智信散而為萬善義者天命之性也君子行義而盡其性則天命在是矣所行者善則吉所行者惡則凶所謂無卜筮而知吉凶也中庸之理不離乎動作語黙人倫之間知者鮮矣過一分為太過不及一分為不及此中庸所以為難也程復心四書章圖破碎義理愈使學者生疑程復心將太極圖中着一氣字又從而釋之曰太極未有象數惟一氣耳乃漢儒涵三為一老莊指太極為氣之説其失周子朱子之㫖逺矣理氣宻匝匝地真無毫髪之縫隙無大無小無内無外一以貫之盡事親之道而得其仁盡事君之道而得其義盡夫婦之道而得其知盡事兄之事而得其禮盡朋友之交而得其信皆所謂下學人事上達天理也以至盡耳目口鼻手足之道而得聰明正肅恭重之理又皆所謂下學人事上達天理也西銘明理一而分殊太極圖自一理二氣五行成男成女而化生萬物亦無徃而非理一分殊也父母生子耳目口鼻四肢百骸無不備人子能體其全而歸之斯謂之孝天之生人五常百行之理無不全人能以事親之心事天於天所賦之理無一之或失則亦天之孝子矣理為萬物之一源理一也萬物各得其一理分殊也天道無言而四時行萬物生聖人不言而四德著萬善全其致一也大徳敦化理一也小德川流分殊也氣質極難變十分用力猶有變不能盡者然亦不可以為難變而遂懈於用力也畫前之易太極中森然已具者也太極雖冲漠無形而两儀四象八卦以至六十四卦無窮之數已森然具在其中矣太極两儀四象以至六十四卦體用一源也自六十四卦以至两儀太極顯微無間也余徃年讀楚詞喜其華今讀楚詞喜其實葢其警戒之言亦皆切己之事也目之逐物最能䘮徳故四勿以視居先私意最難去故程子謂克己最為難事惟嘗用力者知其難男女之欲天下之至情聖人能通其情故家道正而人倫明欲心一動如火之熾如水之溢非用大壯之力莫能止其欲老子曰不見可欲使心不亂伏羲則河圖以畫卦大禹法洛書以叙疇聖人之心與天地之心分明為一未有天地萬物而天地萬物之理已具於冲漠無朕之中未有兩儀四象八卦而两儀四象八卦之理已具於太極之内乃所謂體用一源也即樹根觀之須思未有根之先而冲漠無朕之中樹根之理已具逮夫氣機一動資始資生而理亦隨之樹之根由是生焉太極圖理一而分殊觀春草從地迸出無絲毫之空隙則道莫能破可知天地萬物體皆虚而理則實四時溫燠寒凉之氣人體無不覺者則人與天地同體可知程子曰理無形也故假象以顯義非特易為然太極圖亦是已無窮盡無方體太極是也理本無名字字之曰太極有高才能文章坐此而取敗者多矣如禰衡孔融之徒是也非特古為然今亦有之可不戒哉太極圖水火木金土五箇小圏子即五行各具一太極也其下一小圏子乃理氣妙合而無間也又下一大圏子乃氣化生出男女牝牡雌雄而各具一太極也又最下一圏子乃男女已生之後形交氣感形化萬物而各具一太極也大徳敦化者中也性也一也小德川流者和也情也貫也讀太極圖說句句體貼向身上㸔自有無窮之味以太極圖反求之身心動静之間無一不合天地隂陽古今萬物始終生死之理太極圖盡之良心開而天理明猶山徑之蹊間介然用之而成路良心蔽而天理暗猶為間不用而茅塞之也自子至午陽氣方息而伸者神之迹自午至亥隂氣方消而屈者鬼之迹也中是性情恰好的道理以其平常而不可易故又謂之庸非中之外别有所謂庸也中之理所包甚大存扵心而不偏不倚發扵情而無過不及以其可以常行不可易故又謂之庸子在川上曰逝者如斯夫不舍晝夜即中庸之至誠無息也天下之獄自古不得其平者多矣掌刑者可不擇其人乎偶過長清知己斷一獄事不得其平重有感扵心而知天下之獄不得其平者多矣正統四年十一月十九日茌平燈下書上兩節人臣巧文以避罪非忠也雨露雪霜只是天地之氣凝結而成者如人之呵氣遇冷成氷結鬚其理可見春秋之時諸侯擅相征伐㑹盟而不知有天子之命非義甚矣禮樂征伐不出扵天子春秋所由作事物當然之理如父子之仁之類是也所以當然之故乃仁義禮智所自來在天為元亨利貞是也春秋書夫人姜氏㑹齊侯于禚夫人姜氏享齊侯于祝丘夫人姜氏如齊師夫人姜氏㑹齊侯于糓所謂直書其事而其義自見也春秋書法意在言外春秋辭雖謹嚴而意實忠厚春秋直書其事使人思而得之諸儒解經多入外意惟朱子只主本義而無泛論春秋大抵多㣲辭聖人作春秋其㣲意真非数千載之下所能窺測若欲句句字字盡釋其義竊恐不能無穿鑿之弊讀春秋大義可見者尊君父討亂賊内中國外夷狄貴王賤霸而已莊子曰道者萬物之所由也庶物失之者死得之者生為事逆之則敗順之則成故道之所在聖人尊之此言近正安其内不求扵外見其大而畧扵小正統五年正月十八日分司夣得此語因記之小人不可與盡言道人以善不可則止其知幾乎待小人嚴而和分外之事一毫不可與易大象皆以義理言天何言哉吾無隱乎爾與曽㸃言志之意皆天理流行之妙言要緩行要徐手要恭立要端以至作事有節皆不暴其氣之事約其情使合扵中亦養氣之事也怒至扵過喜至扵流皆暴其氣也資始資生固乾元之氣而其理則太極也風霆雨露之氣所以成物者皆太極之所為也大氣發生一切有形之物而太極為之主以鼻息觀之呼感得吸來吸感得呼來暑為感感得寒來則寒為應寒復為感感得暑來則暑為應應又為感感又為應于是見感應之無端感應之理于太極圖隂陽互根見之大舜聞一善言見一善行沛然莫之能禦即感而遂通天下之故也感自外來應由中出天地寒暑人生盛衰其宻移之機無毫髪之間斷謀利計功乃人欲之私學者之通患也大而人倫小而言動皆理之當然纔有有為之心雖所行合理亦是人欲王伯之分正在不謀利計功與謀利計功之分學者自㓜便為謀利計功而學宜其不足以入堯舜之道絶謀利計功之念其心超然無係萬化交則通不交則隔礙而不能成化功太極圖如水一源流而為千支萬派却都只是源中水也六十四卦只是一竒一偶但因所遇之時所居之位不同故有無窮之事變如人只是一動一静但因時位不同故有無窮之道理此所以為易也因小生對句便知有隂陽太極只是性太極是性之表徳宋文帝子劭巫蠱事覺不能斷以大義誅之卒有合殿之變正所謂為人君父不通春秋之義者必䝉首惡之名聖賢著書立言句句明理非欲言詞之富麗也易横圖一而二二而四四而八八而十六十六而三十二三十二而六十四太極圖則一理二氣五行男女遂至扵化生萬物雖所推有詳畧之不同其為理氣則一而已矣太極圖上一圏純以理言而其下餘圏則兼以氣言然上一圏即在下餘圏之中所謂精粗本末無彼此也人熟寐而有知覺正如純坤卦下一爻中有陽動之幾也其理妙矣如王莾之徒竊人之國皆引先王之事以文其奸即莊子所謂儒以詩禮發塚者歟鳶飛魚躍即取之左右逢其原之意言道無所不在也鳶而必戾于天魚而必躍于淵父必慈子必孝君必仁臣必敬兄必愛弟必恭夫必義婦必從以至四體百骸之有其則昆蟲草木之若其性隂陽日月風霆雨露之各以其時皆鳶飛魚躍之意所謂活潑潑地也物之觸目觸耳者皆活潑潑地之理風動林木即鳶飛魚躍之意屈以感伸伸為應伸又感屈屈為應屈又感伸伸又感屈屈伸感應如循環之無端二程之名言朱子采入四書集註或問中者多矣求二夫子之心者當于此觀之身在堂上方能辨堂下人曲直故有知言之明乃可以折𠂻群言不然去取必失其當讀書講明道義求日用之實理也若讀書而不講明道義則溺心扵文字之間終不能知實理之所在明徳新民止扵至善下文即繼之以知止而後定静安慮得以見明徳新民之止扵至善皆由知止定静安慮而後得止扵至善也男女氣化之太極與萬物形化之太極一也氣化言男女而萬物在其中形化言萬物而男女在其中互文也但是血氣之物靈扵他物飛潜動之物靈扵植物而人又動物中之尤靈者也摇扇有風見天地間無處無氣人雖各是一體其實與天地萬物渾融相合無一毫之間蕩滌胸中無一毫之私累可以言大矣應事纔應即休不可湏㬰留滯為心累和從中上流出來中是和之源頭一而二二而一者也庸即中和之理平常而不可易者非中和之外别有所謂庸也􅉼養本源是尊徳性之事思索義理是道問學之事中和不可湏㬰離盖静而不存則有不中動而不察則有不和此中和所以不可湏臾離也人之學道由經而入窮經有得則道不在經者可黙識矣學湏有覺方得總㑹處朱子論造化之精約莫過扵太極圖解水能鑑物故智屬之金能斷物故義屬之木有生意故仁屬之火則文明故禮屬之土則質實故信屬之屋極北極為有形之極太極乃無形之極也故曰太極本無極皇極之極以物之在中而言如屋極北極之義若即訓極為中則非矣莊子曰至人之用心若鏡不將不迎應而不藏程子所謂形容道體之言此類是也人日用求太極只中正仁義便是此理然仁義中正是各具之太極五性未發乃統體之太極也五經四書小註不勝其繁讀者誠有文滅質博溺心之患非有過人之識而欲纂集群言以折衷聖賢之經㫖多見其不知量也鐡中生火陽生扵隂也就天地萬物中各具一理者各具之太極也合天地萬物為一理者統體之太極也天地間理無空缺處人終日在太極中而不知也忠信積久可孚扵人不然則言出而人弗信矣輕言戯謔最害事盖言不忘發則言出而人信之茍輕言戱謔後雖有誠實之言人亦弗之信矣一失人則人皆莫之與孤立而無助矣輕諾則寡信易曰修辭立其誠故慎言乃進脩之要讀書録卷八
