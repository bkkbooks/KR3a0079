body:
  text: 讀書續録卷五明薛瑄撰周子挺生南服建圖立説以明造化之源性命之微傳之二程以當時無受之者遂不以語人至朱子既即其圖以剖析其旨又即其説以盡發其奧由是周子建圖立説之意大明學者誠欲求其意當即朱子之解以求周子之説熟讀精思潛玩默體期以數十年之功俟其融會貫通超然有得於圖象之表庶幾造化之源性命之微天人之理畢貫於一而其實不外乎吾心矣朱子曰易者交錯代換之名卦爻之立由是而已此易之在卦畫者又曰天地之間隂陽交錯而實理流行一賦一受於其中此易之在造化者然易之在卦畫者實由易之在造化者出也易雖有交易之體變易之用然用不在體之外人君之德惟明為先書稱堯曰欽明舜曰文明禹曰明明湯曰克明文王曰若日月之照臨皆言明也明則在己之理欲判然在人之邪正别白處己處人萬事皆得其當矣張子曰學至於不責人其學進矣此言當深體而力行之愚屢言及此而不厭其煩者亦欲深體而力行之也書雖不及史之詳然帝王治天下之大經大法已具後世人主能力求其要而法其治何三代之不可復書之精一執中治天下之要用賢才修政事之類皆其法也經書中有字同而義異者如易泰卦泰乃亨泰之義論語君子泰而不驕泰乃舒泰之義大學驕泰以失之乃侈肆之義又如書言有忍乃濟忍乃容忍之義論語言忍乃忍於為惡之義孟子言不忍人之心乃仁心發見之義經書字如此類者字同而義異讀者當各即其義而觀之不可以字泥也孔子曰多乎哉不多也世儒以該博為能而不察其理之有無者去道逺矣有一毫私欲之間雜即非仁矣自古有天下者觀其所用之人則政事可知矣周子誠上章誠善道性元亨利貞命皆太極也程子言國祚之祈天永命周過其厯即其效也三王皆以仁立國所謂王道也漢唐雖雜伯雜夷尚能假仁義而行故國祚自三代以下最為長逺秦隋南北朝五代皆以不仁立國故其祚如彼之促斯可以為萬世鑑矣至大者善也人胡不為善正己者乃能正人未有枉己而能正人者也作史者不可以強弱成敗論人只當斷以大義民不習教化但知有刑政風俗難乎其淳矣賢其賢否其否天下所以治賢其否否其賢天下所以不治天下國家當大培根本何以培之仁而已聖人之道蔽昧不明者千五六百年至周程張朱而始明書稱堯曰欽明文思允恭克讓舜曰濬哲文明溫恭允塞曰明曰文曰恭二帝皆同德道流行於天地間即元亨利貞仁義禮智是也未嘗有間斷但道之託於人者有絶有續耳道體於穆而不已道統有絶有續道非亡也幽厲不由也不由則道之在人者亡矣而道之在天者則未嘗亡也行止久速皆有理焉順理處之可也行止久速由乎天故不可尤人中字專言則包四德喜怒哀樂未發之謂中是也偏言則止為禮之一德定之以中正仁義是也靜存動察學易之要也動靜語默應事接物求合乎理即學易也易者陰陽也其理則道也道即天命之流行朱子所謂隂陽交錯而實理流行一賦一受於其中是也五位相得而各有合相得謂一與二相得三與四相得五與六相得七與八相得九與十相得有合謂一與六合二與七合三與八合四與九合五與十合朱子曰相得如兄弟有合如夫婦相得則取其奇偶之相為次第辨其類而不容紊也有合則取其奇偶之相為生成合其類而不容間也相得有合四字該盡河圖之數河圖洛書之奇偶不過一隂一陽耳朱子言之備矣洛書之五行即河圖之一六二七三八四九五十之五行也河圖之數十太陽之位一得數九成十少隂之位二得數八成十少陽之位三得數七成十太隂之位四得數六成十事無大小皆當致謹舜之兢兢業業禹之祗台德先成湯之栗栗危懼文王之小心翼翼皆敬謹之謂也義利無並立之理尚義者必不尚利尚利者必不尚義惟君子為能尚義而去利也孳孳為義者君子也孳孳為利者小人也聖賢言之詳矣尚義則天下治三代盛時是也尚利則天下亂戰國末季是也行王道則黜伯功行伯道則棄王道後世有王伯並用之説非矣王道天理也伯功人欲也天理人欲未有並立者也老子多藏必厚亡之言曲盡事理自古以來黷貨厚積以取顛覆者多矣而猶不知戒何邪利者人心之同欲而欲專之可乎孟子深辨王霸之誠偽所以擴天理遏人欲也千古聖賢之學惟欲人存天理遏人欲而已天道可畏聖帝明王事天如事父母父母有怒人子恐懼不寧思有以消其怒聖帝明王之事天也亦然春秋書災異不言事應而事應具存未有書於前而不應於後也朱子綱目書法倣春秋之意事天當自一念之微純乎天理次而一身一家皆出於至正則事天而天心悅矣古語云事天以實不以文存其心養其性事天之實也書言罰弗及嗣賞延于世此聖賢之仁心也故賞當過於厚而刑不過於濫乾道變化各正性命物物一太極也性命之理於一草一木見之於天地萬物皆見之周子論樂至矣邵子詩云不讀人間非聖書凡不正之書皆不可讀陰陽消息盛衰屈伸即易也順之則吉天地盈虛與時消息學易當深體此理朱子曰看來人處大運中無一時間吉凶悔吝一息不曽停如大輪一般一恁滚將去聖人只隨他恁地去看道理如何這裏則將這道理處之那裏則將那道理處之愚按朱子此言論乾卦潛見愓躍飛亢之事學易者當知此意大有之遏惡揚善朱子謂非特用人反之於身亦莫不皆然如去人欲存天理即遏惡揚善也日中則昃月盈則食天地盈虛與時消息如東漢諸君子欲以力扶當時之衰亂是不知此義也隂陽在內外分否泰聖人以君子小人發明其義自古治亂皆由於是易之垂戒深矣朱子曰太極中本無一物天地生物不言所利故聖人之於功業雖有若無分定也制將智謀為本不然雖驍勇一夫之敵也易曰師貞丈人吉所謂丈人必能以智謀為本矣聖賢之書神而明之在乎人不然書特塵編耳書能神而明之則活潑潑地聖賢之書所載皆天地古今萬事萬物之理能因書以知理則理有實用不然書自書理自理何以有實用哉偶持一卷中庸書因思此書滿天下能因中庸之書實得中庸之理者幾何人哉燈下記此以上四條易之初卦畫而已今經傳本義之外諸儒之説遂至數十卷何其文之多也支流多則迷本源雜説多則亂本旨今五經四書傳注之外增録後儒之説日益多學者至白首不能遍讀吾恐本源本旨迷而亂也宋末之文弊如周末許魯齋嘗言之矣士農工商之業為之必有實效異端誦妖誕之空言以徼不可必之福茫如捕風繫影舉前古為之何其惑之甚邪六十四卦其辭至於無窮為善誠實則天報之以福豈有為不善之人誦異端之誕言而福可求邪隂陽迭為消長自復至乾陽長隂消自姤至坤陽消隂長然陽之長雖至復始成一陽而坤之初爻陽已萌矣隂之長雖至姤始成一隂而乾之初爻隂已萌矣聖人於陽之復則喜見於辭於隂之姤則不言扶陽抑隂之義也剝盡為純坤剝于上而陽已萌於下夬盡則為純乾夬於上而隂已萌於初此陽無間容息隂亦無間容息故程子曰隂亦然聖人不言耳知卦畫即易知交易變易之易知隂陽迭為消長隂陽無頓絶之理至隂之中陽已生純坤初爻有陽是也至陽之中隂已生純乾初爻有隂是也姤次夬才夬去隂為乾而隂又生邵子所謂亂生於治也程子曰顔子簞瓢在他人則憂而顔子獨樂者仁而已愚謂聖賢之樂不過全天命之性仁即天命之性也專言仁則義禮智皆在矣程子曰理性命一也堯舜之朝白僉者衆共之辭其舉人皆於公朝也此意行公道行矣乾健坤順之類易神明之德仁義禮智信人神明之德既往之非不可追將來之非不可作此吾之自省也欲寡其過而未能之意時時不可忘此實修己之要也蘧伯玉之使以夫子欲寡其過而未能之言對孔子之問不惟能知伯玉之心其能自知也審矣衛武公蘧伯玉皆以高年而篤於進修誠可為後世法孔子晚年喜易猶曰假我數年以學易可以無大過况常人之於學可不知所勉乎鬼神體物而不可遺無物無隂陽程子曰離隂陽更無道竊謂離物亦無道富有之謂大業理氣充塞無涯日新之謂盛德理氣流行不息富有雖曰大無外日新雖曰久無窮其實均一理氣耳道不為堯存不為桀亡萬古常如此道不離人人懵然無知覺者氣質拘之物欲蔽之也人之善端亦時有發見者但私欲盛隨復汩之耳朱子曰董遇云讀書千遍其義可見又曰思之思之又重思之思之不通鬼神將教之非思鬼之力也精神之極也非妄語也此言讀書熟思之精自有通悟時也楊龜山曰人性上不可添一物以是見龜山之識極髙朱子曰太極之有動靜是天命之流行也所謂一隂一陽之謂道誠者聖人之本物之終始而命之道也其動也誠之通也繼之者善萬物之所資以始也其靜也誠之復也成之者性萬物各正其性命也是則太極也天命也道也誠也善也性也一理也天下之理再無加於性分之外者孟子言性善於道之大本大原見之至明矣故其一言一理皆自此出荀揚諸子不明道之本原雖多言愈支矣聖人之言性與天道雖曰不可得而聞然與諸弟子言仁義孝弟忠信天命仁聖之類與凡不言之教何莫非性與天道之妙哉孔子曰若聖與仁則吾豈敢抑為之不厭誨人不倦則可謂云爾已矣讀論語者須要見何者是聖人之為聖與仁不厭處何者是聖人以仁與聖誨人不倦處問自其本以之末則一理之實而萬物分之以為體故萬物各具一太極如此説則太極有分裂乎朱子曰本只是一太極而萬物各有稟受又各自全一太極爾如月在天只一而已及散在江湖則處處皆見不可謂月分也又問理性命章如何下分字曰不是割成片去只如月映萬川相似以朱子之言觀之太極渾然一理其大無外其小無內人物雖各得一理似乎分矣合而言之又渾是一理實未嘗分也正如天地間總是一月光萬川雖各得一月光又總是一月光也太極不可分於是可見矣大學傳言聖人之止雖有仁敬孝慈信之分其實皆以敬為主故曰無不敬而安所止也為善之心當念念不忘不可有須臾之間也人心能止則篤實輝光故易於大畜言之周子言幾字亦自易知幾其神乎之語來天體無窮程子言之備矣維天之命於穆不已自一刻一時一晝一夜一月一嵗積纍至千萬嵗無非一隂一陽之謂道循環而無窮此維天之命於穆不已也蓋命即元亨利貞之命道之謂也善最大以性無不在也天理本善故人性無不善故程子曰性即理也或在陽或在隂故神無方或為陽或為隂故易無體神不離乎隂陽亦未嘗倚於隂陽也四皓定惠帝之位先儒多稱留侯之謀而朱子綱目不大書其事惟附注於髙帝還宫之下必有深意楚辭鴻鵠歌有朱子集注議論當以為正讀史最有益古人多有明見於事幾之先者如事之成敗人之賢否皆預言於前而具應於後此等殊開人智識朱子曰易若靠定象去看便滋味長若只恁懸空看也無甚意思本義多是靠定象看中夜思千古聖人之心惟是誠而已進學之本惟在忠信聖賢言之詳矣孔子視其所以一章亦可反觀己之為善為惡所由所安之實大學經傳一明德貫之明明德者明德明於己新民者明德明於人止至善者人已之明德各造其極格物致知窮盡此明德之理也誠意者實其明德於心之所發也正心修身全此明德於身心也齊家治國平天下者明德明於家國天下也元亨利貞之命充塞天地流行古今無一毫之空隙無一息之間斷即維天之命於穆不已也五行之外無隂陽隂陽之外無太極太極之外無性與天道精粗本末渾然一致也仁義禮智天理也樂天即循天理而樂也識太極則識聖人矣宴好之私不形於動靜情欲之感無介於威儀盛德之至也易不出乎隂陽之理故太極圖可以包之元始統天仁道統人朱子曰道之體用不外乎隂陽而其所以然者則未嘗倚於隂陽也是則道即不測之神與堯之命官厯象授時以閏月定四時之類皆範圍天地之化而不過曲成萬物而不遺也歟晝動夜靜而太極不離乎動靜故曰太極本然之妙也動靜所乘之機也天位乎上為陽地位乎下為隂而太極不離乎隂陽故曰隂陽形而下之器也太極形而上之道也太極説不過中庸之理耳通書曰誠者聖人之本誠太極也即中庸喜怒哀樂未發之中也其曰大哉乾元萬物資始誠之源也即中庸天命之本然也其曰乾道變化各正性命誠斯立焉即中庸天命流行賦於人物之性也其曰誠者五常之本又即未發之中也其曰動而和曰道即和之逹道也周子無極而太極指性命之全體而言張子西銘理一分殊指仁義而言西銘示人以求仁之體專言之仁也於太極圖中正仁義亦無不包矣太極圖言一理二氣五行化生萬物西銘言乾坤為萬物之父母則一理二氣五行化生萬物在其中矣惇五典庸五禮彰五服用五刑治天下之大本大法不出於是千古聖賢教人之法只欲人復其性而已聖人千言萬語雖有精粗本末不同皆説從性上來學者默識而旁通之天人之理性命而已學只學天理人倫西銘大旨欲人克己為仁顯也用也即道之費也微也體也即道之隱也體用一源顯微無間太極圖説程子之後惟朱子知之宜程子不以語人也太極圖説朱子解知者鮮矣天地萬事萬物各有自然之條理人之處事惟順其條理而行斯無難處之事矣致知格物是於事物求至極之理理不外事惟於事上求其理理既明即以此理處此事斯得其當矣中庸或問曰格物之功正在即事即物而各求其理天之神道而四時不忒元亨利貞是也聖人以神道設教而天下服仁義禮智是也神明之德在天為元亨利貞在人為仁義禮智中庸序曰恍然似有得其要領所謂要領天命之性也一書之理不外是論語雖不明言性善凡言仁義孝弟道德天命之類無非性善也人之寂然不動時隂也而理具焉感而遂通時陽也而理亦具焉或隂或陽而理無不在此在人隂陽不測之神也論語凡告門弟子問仁一貫求仁得仁禮義善性之類皆天理也天理即性善也聖人雖罕言命而論語所言者無非命之理雖罕言仁而所言者無非仁之道蓋命即元亨利貞賦於人仁義禮智之性聖人一言一事豈有出於性命之外者學者默而識之可也靜而敬以涵養喜怒哀樂未發之中動而敬以省察喜怒哀樂中節之和此為學之切要也關雎之詩即中和之理動以天天即仁義禮智之天理也論語言仁大學言明德中庸言天命之性孟子言仁義一理也動靜無端隂陽無始於貞元之間見之一以貫之只是性情聖人教人百行萬善性以貫之豁然貫通者性而已日省已過之不暇何暇責人之過恕字用之不盡道無聲臭取之不竭用之無窮朱子太極西銘解至矣盡矣貞元動靜人心動靜一也朱子言顔子觸處洞然自有條理條理即性情之條理大本逹道也性命之理散見於聖賢之書天地之間反之吾心至精至密之地而不可見也始終條理性命體用是也聖人答門弟子問仁雖因人變化不同其致一也造化無一息之間人之存心亦當無一息之間學者一日之間心在義理上之時少在間事上之時多所以於義理生而於間事熟誠能移在間事上之心常在義理上念念不忘則天理熟矣孟子言仁亦在乎熟之而已譬之飲食熟則消融而有益生則非徒無益又將有害焉此為仁貴乎熟也程子曰人只有箇天理不能存更做甚人蓋天理即仁義禮智也四者一有失焉則非人矣思萬端外事皆無益惟思天理則日進高明誠為中庸之樞紐即此性之實也非性之外别有一物為誠博學詳説反説到至約之處則無聲無臭矣道心即仁義禮智之心性是也盡性者聖人復性者賢人至於聖人聖人相傳之道不過於此堯舜禹湯文武之道非得孔子後世莫知所尊周程張子之道非得朱子後世莫知所統孔子之後有大功於道學者朱子也古聖人之道四書之理湮晦千五百年至程朱始明知至處即性之一源性者萬物之一源無方所無形象費隱即逹道大本不遷怒工夫甚難惟嘗用力者知之然亦不可不勉孔子曰君子之道四丘未能一焉聖不自聖者如此復之有益於人大矣雖顔子亦由於不逺復小學以事教人理在其中精粗本末無二致也踐履盡小學之事則天理爛熟雖大而化之之聖恐亦不外是天地萬物晝夜寒暑彌滿六合流行古今皆易也易曰知崇禮卑知崇如博文禮卑如約禮日夜省察身心思慮動作之過惡改之體認身心性情固有之天理存之改過存善晝夜循環用功庶幾惡去而善存讀西銘筆録朱子解西銘天地之帥吾其性曰乾健坤順此天地之志為氣之帥而人物之所得以為性者也蓋乾坤之健順即元亨利貞之德賦於人物為仁義禮智之性也人物皆同此性民曰同胞以能推明乎此性也物吾與也以不能推明乎此性也大君宗子大臣家相高年長長孤弱幼幼聖人賢者以至兄弟無告凡天下之人皆天地之子而同此性也惟聖人能全其性與天地合德也賢者能不失其性而秀出於等夷也于時保之保此性也樂且不憂樂天即樂此性也違曰悖德害仁曰賊濟惡者不才皆逆此性戕此性稔惡而淪滅此性者也踐形惟肖者能充形色之性而克肖乎乾坤父母者也知化善述其事者知隂陽變化之道而所行者皆天地之事即此性見於日用事為之間者也窮神善繼其志者通天地元亨利貞神明之德而所存者皆天地之心即此性藴於寂然不動者也不愧屋漏為無忝存此性於幽隱之中無忝於乾坤父母也存心養性為匪懈存其心養其性不怠於事天者也遏人欲而惡旨酒又所以顧天之養而存此性也育英才而永錫類乃所以廣萬物之一原而推此性也不弛勞而盡底豫之恭非存此性以事天乎無所逃而待烹非盡此性以順天乎體其受而全歸者全歸乎此性而已順乎天而惟命是從者不咈乎此性而已或富貴而厚吾生吾惟盡其性而不敢驕或貧賤而玉吾成吾惟順其性而不敢怨以至存則存吾性以事天沒則全吾性以樂天此性之一字皆自天地之帥吾其性之性來西銘始終之意因事親之誠以明事天之道惟在吾養性而已先儒以理一分殊明此篇之大旨然理一所以為仁分殊所以為義舉仁義而言則性之全體在其中矣竊以性之一字貫之如此未知是否以俟正於後之君子薛瑄識觀顔子所好何學論顔子全在性情上用功夫程子曰西銘乃原道之宗祖蓋原道但言率性之道西銘言道所從出即天命之性也親親而仁民仁民而愛物皆仁也於親曰親於民曰仁於物曰愛仁之始各得其宜者義也此仁之理一貫乎分殊之中義之分殊不在理一之外也道學相傳非有物以相授也蓋性者萬物之一原而天下古今公共之理即所謂道也但先覺能明是道行是道得其人而有以覺之使之明是道行是道則道得其傳無其人則道失其傳矣天地之塞吾其體天地之帥吾其性此可見人與天地萬物為一體朱子本義卜筮外亦多本程傳至誠無息即維天之命於穆不已在聖人則純亦不已舉目見天地萬物之理皆活潑潑地何止鳶飛魚躍理者何即天命之性是也所謂洞見道體者恐不過如此一性貫乎中庸上天之載無聲無臭至矣君子篤恭而天下平即首章致中和天地位萬物育之意明德新民止於至善無非盡已盡人之性各造其極物理之極處即性之一原也天下之物皆造乎極處則吾心所知無不至矣程子曰沿流而求源流者傳之辭也源者易之理也因辭以求理所謂沿流而求源也長沮桀溺之徒其言聖人雖非其自處却是蓋天下有道則見無道則隱賢者只當守此義若聖人則無不可為之時不當以賢者例之也惟聖人之言中正無過賢者之言或有過者宇文周多行周禮然無其本焉得有周禮之治大學物格而后知至知至而后意誠觀知至連意誠説則致知格物先於身心性情上用功可知身心性情之理明則意可得而誠矣允執厥中中者性命之理也千古道學之源本於此故朱子曰堯之一言至矣盡矣吳陸遜有先禮後刑之言亦可謂識治體矣常存不如人之心則有進元大而始人得天地生物之心以為仁則仁道之大可知仁從乾元大本大原中流出所以為衆善之長忠信所以進德也修辭立其誠所以居業也知行皆實也讀書續録卷五
