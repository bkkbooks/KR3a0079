body:
  text: 讀書錄卷四明薛瑄撰自一身言之耳有耳之理目有目之理口鼻有口鼻之理手足有手足之理以身之所接而言父子有父子之理君臣有君臣之理夫婦長幼朋友有夫婦長幼朋友之理以至萬物有萬物之理凡此衆理莫不窮而通之所謂窮理也既知其理於一身之理必有以踐之於人倫之理必有以行之於萬物之理必有以處之所謂盡性也能盡其性則理所自出之天命莫不有以造極一原所謂至命也理也性也命也雖同為一理初無本末精粗之殊而窮也盡也至也則畧有淺深之序學者不可不察體認未至終未能與道合一乍存乍亡者是間斷之時多也吾奮然欲造其極而未能者其病安在得非舊習有未盡去乎舊習最害事吾欲進彼則止吾之進吾欲新彼則汩吾之新甚可惡當刮絶之吾北歸得如非復吳下阿䝉則庶有進乎若與初來時無異恐有愧於故舊也朱子遣子從學欲其一變舊習而歸曰念之念之無忝爾所生吾來湖南三年矣北歸有進庶無忝爾所生乎仁則一不仁則殊生理無不貫者仁也仁道之大莫能禦仁推之千萬億物無不通生意無窮偶於李核可見如一李核種之即成一株一株姑以結百李言之種之即成百株百株結千李種之即成千株千株結萬李種之即成萬株萬株結百萬李種之即成百萬株由是推之生生之理盖不可勝窮也仁道之大於此亦可見心不可斯須離正理身不可斯須離正道曾㸃言志只是箇仁字滿招損謙受益即謙卦虧盈益謙之意周子通書字字皆實二帝三王治天下純是天理之公無一毫人欲之私漢唐歴代治天下純是人欲之私帶些子天理於其間開眼六十四卦皆見於天地之間讀有卦畫之易當知無卦畫之易有卦畫之易今之易書猶可以言求無卦畫之易則可以心㑹而不可以言求邵子所謂須信畫前元有易是也萬物皆一隂陽隂陽皆一理道只在動止語黙之間身外求道逺矣已知如未知已能如未能則有進事未至先無一物在心則事至應之不錯若事未至先有三端兩緒在心則先自撓雜矣應事安得不錯乎不敢有邪心漸近於誠聖賢言格物致知處便當效其格物致知言存飬省察處便當效其存飬省察聖賢為教之法無不效其所為則讀書有切己之益而不為口耳之陋矣學者開口皆能言道是好道理然當自體諸心果能實好此好道理否又當體之身果能實行此好道理否若徒能言之於口而體諸身心者皆不能然是所謂自欺也謹防外好以奪志斯須照管不至則外好有潜勾竊引之私不可不察人欲如寇敵專以窺吾之虚實斯須防閑不密則彼乘間而入矣人心貴乎光明潔淨為學時時處處是做工夫處雖至鄙至陋處皆當存謹畏之心而不可忽且如就枕時手足不敢妄動心不敢亂想這便是睡時做工夫以至無時無事不然天地自然之文物物皆具如花木文縷綵色之類皆是也噬嗑賁豐旅四卦論用刑皆離火之用以是見用法貴乎明噬嗑豐以火雷雷火交互為體用法貴乎威明共濟賁旅以山火火山交互為體貴乎明慎並用治獄有四要公慈眀剛公則不偏慈則不刻明則能照剛則能斷外物至輕已徳至重重其所輕輕其所重不知類也已外物為飬生之具固不可缺但君子取之有道用之有節小人則取不以道用不以節所謂天理人欲同行異情也工夫𦂳貼在身心做不可斯須外離常得心在内則寡過矣心一放即悠悠蕩蕩無所歸著千古聖賢之言一性字括盡細㸔天之生物只是自然無纎毫作為之思故人見其易而不見其難人能事事順理而行則亦如天之自然不難矣順理而行則直而易逆理而行則曲而難聖賢之迹固當考而已之所行者又當隨時揆之以理而不必其事之同如禹稷顔回迹雖不同而道則同也所謂理者萬事萬物自然之脉絡條理也循其脉絡條理而行本無難事惟不知順理妄行所以﨑嶇險阻不勝其難也心地乾淨自然寛平人能知天地萬物各有截然之分則心自定矣知理而行者如白晝見路分明而行自無差錯不知理而行者如昏夜無所見而㝠行雖或偶有與路適㑹者終未免有差也讀前句如無後句讀此書如無他書心乃有入凡㸔聖賢書皆當以仁義禮智信五者細細體㑹旁通之乆則彼此互相發明可以見天下道理之名雖多而皆不外此五者矣予畏上帝不敢不正可見湯之伐夏一出於上天之公孟子所謂天吏是也夫豈有一毫利天下之心哉茍有利天下之心則非所以為湯矣成湯放桀於南巢惟有慚徳湯之不幸天下之幸也天之生物一本也知易者莫若孟子易有太極易者隂陽之變而其所以為是隂陽之變者太極也聖人言太極就隂陽中指出此理以示人元不曾離隂陽而言如所謂一隂一陽之謂道形而上者之謂道形而下者之謂器皆不曽外隂陽而言道也一分而為二一即在二中而一之本體未嘗分也二分而為四一即在四中而二之一則未嘗少也四分為八一即在八中而四之一又未嘗減也以至八分為十六十六分而為三十二三十二分而為六十四一則隨所分而無不在而其分之主則自若也葢一生二二生四四生八八生十六十六生三十二三十二生六十四而一隨生隨在者分之殊也六十四根於三十二三十二根於十六十六根於八八根於四四根於二二根於一者理之一也理之一各貫於分殊之中分之殊畢統於理一之内分之殊若分矣而理之一則渾然無所不包實未嘗不合也理之一若合矣而分之殊則粲然各有條理實未嘗不分也分而合合而分斯所謂一以貫之者歟一心管萬事理一分殊萬事由一心分殊理一天陽地隂隂陽之氣屈伸徃來者鬼神也故曰鬼神者天地之功用而造化之迹也陽之能伸者神隂之能屈者鬼二物也伸極而屈者神之鬼屈極而伸者鬼之神一物也二而一一而二知道者黙而觀之生天生地生隂生陽生温生熱生寒生凉生日生月生星生辰生雨生露生雷生霆生水生火生木生金生人生物生獸生禽生生之多葢不可勝窮也而皆本於一生太極動而生陽神也静而生隂鬼也鬼神者其太極乗氣機而屈伸乎英氣甚害事渾涵不露圭角最好第一要有渾厚包涵從容廣大之氣象促迫􅄶窄淺率浮躁非有徳之氣象只觀人氣象便知其涵飬之淺深萬物之形著者其始也甚微河圖虚其中以為太極而兩儀四象八卦皆由是以生邵子所謂天向一中分造化也畫前之易不待卦畫而已著者也見得理明須一一踐履過則事與理相安而皆有著落處若見理雖明而不一一踐履過則理與事不相資終無可依據之地曽㸃所以流於狂也精粗本末兼盡所以為聖賢之學若舍粗而求精厭末而求本所謂語理而遺物語上而遺下鮮不流而為異端二程所以接孔孟之傳者只是進脩有序直是要求實理實理之名雖在書而實理之理則在理曲折細微理無不貫讀書當著實體認如讀中庸首章天命之謂性便當求天命之性的在何處讀大學首章明徳新民止於至善便當求三者的為何事如此則道理躍如皆在心目之間自不為文字言語所纒繞矣因閒畫伏羲八卦小圓圗貼於壁上觀之覺有流動之意孟子曰天下之生乆矣一治一亂知易者莫若孟子纔言象便非真因象以識其真則在人焉耳毎日就身心言行應事接物處𦂳𦂳體認仁義禮智四者體認得是則行不錯聖人取人極寛如仲叔圉祝鮀王孫賈皆未必賢以其才可用猶皆取之後之君子好議論者於人小過必辨論不置而遺其大者視聖人包含之氣象逺矣聖人取人不以有功而揜其過不以有過而揜其功如管仲霸者之佐耳其過多矣聖人猶不廢其一匡之功後世有論人過而遂沒其功者多見其剋核之甚也老子道徳經常無欲以觀其妙應上文無名天地之始常有欲以觀其徼應上文有名萬物之母讀二典三謨夏商周書其明白者皆有切於學者之身心愈讀愈有味知我者其天乎猶中庸所謂知天地之化育言與天地之化育黙契為一非但聞見之知而已但中庸言已契天論語言天契已其實一也下學而上達知我者其天乎下學學人事上達達天理也人事如父子君臣夫婦長㓜之類是也天理在人如仁義禮智之性在天如元亨利貞之命是也葢下學父子君臣夫婦長㓜之人事便是上達仁義禮智元亨利貞之天理也謂之天知者非聞見之知也乃天與聖人黙契為一是以人不能知而天獨知也然五者姑舉事之大者而言其實無一而非下學人事上達天理也夫子發莫我知也之嘆葢當時之人雖知夫子為聖人但雷同知其名而已實不知聖人之所以為聖人也知聖人所以為聖人如愚之顔一唯之曽子而已如子貢之髙識猶未及此故曰知我者其天乎然於斯之際子貢雖未能盡領夫子之嘆若後來性與天道不可聞之言夫子猶天不可階而升及綏來動和之論則子貢亦可謂深知夫子矣家人卦治天下之本偹焉偶食桃梅桃樹接梅枝結實者其生者味酸熟者味甘因思孟子曰夫仁亦在乎熟之而已葢凡為學為善皆貴乎熟不獨仁也茍為不熟焉得其味之美哉君子熟於善小人熟於惡君子熟於精微之義小人熟於機詐之巧君子熟於公正小人熟於私邪理象數辭易偹焉上下逺近大小内外渾只是天也天外無物物外無天理氣象數之外無餘物大小道理吾心悦而不能言舉此以告人人其信之乎吾其誰告之毫私不有渾渾乎其深大也融釋與道為一元來學不可有為有為即人欲而非天理矣觀天之道皆公而自然不為何而春夏生物不為何而秋冬成物人之道亦公而自然不為何而行仁義不為何而行禮智若有為而行即私而不公矣讀咸有一徳之書則知伊尹之學極其精密成湯以元聖稱之有自矣夫商書數篇光明峻潔真所謂灝灝者也典謨仲虺成湯伊傅諸書尤切於學者讀書必専精不二方見義理有一念之雜即隔一重矣以鴻鵠之心讀書必不能造乎精微説命曰惟學遜志務時敏厥脩乃來允懐于兹道積于厥躬惟斆學半念終始典于學厥徳脩罔覺遜志時敏允懐終始典學皆為學之功乃來道積于厥躬厥徳脩罔覺皆為學之效說命曰人求多聞時惟建事下文即繼之曰學于古訓乃有獲事不師古以克永世匪説攸聞葢學古訓即所謂求多聞事不師古之事即時惟建事之事非有二也求多聞猶易曰多識前言徃行以蓄其徳耳必謂資之人可乎既乃遯於荒野暨厥終罔顯只是甘盤隠遯不顯于世耳當以朱子語錄為正張南軒無所為而為之之言其義甚大葢無所為而為者皆天理有所為而為者皆人欲如日用間大事小事只道我合當如此做做了心下平平如無事一般便是無所為而為若有一毫求知求利之意雖做得十分中理十分事業總是人欲之私與聖人之心絶不相似無所為而為猶正其誼不謀其利明其道不計其功之意無所為而為猶當理而無私心仁也有所為而為者事雖當理未能無私心也謂之仁可乎如乍見孺子之入井惻隠之心發無所為而為也若惡其聲納交要譽之心生即有為而為矣知及之仁不能守之雖得之必失之狂者也觀師冕見一章可見聖人接物之誠心若常人之於瞽者鮮不忽易而欺紿之于此亦可以觀聖人之氣象觀聖人與師言辭語從容誠意懇至直使人感慕于數千載之上常人見貴人則加敬見敵者則敬稍衰於下人則慢之而已聖人於上下人已之間皆一誠敬之心敬天之心瞬息不敢怠近來誠實畏天而不敢萌一念之惡洪範篇造化氣數天理人事皆具書之易也二五事踐形盡性之學偹於此易六十四卦三百八十四爻只是君子小人迭為盛衰君子居君子之位小人居小人之位則治反此則亂有天下國家者皆當親君子而逺小人大丈夫以正大立心以光明行事終不為邪暗小人所惑而易其所守以顔子之亞聖聖人猶告以逺佞人况他人乎理明心正則邪媚不能惑好正道則正人至好邪道則邪人至氣類相感也君子之出處當脩之身而聽之天彼卑汚茍賤摇尾乞憐攀援勢要以售進者果何心哉邪正相為勝負乆矣仲虺曰惟天生民有欲無主乃亂惟天生聰明時乂成湯曰惟皇上帝降𠂻于民若有恒性克綏厥猷惟后武王曰惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母歴觀自古聖君賢相之言如此則天之所以立君者不過欲治民教民飬民使各遂其生而已豈有他乎哉老子云𤣥之又𤣥衆妙之門只是説性情衆妙之門猶道義之門老子之書始欲論理之𤣥妙末則流於權術程子曰予之所傳者辭也由辭以得其意則在人焉耳不但讀易之法如此他書皆然荘子斵輪之説深中學者溺於語言而不得其意之弊世有開卷則能説義理真若有所得者掩卷則茫然漫不知所説為何事誠所謂糟粕者也其弊也久矣一一見得理有下落方為真見真見明則邪見不能惑余覺前二十年之功不如近時切實而有味天地者吾之父母也凡有所行知順吾父母之命而已遑恤其他先天圖却觀坤艮坎巽乾兊離震以至復皆前天地之往順觀自復震離兊乾巽坎艮以至坤皆後天地之終往者推其往而無極來者推其來而無窮所謂引之於前而不見其始之合推之於後而不見其終之離也占卜古為大事舜欲禪禹禹曰枚卜功臣惟吉之從洪範稽疑專以卜筮為主大誥洛誥諸篇凡征伐定都大事皆歸重於卜以是知占卜古為大事古者占卜之法聖人以至公無私求之其求之之心固已神矣則龜筮之神安得不應之如所謂官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮協從之語可見後人以私意邪謀求之欲其應也難矣孟子曰茍求其故千嵗之日至可坐而致也康節之學推徃知來葢亦如此雖微細事不可茍皆當處置合宜寡欲省多少勞擾能寡欲便無事無事心便澄然矣余毎呼此心曰主人翁在室否至夕必自省曰一日所為之事合理否讀書所以不見徳崇業廣者只是講説不曽實行如講學而時習章便能學而時習否讀其為人也孝弟章便能孝弟否讀顔子問仁章便能非禮勿視聽言動否若不能如此只是講説耳㸔得為學無别法只是知一字行一字知一句行一句便有益心不妄思一心皆天理身不妄動一身皆天理事不妄為事事皆天理因無窮盡故無方體若有窮盡則有方體矣凡卦六爻以初二三四五六為主以所值九六之爻為客所謂周流六虚者也卦爻六位皆虚隨所值竒偶居之天下無獨必有對河圖卦畫可見迹履之所出也而迹豈履哉書道之所出也而書豈道哉雨皆地氣自下而上蒸騰而成天愈髙則氣愈清不能成雨也雲濃則成雨氣濃則生物易曰天地絪緼萬物化醇遏惡揚善非剛明者不能故於大有言之内剛外明大有也人不能有進只是惑惑者見理未透而心有所疑也疑故欲進不進學至不惑則理明而無疑其進自不能止矣雷電風雲雨露霜雪之類皆氣聚而有聲有形既散則無迹矣神矣夫細㸔天地萬物皆氣聚而成形有聚必有散雖散有大小遲速之不同其散一也謹守下學自能上達㸔聖門教法只是有序無序便差曽子所傳無弊只是教人有序大學可見内剛外和決小人之道決小人當先自脩不可專尚剛強夬曰告自邑不利即戎利有攸徃内健則有必去之志外説則無悻悻之色決小人之善道也取與是一大節其義不可不明理氣雖不可分先後然氣之所以如是者則理之所為也只是合當如是便是理聖人之言雖零碎説而合輳起來則皆貫於一諸子之書非無嘉言但欲一一合輳為一則有不通者矣理直是難説謂無形則須有理謂有理則又無形惟黙識之可也理直要心得難以言語形容之五性之用知最先如開眼作事便要見是非豈不是知在先理氣不可分先後只如太極圖可見太極動而生陽雖自動處説起而其根却自静中來如天之四時貞下起元是也然静又根於動動又根於静所謂動静無端隂陽無始也理只在氣中決不可分先後如太極動而生陽動前便是静静便是氣豈可説理先而氣後也此圖中一小圏即無極而太極動而生陽是右邉隂為之根静而生隂是左邊陽為之根方其動也則太極附動而行方其静也則太極依静而立隂陽相根理氣混合元無間斷先後一陽止於二隂之上山之象一陽剛也石也二隂柔也土也觀之山可見心一收而萬理咸至至非自外來也葢常在是而心存有以識其妙耳心一放而萬理皆失失非向外馳也葢雖在是而心亡無以察其妙耳如手足耳目口鼻之類皆人也其理則道也須是於手足之類事事操持其理斯存所謂人能𢎞道也若手足之類不加操持則理豈能自存哉此道不能𢎞人也古語曰敬徳之聚也此語最宜潜體葢道妙莫測靡有攸定惟敬則能凝聚得此理常在如心敬則凝聚得徳在心上貌敬則凝聚得徳在貌上以至耳目口鼻之類無不皆然或有不敬則心君放逸而天徳亡百體懈弛而物則廢雖曰有人之形其實塊然血氣之軀與物無以異矣此敬之一字乃聚徳之本而為踐形盡性之要也歟周子太極圖朱子之解以心契心者也熟讀精思二三十年庶得其㫖趣之妙殆非淺近之功所可得而窺測也余見説太極者多矣茍非實得真説夢耳朱子曰聚散者氣也若理則只洎在氣上初不是凝結自為一物但人分上合當然者便是理不可以聚散言也理既無形安得有盡理如月氣如水或一海水或一江水或一溪水或一沼水或一鍾水或一盂水水雖不同莫不各得一月之光或一海水盡或一江水盡或一溪一沼一鍾一盂水盡水盡時各水之月光雖不可見而月之本體則常存初不與水俱盡也以是觀之則氣有聚散而理無聚散也又可見矣易有太極言氣以原理太極動而生陽言理以及氣有形者可以聚散言無形者不可以聚散言後人開口論性天道而其理益隠矣近世儒者割裂經史子集百家之説區别門類綴集成書務欲包括古今問目以為决科之利使後學轉相剽竊但資僥倖利達而無以資身心之用其弊也甚矣為科目而著書者皆非為己之學也聖賢專以為己之學教人而猶有為人者况以科舉為人之學教人乎子貢謂夫子之言性與天道不可得而聞也近見性與天道誠有不可得而聞者一部論語聖人所以教人者率多孝弟忠信仁義之道至於性天道僅見於子貢之語而夫子之語則終未之及也後之學者開口即論性天道之微竟不知實於此理為何如俗儒不知教人之本或為講語之類使學者誦習全文為説書應答之用其壊人才也甚矣諸子百家皆有可取之言但欲句句求實用則有不通者矣故曰致逺恐泥聖賢之書統體純粹而不雜諸子之言雜駁中亦有純粹者節取焉可也江邊石壁無寸土而草木生之尤可見剛陽之氣無物有大於理者天地雖大亦一物耳誠知此理有登泰山而小天下之氣象讀朱子語錄雜書斷不若讀其手筆之書後儒纂集雜説語錄附諸經書條下有語同而數處皆見者幾於曰若稽古三萬言矣各經四書註脚之註脚太繁多竊謂不若專讀各經四書正文傳註熟之又熟之以待自得之可也小註脚太繁多不惟有與經註矛盾處亦以起學者望洋之歎學者於正經傳註尚不能精熟即泛觀小注中諸儒之説愈生支節而莫知其本若傳註精熟之餘有餘力而參㸔之可也外慕者皆不知其味也知禮之大則知萬物之小形而上者無窮也天地間無别事只一理隂陽五行化生萬物而已太極圖右半隂中之陽即程子所謂静中有物乃十月純坤中之陽也理一分殊開眼便見理雖微妙難知實不外乎天地隂陽五行萬物與夫人倫日用之常善觀者於此黙識焉則其體洞然矣耳順非特聞人言語為聲入心通雖風雷禽鳥一切有聲之物接於耳者無不悟其妙也張子喜聞驢鳴之意亦如此觸目皆物物識其理所謂眼底無全牛也要當於有形處黙識無形之理所謂費而隠也物格知至則識太極矣孔子曰庸言之信庸行之謹以是知言行之至小者皆當謹信而不可忽今人日用言行將謂小事都不謹信此徳業所以不廣崇也聖人大公無我真天地之氣象後人區區小智自私晝夜圖為無非一身佚欲之計宜其氣象之卑陋也實當脩其在己名無恤其在外己未善人譽之不足喜己有善人毁之不足怒静思善皆已分之當為初與人一毫無與若纔為善即有求名之心乃人欲而非天理矣在外者皆不可必在己者皆所當求太極反之於身精而約者也太極理雖至妙而其實不外乎身心動静五常百行之間後人論太極即作髙逺不可䆒詰之理求之去道逺矣只於身心口鼻耳目手足動静應事接物至近至小處㸔太極尤分明不必專論於千古之上六合之外也然近者小者既盡則逺者大者可黙識而一以貫之矣太極乃至精至約之理全之者聖脩之者賢伏羲觀象以畫卦周子原理以作圖其義一也疾惡之心固不可無然當寛心緩思可去與否審度時宜而處之斯無悔切不可聞惡遽怒先自焚撓縱使即能去惡己亦病矣况傷於急暴而有過中失宜之弊乎經曰勿忿疾於頑孔子曰膚受之愬不行皆當深味事最不可輕忽雖至微至易者皆當以慎重處之觀聖人之去小人皆從容自在若無事者所謂可怒在彼已何與焉者也觀太極圖得一静字為處事之本凡事皆當謹始慮終從事於主敬者斯得太極之妙亦足以發只是尊所聞行所知耳他人聞聖人之言便休顔子於聖人之言句句無不識其理而踐其實故曰亦足以發不為耳目口鼻所役覺得心常泰然螢隨時而出蟲應節而鳴無非教也萬物盡天地老超然獨存再造天地萬物者其太極乎如崖石上草木豈有種皆氣化而生也山下有火賁君子以明庶政无敢折獄上山下火火為山揜明不燭逺故有此象天地之初總是氣化今則氣化形化並行而不息天地之初人物無種純是氣化自人物有種之後則形化雖盛而氣化亦未嘗息自今觀之人與禽獸五穀之類凡有種者皆形化至若昆蟲草木之類無種而生者尚多試以一片白地驗之雖掘至泉壤暴晒焚燒其土俾草木之遺種根蘖皆盡然一得雨露滋澤風日吹晅則草木復生其處此非氣化而何又若腐草為螢朽木生蠧濕氣生蟲人氣生虱之類無非氣化也或謂形化盛而氣化消者竊以為不然石壁上草木最可見生物自虚中來虚中則實氣是也知此直使人有手舞足蹈之喜一切有形之物皆呈露出無形之理來所謂無非至教也人讀書果能於聖人之言句句皆體之身心而力行之即是顔子亦足以發之意讀書只當以正文傳註為本正文傳註已通析尚有可疑者乃可參考語錄諸說竊見傳註之外皆有諸儒小註經文不過數語而小註乃至數千百言其實學者不但不能周覽并經文傳註亦不能精矣若有大聖賢作必重加芟削矣人果能誠心求道雖五經四書正文中亦自有入處若無誠心向此雖經書一章反復以數萬言釋之人亦不能有得也二程因遺經而得不傳之遺緒今之傳註可謂發揮詳且明矣而學者莫肯盡心其間何邪識髙則量大氣盛則聲宏聖賢教人皆畧啟其端使學者深思而自得之如夫子所謂不憤不啟不悱不發孟子所謂引而不發躍如也程子曰易傳只說得七八分待人自去體䆒朱子釋顔樂章曰今亦不敢妄為之説如此之類甚多聖賢之心非不欲一言而使學者盡得其義其實道體深妙有非一言所能盡者而言之輕適足以使聼之者易彼必不能深思而自得也故必畧啟其端使彼深思而自得之則守之固而不㤀矣後之人有於聖賢引而不發者極論其底藴使學者一見之頃即謂吾已盡領其妙而不復致思其實不能真得於心而徒增口語之譁耳以是知聖賢立教為慮甚逺而有益於學者甚大易書春秋誠有不可强通者只當缺其疑文中子曰古之從仕者飬人今之從仕者飬已切中後世䘵仕之病易書春秋以數千年簡編之傳寫豈無一言半句之磨錯必欲字字釋其義難矣不若守朱子讀書之法通其可通者缺其不可通者密汝言和汝氣仲長子光曰在險而運竒不若宅平而無為薛收問仁文中子曰五常之始也問性五常之本也問道五常之一也自有天地即有聖人之教西方之學果是邪伏羲神農黄帝堯舜三代之世又何為不出邪果非邪何其既出而好之者衆邪西方之學未出而天下之治靡所缺既盛而前代之治有所忽其殆有所乗而至邪抑氣化消息邪正相勝而然邪余皆不知其故也三教之説其来乆矣使教有三則天地之化亦有三矣觀竒偶則知邪正有迭勝之理扶陽抑隂距邪閑正非聖賢吾誰望邪孟子曰天之生物也一本而世以三教並稱則是天之生物亦有三本邪異服異音異行人皆知惡之而有不惡者何邪脩已治人始終條理詳偹者無如大學他書非無脩已治人之法但散出而難得其要得其要者大學也人心皆有所安有所不安安者義理也不安者人欲也然私意勝而不能自克則以不安者為安矣大學全體大用之書也大學文簡而包括無窮大學三綱領八條目於千聖之書無不括盡論治而不本於大學非所謂治也大學八條目工夫一節不可缺大學之道其至矣乎不行於世也古矣有大學之工夫則有王佐之事業大學乃諸書之括例不觀諸隂陽乎其化皆以漸而不驟人之處事如是則鮮失矣經傳究竟而不可言者所謂密也理非利口辨舌者所能知惟黙而成之不言而信存乎徳行者識之政出於一則治有所統而民心信唐虞百揆之職揆之一字最有深意政事可止可行莫不揆度其宜可則行否則止此所以政出於一而下無廢事也患知人之不明不患大臣之竊柄葢知人則所任者必君子何竊柄之患不知人則雖防忌大臣不使預事而左右竊柄者必有人矣觀之後漢可見舍大學之道而欲復三代之治未之有也漢唐宋之治所以茍簡而不能復三代之隆者皆不能盡大學之道耳唐太宗欲興禮樂可謂不度徳者也或謂誠得大儒佐漢祖以禮樂為治其效當不止如叔孫通制禮之小竊謂漢祖以馬上得天下不事詩書治家則以私昵為治則以雜霸於人倫之序與和者蔑如也使有大儒生其時果能變其已成之氣習致君徳如三代之隆邪不然則亦無如禮樂何也太極者萬理之總名三綱五常禮樂之本萬事之原聖人論治有本有末正心脩身其本也建置立法其末也太極難說太極神妙不測不問逺近幽深大小精粗無乎不在可見者是氣氣之所以然便是理理雖不離氣而獨立亦不雜氣而無别㸔來理一齊皆具而無一物能外之者氣則萬變不齊理則一定不易天地生人物不是漸安排箇理來與他葢合下便已都定了無添無減無多無少萬古只如是有此理便有此物有此物便有此理元不相離以勢利交者安得不終離易之卦爻象數皆是天生的為君所委任者當以誠報不可一事欺之易從至微以到至著惟以文辭名位自髙而貪鄙之行有不異常人者斯亦不足貴也已畫前之易冲漠無朕之中而萬象昭然已具也挺特自守者必君子攀援附和者必小人太極圖義理精而約該而偹太極中無一物人能中虚無物則太極之妙可黙識矣百姓日用而不知皆為氣所隔昏蔽之極殆與物無異理明而觀衆論之得失了然無毫髪欠缺無瞬息間斷此理真不得而名故夫子取無聲無臭以形容之若以物喻之即滯於形器矣不可以方所求心存則因器以識道㸔來學者不止應事處有差只小小言動之間差者多矣釋氏極論道妙而以金玉珍寳竒怪之物侈言之何邪聖人之心如天物有違忤者終無私怒也釋氏極言其神妙無方慈悲忍辱至於一有毁謗其書不尊其教者即報之以種種之罪又何量之小而心之忮邪大極圖一以貫之天體物而不遺仁體事而無不在吾道一以貫之聖人之言坦易明白讀之千古可見其心老莊之言回邪艱阻使讀者不可摸擬此其所以為異端也聖人之心天地之理只是直聖人聞人毁己譽已元不少動如浮雲一過而太虚湛然教人之法至程朱而復明教人不以小學大學為學不由小學大學皆非教非學也余少年學詩學字錯用工夫多早移向此庶幾萬一治病不求其本除弊不自其源難也已子産鑄刑書叔向譏之此有深意觀孔門諸弟子之言從容和毅皆仿彿夫子之氣象乃聖教涵煦而然也不以禮制心其欲無涯心無所止則一日之間四方上下安往而不至哉衣食之類本為飬生之具不可缺者故聖人為治必開衣食之源以厚民生故衣食飽煖足矣若過求華麗之衣欲以是誇人而有道者無足觀也必有極口腹之欲養小以失大君子不為也是則衣食取足者天理之公過為華侈者人欲之私君子謹之釋老之髙只是無欲無欲而滅絶倫理故曰髙而無實後人只為多欲故為異端所小若能如聖人之無欲而常伸於萬物之上彼烏得而小之君子法乾之健只無私便不息有私則息矣讀書錄卷四
