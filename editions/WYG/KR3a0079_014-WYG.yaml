body:
  text: 讀書續録卷三明薛瑄撰楊龜山曰人性上不容添一物此言當深翫大莫大於道觀於海者難為水逰於聖人之門者難為言物格是知逐事逐物各為一理知至是知萬物萬事通為一理知至乃知性知天也心静不存則放逸動不察則差錯應事差錯由心不專一太極者至極之理也誠而已矣性而已矣自有之私皆足為心累如自有其善便為善所累自有其能便為能所累自有其貴便為貴所累自有其富便為富所累凡自有者皆足以為心累惟聖人之心廣大光明無一毫之私累真與太虛同體也凡有挾者必自小如挾賢挾能挾富挾貴是也因讀論語漆雕開吾斯之言斯指此理而理即性也天下萬理不出於一性知性則可以悟道太極是元亨利貞渾然未分之理纔動而生陽是元亨誠之通静而生隂是利貞誠之復一動一静天命流行分隂分陽兩儀立焉陽變隂合而生水火木金土元亨利貞分五性五行各一太極也性氣妙合生男生女男女各具五性男女各一太極也形交氣感化生萬物萬物各具五性萬物各一太極也性外無一理言忠信是於此理所存所發無不實行篤敬是於此理厚而用力無敢輕參前倚衡是於忠信篤敬念之不忘夫如是則天理常存無徃而不可行矣鳶飛必戾天魚躍必於淵即率性之謂道也孟子言志至焉氣次焉故曰持其志無暴其氣既欲内持其志又欲外無暴其氣内外本末交相培養此養氣之法下文又言我知言我善養吾浩然之氣葢知言者盡心知性物格知至之功又在持志之先理明則能持志集義而又無忘無助長則浩然之氣自生矣曰持其志無暴其氣曰知言曰集義曰無忘曰無助長皆養氣之法其序則先知言而後能持志集義若勿暴其氣勿忘勿􅂇長皆養氣之節制鳶飛戾天魚躍于淵是鳶魚率其性之道父必慈子必孝君必仁臣必敬夫必義婦必從兄必友弟必敬以至語黙動静必合其則萬事萬物之各循其理是人物率其性之道活潑潑地於是可見鳶飛戾天魚躍于淵是隨處充滿無少欠缺之意活潑潑地是元亨利貞之流行活潑潑地就天地萬物萬事上皆可見隂陽剛柔仁義便是易而三極之道同一太極也活潑潑地皆天機之自然太極乃未分之五性五性乃已分之太極天下之萬善皆自此出兩儀四象六十四卦之變易者易也其所以變易者太極也故曰易有太極伏羲畫竒耦以象隂陽本於天地隂陽自然之數周子太極圖圏子只是以意取象而已語言動作皆氣也有過處皆足以動志水動蕩不已則不清心動蕩不已則不明故當時時静定其心不為動蕩所昏可也盡仁義禮知之道於心謂之忠推是道於人謂之恕聖人於是道不待盡己推己自然體無不立用無不行學者必盡己之忠而道之體斯立推己之恕而道之用斯行故曰忠恕違道不逺三才各一太極又總是一太極如天有元亨利貞地亦有元亨利貞人亦有仁義禮知即元亨利貞分而言之為天地人之三極合而言之統一太極也陽卦多隂如震坎艮皆陽卦皆一陽而二隂隂卦多陽如巽離兌皆隂卦皆二陽一隂易由一竒一偶至於無窮以此見造化只一隂一陽而無所不包孟子之知言即大學之物格知至也孟子之知性即大學之物格盡心即知至也道義二字道是統仁義禮知而言義是道之一事又為仁義禮知行之合宜處至大是氣之盛大而無外至剛是氣之流行而無間朱子曰義者人心之裁制道者天理之自然既曰天理則仁義禮知皆道也義則人心裁制是道使合宜耳既言道義下文又止言集義葢事事合宜即道之合宜也五行之氣只是隂陽二氣而隂陽二氣又只是一氣分動静耳太極動静循環無端即維天之命於穆不已朱子曰精粗本末無彼此也是理氣未嘗有間天下無性外之物而性無不在此天體物而不遺也天體無外心體無外道體無外頑不仁也有以訂之則仁矣西銘一篇皆勉人為仁之意正義是太極之體立中仁是太極之用行太極者合中正仁義而言性之謂也元亨誠之通是太極之用行利貞誠之復是太極之體立誠即太極天命即太極性即太極誠命性一理也不根道理之書與文皆無用之冗物如梁元帝之徒雖好文著書動輒數千百卷皆不根道理何救於亂亡簡黙凝重以持己自脩篤敬所以逺小人不惡而嚴一言不可妄發一事不可妄動日間時時刻刻緊緊於自己身心上存察用力不可一毫懈怠以象占觀易得其本義矣八卦成列象在其中此指八卦形體之象非指象乾象坤之象也讀聖賢之書句句字字見有的實用處方為實學若徒取以為口耳文詞之資非實學也柳子晉文公問守原議胡不讀隂陽交錯而實理流行故曰大哉易也其性命之源乎易者隂陽之氣交錯徃來是也而性命之理實具於氣之中故曰易為性命之源道理不出性情二字以性情言之則曰中和以德行言之則曰中庸中庸實兼中和之義是則中和者理之體用也即性情無時而不得其正則中無不在矣萬物各具一理物物一太極也萬理同出一原萬物統體一太極也格物致知物物各有一性窮物之性而極其至則物格知至矣窮理即知性也葢性即理也故窮理即知性也楊龜山論人性上不容添一物是天下之理莫過於性人一身皆動惟背不動故止取背意艮其背不獲其身行其庭不見其人朱子亦以艮其背一句是主下三句是效驗葢謂止得其所止則静而不獲其身動而行其庭不見其人以其所止者皆天理之當然故動静不知有人有己不獲其身不見其人所止者渾是天理故能如此人之一身四肢百體皆有當止之則得其止則安失其止則危人倫之當止者如君止於仁父止於慈臣止於敬子止於孝之類推之萬事萬物皆有當止之則必各得其所止則天理得矣無極太極隂陽五行四時男女萬物渾然一理而無間隔一以貫之太極圖隂陽之能動能静者即是鬼神故張子曰二氣之良能也鬼神是合太極隂陽而言天地萬物無一物無隂陽故鬼神體物而不可遺程子曰以形體謂之天以主宰謂之帝以功用謂之鬼神以妙用謂之神以性情謂之乾皆就天上説其名雖殊其理則一大哉乾元元即元亨誠之通乃太極之動也各正性命即利貞誠之復乃太極之静也鬼神即隂陽屈伸徃來充滿天地貫徹古今無物不有無時不然此所以體物而不可遺也君子得其理為樂小人得其欲為樂渾然一致流行不息皆鬼神之理自人之一身呼吸動静以至天地萬物之消息始終皆隂陽屈伸徃來之所為此鬼神體物而不可遺之實也小人以隠惡為可以欺人殊不知有昭昭不可欺者此心是也人心惟危危是欲墮未墮之間不知察其幾而以道心制之則逐墮於人欲流而入於禽獸矣舜跖之分造端於善利之間充越於天壤之異小人所知者不過耳目百體嗜好之私迷溺其中終身不覺也鬼神屈伸往來之理於先天圖見之天有元亨利貞地順承天施亦有元亨利貞人禀受天賦亦有仁義禮知是天地人同一性命之理三才各一太極又同一太極也太極者何即性命之統名與不以利交則無咎不惑是於五常百行萬物萬事之理了然於心無一毫之疑惑也知天命是知天之元亨利貞流行賦於人為仁義禮知信乃五性所出之原也分而言之則在天為天命在人為五性合而言之則性命之理一而已矣流行對峙之易開眼即見於天地之間聖人之志立不惑知天命耳順不踰矩皆指此理而言但所進有淺深之序耳性即理也循天理即率性也萬事敬則吉怠則㐫先儒謂學易欲人恐懼脩省循之吉違之凶治亂之原皆原於敬怠故唐虞君臣懇懇言敬而不已三代聖人亦然書曰無教逸欲有邦逸欲者亂之源也書言敬者最多敬乃治天下之本孔子曰脩己以敬中庸曰篤恭而天下平皆此意也四書與朱子集註萬世聖賢之書無過於此為聖為賢治心脩身齊家治國平天下之道無所不載學貫天人而一之者也危懼則得安平慢易則必傾覆易之教也易以中正為吉故處事貴乎中正雖未發之不偏不倚而實為已發無過不及之本體故曰未發不是先雖已發無過不及而實未發不偏不倚本體之所為故曰已發不是後萬物各具一性物物各具一太極也萬物同出於一原萬物統體一太極也未應物時心體只是至虛至明不可先有忿懥恐懼好樂憂患在心事至應之之際當忿懥而忿懥當恐懼好樂憂患而恐懼好樂憂患使皆中節無過不及之差及應事之後心體依舊至虛至明不留前四者一事於心故心體至虛至明寂然不動即喜怒哀樂未發之中天下之大本也心之應物各得其當者感而遂通即喜怒哀樂發而中節之和天下之達道也心之寂即利貞誠之復心之感即元亨誠之通一感一寂動静循環無端心之體用其妙如此人心只是當静時不存當動時不察所以静時放逸動時差錯早間又多問人一事為失言聖賢循天理而天理即仁義禮知之性也小人徇人欲而人欲即耳目口鼻百體嗜好之私也舉天下之物皆不及道之貴是何也以出於天而充塞宇宙貫徹古今也知道之大其尊無對則知衆物之小矣元亨利貞仁義禮知只八箇字包括盡天地萬物之理其㫖深矣物格是逐物逐事上窮至其理知至是萬物萬事上心通其理格物猶是物各為一理知至則知萬物為一理暗於事幾而妄為取咎之道也識最先作事次之歴事之乆尚不知幾焉得為知一以貫之一是性貫之是一性貫乎萬事也五性未分渾然一理及泛應萬事莫非此理之用故曰吾道一以貫之夫子之一理渾然是性泛應曲當亦只是性發而為中節之情體用之謂也萬事萬物之理吾心之體用無不該故曰吾道一以貫之聖人之心渾然一理性之全體也泛應曲當用各不同如父子之仁君臣之義夫婦之知長㓜之禮朋友之信之類是也然用雖有千萬端之不同皆原於一性一性又散為萬善一本萬殊萬殊一本統一性之體用耳天下豈有性外之物哉天以一理而貫萬物聖人以一性而貫萬事時與勢於卦爻見之主静以立其本慎動以審其幾常主静物來應之寂而感感而寂動静循環人心之妙也寂感以心言中和以性情言心統性情者也和順於道德是於天理黙契其體無所乖拂理於義是於天理隨順之各有條理以性情言之仁義禮知其體也惻隠羞惡辭讓是非用也周子以義知為静是以體言以仁禮為動是以用言其説自元亨利貞來元亨誠之通非仁禮為動為用乎利貞誠之復非義知為静為體乎舉止不可不慎其幾一毫之差悔不可追仁義中正皆自元亨利貞而來太極者其性命之謂與合萬理而名之曰太極性命是也誠意之要在乎謹之於幽獨隠㣲之處以禁止其茍且自欺之意而凡心之所發如曰好善則必由中及外無一善所好之不實也如曰惡惡則必由中及外無一惡所惡之不實也太極即性命非性命之外别有太極也太極圖貫天人之理為一學貫天人於太極圖見之知至而意未誠是明善未能誠身也未能誠身則所明者不能實有諸己矣學要識總會處即性是也天下萬理一性字包括之深矣哉用工夫未至純熟此吾之日省之不及也今早讀書得一性字卦變只换一爻衆隂方長之時未易勝也深於易者知之雖細事亦當以難處之不可忽况大事乎於方快意之時尤當謹葢理勢盛衰相根快意之時乃盛之極而衰之漸也細思處事最難因讀伊川事狀不覺懼生於心因知天下之事最難處信而後諫未信則以為謗己也君臣朋友皆然可不慎哉朱子曰太極本然之妙動静所乘之機也葢太極即天命之元亨利貞也元亨誠之通乘春夏動之機利貞誠之復乘秋冬静之機朱子曰太極形而上之道也隂陽形而下之器也葢隂陽成形之大者天地即形而下之器也天地之理即形而上之道也幾善惡幾之善者即德愛曰仁宜曰義理曰禮通曰知守曰信也誠無為是仁義禮知信之全體未發者仁義禮知信是誠分為五性也是則誠即五性之實非五性之外别有誠也幾之善是道心幾之惡是人心流而為人欲幾之善是天理幾之惡是人欲周子説幾善惡始於毫釐之間充越天壤之異為堯舜皆原於幾之善為桀紂皆原於幾之惡誠者聖人之本專指隂陽中太極而言大哉乾元萬物資始誠之源也指太極動而生陽也乾道變化各正性命誠斯立焉指太極静而生隂也純粹至善又專指太極而言故曰一隂一陽之謂道隂陽即陽動隂静道指太極也繼之者善又指陽之動誠之源也成之者性又指隂之静誠斯立焉元亨誠之通乃太極之動也利貞誠之復乃太極之静也大哉易也性命之原乎易即隂陽動静也性命即隂陽中太極之理也隂陽動静而太極雖不雜乎隂陽亦不離乎隂陽故曰大哉易也其性命之原乎通書與太極圖相合者如此誠上章以造化言誠下章以人道言五行之外無隂陽隂陽之外無太極太極之外無性與天道性天道太極隂陽五行渾然理氣無間也大道之要不過元亨利貞之命仁義禮知之性而已看了一部中庸得一性字可貫之中庸兼中和之義取以名篇則中庸一書性情二字貫之中庸惟天下至誠能盡其性惟天下至誠為能聰明睿知足以有臨惟天下至誠為能經綸天下之大經三章皆是仁義禮知之性非止三章一書一性字貫之不可有一毫責人之心張子曰無天下國家皆非之理此言當深體治居室當有序而知足不可以欲速盡美累其心朱子本義發明伏羲文王周公之易燈下因觀八卦太極圖曰此浩然之氣也凡聖賢論内外存養之功皆養浩然之氣也動静語黙皆有節不使有太過者皆養浩然之氣也易有隂陽即浩然之氣也處鄉人皆當敬而愛之雖三尺童子亦當以誠心愛之不可侮慢也開物成務言以卜筮開人使之知吉㐫而成事業也道無徃而不在故仕止乆速當無徃而不謹處鄉黨尤宜謹其所為道無不在故也接人皆當以誠意於人之㣲賤皆當以誠敬待之不可忽慢稱意之事不可加喜喜則為外物動矣史至朱子綱目而名分明理於義即庖丁解牛順其理也天地萬物精粗無間皆道也動以天為無妄動以人則妄則人之動皆當循天理也敬字自書中説起孔子解坤六二説敬與義尤詳切為學之要無越於此敬以直内涵養未發之中義以方外省察中節之和莊子論斵輪之意信知聖賢之書神而明之在乎人也敬以直内戒慎恐懼之事義以方外知言集義之事内外夾持用力之要莫切於此西銘大㫖即孟子存心養性所以事天之意太極即孟子所謂性與天也太極圖説君子脩之言即孟子存心養性之謂也程子曰視聽思慮動作皆天也人但於其中要識其真與妄耳竊謂學者日用工夫無有切於此者宜深體力行之聞外議只當自脩自省凡言天理者皆性命之謂也體用一源以至㣲之理言之如人心未發之時雖冲漠無朕而萬事萬物之用已具故曰體用一源顯㣲無間以至著之象言之如人之一身以至君臣父子萬物萬事而理無不在故曰顯㣲無間人之念慮不正者有二有妄念有惡念如思慮不可必得之事妄念也思慮悖理違道之事惡念也凡此二者心纔知覺即遏絶之必使念念皆出乎仁義禮知惻隠羞惡辭讓是非性情之正則不正之念自消而思慮皆天理矣此實日用省察之切要不可毫髪間斷也行有不得者皆當反求之己不可有怨天尤人之意道無處不在故當無處不謹其曰體用一原者無聲無臭者體也而天地萬物之理無不具故曰一原其曰顯㣲無間者天地萬物顯也而無聲無臭之理無不具故曰無間葢體與㣲皆以理言用與顯皆以象言理中有象象中有理初無毫髪之間也自天地萬物有形之象觀之而無聲無臭之理皆寓其中故曰顯㣲無間也自無聲無臭之理觀之天地萬物之象悉具於中故曰體用一原也如太極無聲無臭而兩儀四象八卦以至六十四卦三百八十四爻之象昭然已具所謂體用一原也自兩儀四象八卦以至六十四卦三百八十四爻之象莫不有太極之理所謂顯㣲無間也如人之一身四肢百骸顯也而莫不各有自然之則所謂㣲也即顯而㣲不能外故曰無間體用一原顯㣲無間舉目而在顯者器也㣲者道也器不離道道不離器故曰無間無極而太極而隂陽五行男女萬物之象無不具於其中所謂體用一原也隂陽五行男女萬物莫不各有無極太極之理所謂顯㣲無間也帝王之治天下德為本政為具刑以輔之書詩稱堯曰克明俊德舜曰𤣥德禹曰秪德湯曰懋德一德文王純亦不已武王惟皇之極此皆以德言也德者天所賦人所受之正理帝王推此理以化天下又建制立政以匡正之如此不從者乃有刑以治之為治本末先後具舉有序此所以天下無不化之民後世本有未盡而專恃政刑之末所以治不古若也與所謂王道者真實愛民如子孟子所謂老吾老以及人之老幼吾幼以及人之幼上以是施之則民愛之如父母者有必然矣孟子一書皆從仁義禮知中流出所以為聖賢之言所以為王者之道漢髙祖定天下文景尚節儉安民養民之功固大必欲如王者之無私治之教之使既庻且富而興於禮義則有間矣朱子與陳同甫論漢唐不如三代之純猶碔砆美玉之易别但後人溺於功利之卑而不之察耳為治舍王道即是霸道之卑陋聖賢寧終身不遇孔孟不自貶以徇時者為是故也有實理則有物無實理則無物滿天地間皆一實理萬古常然不易顯㣲無間即事即物而理存純則誠雜則偽天地聖人之道誠而已誠譬之精金無銅鐵之雜金有一分銅鐵之雜則不精德有一毫人偽之雜則不純矣一念之妄非誠也一語之妄非誠也一動之妄非誠也必念慮語言動作皆出於無妄斯為誠矣王道君臣以至誠相與如虞舜臯䕫稷契湯武伊傅周召是也自漢初君臣皆以詐而不以誠王道降矣釋子塵芥六合然六合無窮安得塵芥之夢幻人世然人世皆實理安得夢幻之大而不可窮者天也知天大則知道大矣孟子曰知性知天學至於知性知天則物格知至矣宋季以道學為偽元初得諸儒性理之書建太極書院以尊崇濂洛諸君子是宋季不如元初而治忽之效亦可驗矣道之行否關乎氣運之盛衰孔孟皆歸之天而不以尤人理當如此春秋之時有孔子斯道大明戰國之時有孟子斯道有寄自秦漢以降世儒以知謀功利相髙不知道為何物故韓子曰軻之死不得其傳程子曰退之必有所見不知所傳者為何事竊謂天命之性道也聖賢明此道行此道是以道得其傳不明不行則天命之性雖未嘗不具於人心然人既不明不行則道失其傳矣三綱五常立國之本循之則治違之則忽聖賢萬世所傳之道只是天命之性自伏羲神農黄帝堯舜禹湯文武周孔顔曾思孟以至周程張朱雖垂世立教之言有不同而其理則豈有異哉人莫不飲食也鮮能知味也中庸其至矣乎民鮮乆矣索隠行怪古有此言亦必有此行况後世乎程子言所接不雜者三人葢所學純乎仁義禮知之道則不雜或出入乎異端術數世俗之學則雜矣天下之理有正有邪正者仁義禮知聖賢之學也邪者異端權謀術數非聖賢之學也謹守正理不為邪學所惑則近道矣程子曰純則不貳不雜不己則無間斷先後此言天德也不貳不雜則無一毫人欲之私無間斷先後則無一息人欲之間如顔子三月不違仁則三月之後猶未免有間斷先後此純亦不已為文王至德也與嘗自念己學安敢望聖賢之萬一但頗識趨向之正不為異學所惑耳知上達天理由下學人事則凡事不敢不謹造化萬變皆是隂陽做出人事萬變皆是動静做出河圖洛書出而天地之數著而理亦寓於數中矣羲皇雖未畫卦而天地自然之易已著邵子所謂畫前之易也無極二字雖出於太極圖説然邵子曰無極之前隂含陽也邵子有功於易之象數伊川有功於易之義理朱子明易之象數兼程子之義理三夫子有功於易自孔子以來未之有也朱子本義是伏羲文王周公之易游民事末作及隠於異端者多則力本者少矣為政清其源而流自潔當悔者既不可追但不可再萌可悔之事耳聞政之善則喜如復卦之亨也程子曰省躬責己不可無亦不可常留在心作悔葢常留在心作悔則心體為所累而不能舒泰也有悔思有以補其過則無悔矣先天四圖邵子傳自希夷而易之象數復明聖人仕止乆速皆循乎理之自然觀孔子可見矣易大傳説卦曰河出圖洛出書聖人則之乃伏羲則其隂陽之數以畫竒偶也又曰易有太極是生兩儀兩儀生四象四象生八卦乃伏羲因其自然之理一分為二二分為四四分為八也又曰知來者逆由乾至坤皆得未生之卦也又曰因而重之則於八卦之上加倍為六十四也又曰天地定位山澤通氣雷風相薄水火不相射八卦相錯數徃者順知來者逆乃伏羲規横圖為圓圖自震至乾為數徃之順自姤至坤為知來之逆也此皆孔子發明伏羲作易之本原與卦象次序方位但先天圖隠而不傳之時雖有大傳説卦之言讀者莫知其説及邵子得先天圖然後以大傳説卦之言證之一一相合於是象數始大明河圖洛書五行一隂陽也隂陽一太極也太極本無極也與周子太極圖相合如此先天圖出於希夷不知希夷又自何而傳朱子始謂周子不繇師傳黙契道妙及覆定周子事狀則引張忠定言公事有隂陽之説疑其所傳之有端緒與初説不同晝夜之一闔一闢者易也人之一寤一寐一動一静亦然所謂易者無須㬰之間隂陽太極渾然無間春秋西狩獲麟先儒以感麟而作經者為是葢麟乃王者之瑞也出得其時斯為祥出非其時反是當魯哀公之世果何時邪而麟乃出其非祥明矣聖人以是知世道之降而不可復於是有感而作經至獲麟而止自是之後則一事不可復書矣若以文成致瑞引前聖之事證之恐有未合况孔子世家書獲麟於先作春秋於後此又一證也姑書所見以俟來哲孔子周流四方欲行其道於天下豈不如長沮桀溺之徒知道之終不能行但聖人仁民之心即天地生物之心天地不以窮冬大寒而已其生物之心聖人亦豈以時世衰亂而己其行道之心乎造化人事皆自渺綿之端以至於充盛而不可遏如坤之初六一隂始生於下必至於堅氷當曹魏之時索頭鮮卑來貢質亦猶一隂之㣲也直至元魏跨有中原之盛是以聖人脩德為治必謹乎㣲也否極則泰塞乆必通造化人事必然之理也易九圖河圖洛書天地自然之易也先天四圖伏羲之易也後天二圖文王之易也卦變圖孔子之易也一時之强弱决不能奪萬世之是非名義真有可畏觀朱子綱目書法可見樂天知命故不憂安土敦乎仁故能愛聖人之事也聖人遯世不見知而不悔既自得其固有之理與人何與讀書續録卷三
