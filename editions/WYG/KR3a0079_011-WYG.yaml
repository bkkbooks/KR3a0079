  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0079_WYG_011-1a, image: WYG0711/WYG0711-0696c.png}
body:
  text: 讀書録卷十一明薛瑄撰誠即五常之實理非五常之外别有誠也如實有是仁實有是義實有是禮實有是智是也即理而物在其中即物而理無不在如未有此宫室已有此宫室之理及有此宫室而理即在宫室之中如未有天地萬物已有天地萬物之理及有天地萬物而理即在天地萬物之中所謂體用一源顯微無間也名臣言行録載伊川為講官時文士歸其門者甚衆而伊川亦以天下自任論議褒貶無所顧避疑此八字或記言者之過伊川知易者豈容信口議論褒貶而無顧避乎朱子曰無極而太極所以明夫道之未始有物而實為萬物之根柢也人多於快意之事忘却道人為學至要當於妄念起處即遏絶之予每嘗用力於此故書以自勵忘與助學者之通患宋徽宗結金人攻遼之事始於童貫挾馬植来小人之肇亂也如此太極只在乎動静而已朱子稱周子曰先生之精因圗以示先生之蘊因圗以發其曰精者即無極而太極隂陽五行男女萬物也其曰蘊者即包涵無窮之理也太極者合天地萬物之理而一名之耳易有太極易即隂陽太極即道也澤藏珠而川媚石蘊玉而山輝有本之謂也莊子曰聖人貴精此之謂歟河圗洛書萬數萬象萬理之源天以至理示人者河圗洛書是也太極圗用功之要只在君子修之吉小人悖之凶修之者修此仁義中正也悖之者悖此仁義中正也故敬則欲寡而理明寡之又寡以至於無則靜虛者正也義也太極之體以立動直者中也仁也太極之用以行而聖可學矣劉靖修叙學有博文之功無約禮之實或非其所作或其少作也河圗具五行之數春夏秋冬元亨利貞仁義禮智無不在焉河圗一六水二七火三八木四九金竒數二十偶數二十中虛五以象太極是即五行一隂陽隂陽一太極也兩儀四象八卦以至六十四卦象數之理即太極也象數理氣渾然無間理雖不雜亦不離也伊川為講官以三代之上望其君從與否則在彼而已其肯自貶其道以徇之哉伊川晦菴為講官時姑取以備故事資口耳而已二子即以真知力行望其君宜其不合也咸九五咸其脢無悔脢背肉感所不見之地則無悔武王不忘逺當之太極解未至此而修之不知此而悖之此皆指中正仁義而言孟子論仁義禮智即太極也中正仁義性也性即太極也夫豈性之外復有太極太極之外又有所謂性哉太極之理中庸備之六經四書之理不出太極先儒曰慾心一萌便思義理以勝之即窒慾之要也古人有曰不見可欲使心不亂故四勿視為先人只是有已故不能與天地同其大其要惟在克已河圗一六二七三八四九之數各相合洛書一六二七三八四九之數各相近發明大易象數之原始於卲子繼之者朱子也作易本原不過夫子易有太極是生兩儀兩儀生四象四象生八卦數語但諸儒不之察獨卲子朱子能發明之河圗虛其中者太極也竒數二十偶數二十者兩儀也一六二七三八四九者四象也四實四空者八卦也夫子易有太極是生兩儀兩儀生四象四象生八卦之言盖本於此朱子論易象數皆本於大傳啓䝉見作易之原與卜筮之本義聖人方静之時正也義也寂也太極之體以立方動之時中也仁也感也太極之用以行此聖人之一動一靜無非妙道精義之發有不待言而著者學易只在語黙動静之間須時時學之聖人方静之時百體收歛一心湛然而萬理咸具及其動也随感而應動容周旋中禮耳目有聰明之理手足有恭重之理以至人倫之間各有仁義禮智信之理夫豈待言而後著哉天雖不言而元亨利貞循環無端運而為春夏秋冬之序發而為温熱凉寒之氣萬物生長遂成各正性命夫豈待言而後顯哉聖人發無言之教以示學者當求聖人之道於一身動静應事接物之間不可專求聖人之道於言語文字之際也學須切問近思方可見道不逺人易不外動静人之一動一静而太極無不在焉太極者本然之妙也動静者所乘之機也隂陽動静亦如此朱子論喜怒未發之中曰盖當至静之時但有能知覺者而未有所知覺也故以為静中有物則可而便以為纔思即是已發為此則未可以為坤卦純隂而不能無陽則可而便以復之一陽已動為此則未可也朱子曰程子言纔思即是已發能發明子思言外之意盖言不待喜怒之發但有所思即是已發此意已極精微説到未發界至十分盡頭不可以有加矣庖丁解牛人處常變之道備焉夬之上六不言隂有復生之理獨於剥之上九言陽有復生之理聖人扶陽抑隂之意也庖丁解牛順其自然之理而行之如技經肯綮之未嘗逆理則大軱矣庖丁解牛只是順理謝氏曰明道先生善言詩未嘗章解句釋但優游翫味吟哦上下便使人有得處又曰明道先生談詩並不曽下一字訓詁只轉却一兩字㸃掇念過便教人省悟竊觀朱子詩傳只轉一兩字㸃掇念過盖得明道談詩意也孔子教人不語以未至者朱子文集有未為定說者如盡心知性一段與孟子盡心知性集註不同當以集註為定說道體至中庸發明顯著矣復之卦辭言造化之復爻辭言人心之復知時識勢學易之大方也朱子與皇甫文仲帖曰本義義理不能出程傳但節得差簡畧耳朱子曰感是事来感我通是自家受他感處之義外聖賢之學便是異端機權世俗之學許魯齋曰吾道大公至正以天下公道大義行之故其法度森然明以示人竊謂異端正與吾道相反朱子曰孔子只説義之和為利不去利上求利只義之和處便是利又曰義者得宜之謂處物得其宜不逆萬物即所謂利程子曰敬義夾持直上達天徳自此為學之要也張旭見擔夫與公主爭道及公孫大娘舞劒而草書進乃心嘗思念至此而感發程子曰須是思方有感悟處若不思怎生得如此然可惜張旭留心於書若移此思道何所不至此即無忘之意師初六爻辭曰師出以律不臧凶象曰師出以律失律凶也失律即不臧也君子行有不得皆反諸己而無責人之心鳶飛魚躍是道理無一毫之空缺處逝者如斯不舍晝夜是道理無一息間斷處張子曰無天下國家皆非之理學至於不責人其徳進矣春夏之陽木火之氣也秋冬之隂金水之氣也此五行隂陽無餘欠也隂陽不在五行外太極不在隂陽外公孫支言夷吾忌克忌猜疑克好勝二者人之大病也不可不去知至至之上至字是至處下至字是到那至處知終是終處終之是終而不去夫剛立之稱見比卦傳自古作史者茍非大公至正之人愛憎取舍之間失其實者多矣孟子曰盡信書不如無書莊周曰儒者偽辭劉靖修詩曰紀録紛紛已失真語言輕重在詞臣若將字字求心術恐有無邊受屈人數子之言曲盡作史之弊蠧生木中枝葉從之顛仆詩曰顛沛之揭枝葉未有害本實先撥故王者以治内為本内不治而末雖安不足恃也漢元成哀平之世可見矣列子曰運轉不已天地宻移疇覺之哉是天地之化無一息之間如人之自少而老物之自盛而衰無須臾之不變但人自不察耳無卜筮而知吉凶最宜詳翫人所為順理即所謂惠迪吉又何必卜筮而知吉乎人所為悖理即所謂從逆凶又何必卜筮而後知凶乎無行所悔最為難事雷撃而為雷斧星隕而為石是皆氣結而成者以是知土石之類皆天地之初氣凝結而成但剛為陽柔為隂耳五行固有隂陽就水木火金土上又各有隂陽如水隂也其質属隂其氣属陽之類讀書録卷十一
