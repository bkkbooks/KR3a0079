body:
  text: 讀書録卷一明薛瑄撰横渠張子云心中有所開即便劄記不思則還塞之矣余讀書至心有所開處隨即録之盖以備不思而還塞也若所見之是否則俟正於後之君子云河東薛瑄謹識無極而太極非有二也以無聲無臭而言謂之無極以極至之理而言謂之太極無聲無臭而至理存焉故曰無極而太極以性觀之無兆朕之可窺而至理咸具即無極而太極也統體一太極即萬殊之一本各具一太極即一本之萬殊統體者即大徳之敦化各具者即小徳之川流天地間只有理氣而已其可見者氣也其不可見者理也故曰君子之道費而隱教本於道道本於性性本於命命者天道之流行而賦於物者也故曰道之大原出於天大而六合小而一塵氣無不貫而理無不寓故曰君子語大天下莫能載焉語小天下莫能破焉遠遊篇曰道可受兮而不可傳其小無内兮其大無垠形容道體之言也天下無性外之物而性無不在故道不可離元亨利貞天之四徳仁義禮智人之四徳天徳流行而不息者剛健而已人雖有是徳而不能無間斷者由有私柔雜之也故貴乎自强不息人心有一息之怠便與天地之化不相似天地之間時時處處皆是道之流行人之道即天之道故當隨時隨處省察不可有毫髮之間斷也天理無内外隱顯之間故貴乎謹獨獨處不能謹而徒飾乎外偽也為學之要莫切於動靜動靜合宜者便是天理不合宜者便是人欲人心一息之頃不在天理便在人欲未有不在天理人欲而中立者也吾於靜時亦頗識是理但動有與靜違者由存養省察之不至也嘗念顔子三月不違仁諸子或日一至焉或月一至焉吾自體驗此心一日之間不知幾出幾入也以是知聖賢之學極難而亦不可不勉吾於所為之失隨即知而改之然未免再萌於心因謂有不善未嘗不知易知之未嘗復行難徧滿天下皆氣之充塞而理寓其中天者萬物之祖生物而不生於物者也釋氏亦人耳其四肢百骸固亦天之所生也豈有天所生者而能擅造化之柄邪若如其說則天不在天而在釋氏矣萬物始終莫非隂陽合散之所為釋氏乃有輪廻之說則萬物始終不在造化而在釋氏矣寧有是理邪道大無外知者鮮矣天理流行隨處充滿無少欠缺故程子作字時甚敬曰只此是學物之栽者根乎氣其生理向盛故天因有以培之若物之傾者則與氣不相連屬而生理已絶故天因有以覆之聖人之徳根乎天理浩浩不息猶物之栽而根乎氣也是以保佑眷顧而天之培養者自不能已凶人則戕賊仁義自絶其固有之理於天亦猶物之生氣已絶故天之所以覆亡者有必至是以培之覆之雖若出於天之所為而實皆有以自取之也易傳曰易變易也變易以從道也如人之一動一靜者變易也而動靜之合乎理者即道也少欲覺身輕心中無一物其大浩然無涯人之一身五臟耳目口鼻四肢百骸凡有形者皆形而下之器也其五臟耳目口鼻四肢百骸之理即形而上之道也推之君臣父子夫婦長幼朋友皆形而下之器也其仁義禮智信之理即形而上之道也以至大而天地萬物小而一髮一塵凡可見者皆形而下之器其不可見者皆形而上之道然器即囿乎道之中道不離乎器之外故曰道亦器也器亦道也周書曰惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母此言理一分殊西銘之原疑出於此先儒曰在物惟理處物為義如君之仁臣之敬父之慈子之孝之類皆在物之理也於此處之各得其宜乃處物之義也易曰顯諸仁藏諸用盖顯諸仁是藏諸用之發見處藏諸用是顯諸仁之機緘處顯諸仁是元亨誠之通所以著藏諸用之妙藏諸用是利貞誠之復所以為顯諸仁之本顯諸仁是藏諸用之所為乃發見而可見者藏諸用是能為顯諸仁之機緘而不可見者顯諸仁似隱而費藏諸用似費而隱仁本在内以顯則在外用本在外以藏則在中中孚二體皆中實全體則中虛中虛則無物中實則有理故曰中虚信之本中實信之質無物而有理即無極而太極也每日所行之事必體認某事為仁某事為義某事為禮某事為智庶幾久則見道分明吾居察院中每念韋蘇州自慚居處崇未覩斯民康之句惕然有警於心云孔子曰不患無位患所以立惟親歴者知其味余忝清要日夜思念於職事萬無一盡况敢恣肆於禮法之外乎自京師至沅六七千里涉越名山大川見萬物生生之盛不以逺邇有異所謂語大天下莫能載語小天下莫能破者當有以黙識之余昨自京師来湖南瀕行院中僚友有誦唐人此鄉多寳玉慎莫厭清貧之句余每不忘其規戒之厚程子書視民如傷四字於座側余每欲責人嘗念此意而不敢忽為政以法律為師亦名言也既知律己又可治人凡國家禮文制度法律條例之類皆能熟觀而深考之則有以酬應世務而不戾乎時宜為官最宜安重下所瞻仰一發言不當殊愧之嘗觀山勢髙峻直截即生物不暢茂其勢奔赴溪谷合輳廻環者即其中草木暢茂盖髙峻直截者氣散走難畜聚故生物之力薄廻環合輳者元氣至此蓄積包藏者多故生物之力厚水亦然灘石峻即水急而魚鱉不留淵潭深則魚鱉之屬聚焉以是而騐諸人其峭急淺露者必無所蓄積必不能容物作事則輕易而寡成寛緩深沉者則所蓄必多於物無所不容作事則安重有力而事必成善學者觀於山水之間亦可以進徳矣氣直是難養余克治用力久矣而忽有暴發者可不勉哉二十年治一怒字尚未消磨得盡以是知克己最難天地之間物各有理理者其中脉絡條理合當是如此者是也大而天之所以健而不息地之所以順而有常皆理之合當如此也若天有息而地不寧即非天地合當之理矣以萬物觀之如花木之生春夏秋冬之各有其時青黄赤白之各有其色萬古常然不易此花木合當之理也若春夏者發於秋冬秋冬者發於春夏青黄者變為赤白赤白者變為青黄即非花木合當之理矣以至昆蟲鳥獸莫不各有合當之理以人言之自一心之所存以至一身之所具皆有降𠂻秉彞之性而不可易者乃合當如是之理也不如是則非人之理矣以至君之仁臣之敬父之慈子之孝夫婦之别皆合當如是之理也凡此一有不盡則非人倫合當之理矣此理之所以無物不有無時不然語大天下莫能載語小天下莫能破也觀崖石每層有紋横界而層層相沓盖天地之初隂陽之氣盪摩而成若水之漾沙一層復一層也意其初必柔軟如濕泥然及凝結之久遂成堅剛北方石炭未出穴時其軟如泥出穴見風即硬此可驗崖石始柔終剛也孟子言浩然之氣至大至剛至大則大而六合細而一塵無非此氣之充周至剛則貫崖石而草木生透金鐵而鏽澁出人之氣即天地之正氣也能直養而無害則塞天地貫金石至大至剛者可見矣人之子孫富貴貧賤莫不各有一定之命世之人不明諸此往往於仕宦中昧冐禮法取不義之財欲為子孫計殊不知子孫誠有富貴之命今雖無立錐之地以遺之他日之富貴將自至使其無富貴之命雖積金如山亦將蕩然不能保矣况不義而入者又有悖出之禍乎如宋之吕䝉正范文正公諸公咸以寒微致位將相富貴兩極曷嘗有賴於先世之遺財乎然則取不義之財欲為子孫計者惑之甚矣富貴利達在天無可求之理徳業學術在人有可求之道誠欲厚其子孫以可求者教之善矣欲以不可求者厚之豈非愚之甚邪余在長沙道中偶得兩句云忽悟天無際方知道不窮一日偶思性非特具於心者為是凡耳目口鼻手足動靜之理皆是也非特耳目口鼻手足動靜之理為是凡天地萬物之理皆是也故曰天下無性外之物而性無不在中夜思凡聖賢之書所載者皆道理之名也至於天地萬物所具者皆道理之實也書之所謂某道某理猶人之某名某姓也有是人之姓名則必實有是人有是道理之名則必實有是道理之實學者當㑹於言意之表余每夜就枕必思一日所行之事所行合理則恬然安寢或有不合即展轉不能寐思有以更其失又慮始勤終怠也因筆録以自警中孚傳曰中虛信之本中實信之質盖中虛者無物也中實者有理也無物而有理即所謂沖穆無朕之中萬象森然已具也視富貴如浮雲許魯齋其人也魯齋余莫測其為何如人但想其大而已欲淡則心清心清則理見五經四書皆聖賢之言也由其言以得其心則在人焉耳經書形而下之器也其理形而上之道也滯於言詞之間而不㑹於言詞之表者章句之徒也程子曰求言必自近易於近者非知言者也積累之久涵泳之深當别有所見聖賢千言萬語皆說人身心上事誠能因其言以反求諸身心猛省而擺脫盡私累則身心皆天理而大可知矣嘗黙念為此七尺之軀費却聖賢多少言語於此而尚不能脩其身可謂自賊之甚矣老莊雖翻騰道理愚弄一世竒詭萬變不可摸擬卒歸於自私與釋氏同聖人之所以為聖人以其公天地萬物為一體屈伸消長進退存亡一由乎理之自然而不自私也老莊必欲外天地萬物極其智術為巧免之計其自私也甚矣老莊於道理非無所見但不勝其避害自私之心遂鄙薄而不為是豈聖人大公至正之心乎莊子之言雖曰形容道體然不能必信而行之是亦知之實有未至也使知之至則必信之篤信之篤則行之必至矣程子所謂窺測天道未盡者盖謂此元人有以北有許衡南有呉澄並稱者此非後學所敢輕議然即其書求其心考其行評其出處則二公之實可見矣許魯齋在後學固不能窺測竊嘗思之盖真知實踐者也許魯齋余誠實仰慕竊不自揆妄為之言曰其質粹其識髙其學純其行篤其教人有序其條理精宻其規模廣大其胸次洒落其志量𢎞毅又不為浮靡無益之言而有厭文弊從先進之意朱子之後一人而已四書集註章句或問皆朱子萃羣賢之言議而折衷以義理之權衡至廣至大至精至宻發揮先聖賢之心殆無餘蘊學者但當依朱子精思熟讀循序漸進之法潛心體認而力行之自有所得竊怪後人之於朱子之書之意尚不能遍觀而盡識或輙逞己見妄有疵議或勦拾成說寓以新名衒新竒而掠著述之功多見其不知量也四書當先以集註章句為主参之於或問如輯釋諸書固多有發明處但語録或因人淺深而發或有未定之論諸儒又或各持所見間有與朱子異者若經文集註章句未通而汎觀此則本義反為所隔使人將有望洋之嘆若經文集註章句或問既已通貫在己之權度既定然後兼考諸書則知所擇矣余讀集釋洒掃應對條下載朱子語録曰洒掃應對有形而上者精義入神亦有形而上者竊疑此語或記者之誤盖精義入神謂精究事物之理入於神妙是即形而上者也若謂精義入神以上又有形而上者則精義入神為何物耶許魯齋自謂學孔子觀其去就從容而無所係累真仕止久速之氣象也魯齋召之未嘗不徃往則未嘗不辭善學孔子者也嘗觀周子二程子張子邵子皆與斯道之傳者也而朱子作大學中庸序惟以二程子繼孟氏之統而不及三子何邪盖三子各自為書或詳於性命道德象數之㣲有非後學造次所能窺測二程則表章大學中庸語孟述孔門教人之法使皆由此而進自洒掃應對孝弟忠信之常以漸及乎精義入神之妙循循有序人得而依據此朱子以二程子上繼孔孟之統而不及三子歟然朱子於太極圖通書則尊周子於西銘正䝉則述張子於易則主邵子又豈不以進脩之序當謹守二程之法博學之功又當兼考三子之書邪及朱子又集小學之書以為大學之基本註釋四書以發聖賢之淵微是則繼二程之統者朱子也至許魯齋專以小學四書為脩己教人之法不尚文辭務敦實行是則繼朱子之統者魯齋也異端欲知其得失亦不可不觀其書但吾學既明雖觀其書不為所惑茍吾學未明而先觀之鮮不陷溺其中矣老莊之書切不可深溺若溺其說而誦習不已猶居齊齊言居楚楚語發於心術文辭有不覺者矣莊子好文法學古文者多觀之茍取其法不取其詞可也若併取其詞為己出而用之所謂鈍賊也韓文公作送髙閑上人序盖學其法而不用其一詞此學之善者也存諸心者不雜見於行者不雜措諸事業者不雜形諸文詞者不雜斯謂真儒矣數者有一雜焉其得為真儒乎明道先生著述極少先儒謂其作用近聖者言其氣象也後人著述雖多而氣象有不近似者知者必識之余少知王霸之名而不知其實近日方思得之盖謂之王者自一念一慮一心一身刑于妻子達之家國天下無非仁義禮智之充周初無内外隱顯逺近之間也程子所謂有天徳者便可語王道天徳即仁義禮智之徳王道即是徳推之政事達之家邦天下者是也謂之霸者形諸念慮身心者無非人欲之私施諸政事征伐者則假夫仁義之名其内外隱顯逺近名實判然不相須矣此王霸誠偽之所以不同也歟聖人未嘗有自聖之心後世儒者未有所至即髙自品置如揚雄之法言王通之續經皆以孔子自擬也二子非特不知聖人亦不自知為何如人矣自今觀之豈足以逃識者之鑑聖人作經皆寫其身心之實耳使非寫其身心之實則人作一書皆可謂之經矣余徃年在中州嘗夣一人儒衣冠其色黯然謂是朱文公告余曰少嗜欲多明理明發遂書其言于壁一日在湖南靖州讀論語坐久假寐既覺神氣清甚心體浩然若天地之廣大怱思前語盖欲少則氣定心清理明㡬與天地同體其妙難以語人莊子曰嗜欲深者天機淺盖嗜欲昏亂此心則理無自而見故周子曰一者無欲也無欲其至矣視民如傷當銘諸心深以刻薄為戒每事當從忠厚寧人負我毋我負人此言當留心聖賢之言坦易而明白異端之言﨑嶇而茫昧無形而有理所謂無極而太極有理而無形所謂太極本無極形雖無而理則有理雖有而形則無此純以理言故曰有無為一老氏謂無能生有則無以理言有以氣言以無形之理生有形之氣截有無為兩段故曰有無為二聖賢之言順之則吉逆之則凶有欲則人得而中惟無欲則彼無自而入惟寛可以容人惟厚可以載物中夜忽思天下無性外之物而性無不在君臣父子夫婦長幼朋友皆物也而其人倫之理即性也佛氏之學有曰明心見性者彼既舉人倫而外之矣安在其能明心見性乎若果明心見性則必知天下無性外之物而性無不在必不舉人倫而外之也今既如此則偏於空寂而不能真知心性體用之全審矣程子謂其言為無不周徧實則外於倫理不其信歟余讀泰否卦辭内君子而外小人君子道長小人道消為泰内小人而外君子小人道長君子道消為否因是以念諸葛武侯之言曰親賢臣逺小人此先漢所以興隆親小人逺賢臣此後漢所以傾穨嗚呼豈獨漢室也哉歴觀數千載以来國家天下之治亂興亡未有不原於此者若武侯之言可謂深得大易之㫖而足為萬世之明戒矣盡心工夫全在知性知天上盖性即理而天即理之所從出人能知性知天則天下之理無不明而此心之體無不貫茍不知性知天則一理不通而心即有碍又何以極其廣大無窮之量乎是以知盡心工夫全在知性知天上不怨天不尤人理當如是人之出處當安於義命不安於義命妄也脩徳行義之外當一聴於天若計較利達日夜思慮萬端而所思慮者又未必遂徒自勞擾秪見其不知命也安往而非事安往而非道人臣當即所遇以為其事則道無不安矣茍不能安於所遇在此念彼則不能以道自處審矣博文是明此理約禮是行此理臨卦當十二月陽剛浸長之時而以来年八月陽消隂長為戒聖人之慮逺矣余在沅辰令一小童燒栗忽殻破聲爆可畏盖熱氣在内不得出故奮裂而有聲先儒論雷霆之理盖如此朱子釋彌髙彌堅曰無窮盡釋在前在後曰無方體盖無窮盡者理之大而不可限量無方體者理之妙而無所不在其實一也樞始得其環中以應無窮莊生形容道體之言也元来只一理貫徹天地萬物分之不為少合之不為多也無欲非道入道自無欲始無一物而外理者舉目而物存物存而道在所謂形而下形而上者是也道本無名姑以萬物萬事必由是以行故强名之曰道耳讀書當因其言以求其所言之實理於吾身心可也不然則滯於言語而不能有以自覺矣是何足與言仁義也莊周有之其不恭莫大焉天以一故實地以二故虛利貞者乾之靜也元亨者乾之動也動不生於動而生於靜靜不生於靜而生於動互根之謂也導友善不納則當止宜體此言不可因小人包承而易其志未合者不可强言以鈎之若然則近於譎慎言其餘深有味誠不能動人當責諸己韋應物詩曰所願酌貪泉心不為磷緇亦可以為守身之戒張子曰當知天下國家無皆非之理盖人能仁必實仁自足以得親義必實義自足以得君禮必實禮自足以事長知必實知自足以治人信必實信自足以得友如是而不得者命也亦何責人之有若在己者皆不能盡一有不得即懐責人之心是豈君子之道哉故學至於不責人則其學進矣一故神太極也兩故化隂陽也水柔石剛石為水漸浸蕩薄之久銷削剥落剛不能勝柔此亦可見不能感人皆誠之未至太極一圈中虛無物盖有此理而實無形也無極而太極惟無形而有理一言括盡揚子四重四輕之說吾有取焉學以靜為本常沉靜則含蓄義理深而應事有力少言沉黙最妙厚重靜定寛緩進徳之基無欲則所行自簡讀朱子語録不若讀易本義四書集註章句或問諸手筆之書為定論有餘力則恭考語録之類可也科舉之文盛而理明者間有之因而晦者尤多矣纔欲脩辭以立誠則言自簡是何也以可言者少也必有事焉而勿正心與正其誼不謀其利明其道不計其功之語畧同但董子就事言孟子就理言六虛者卦爻六位皆虚隨所值或陽或隂居之四方上下逺邇内外在在處處皆是理之充塞而生物之機未嘗息視之雖不可見然冲漠無朕之中萬象森然已具所謂無極而太極也敬則中虛無物自敬則人敬之自慢則人慢之不行而至此神之妙也處人之難處者正不必厲聲色與之辯是非較長短惟謹於自脩愈謙愈約彼將自服不服者妄人也又何校焉涵養深則怒已即休而心不為之動矣人於聲色臭味之樂取快須㬰真所謂過客止耳何苦深溺其中而害吾固有之徳哉自脩則人不得以非理相加所謂不惡而嚴也法未有久而無弊者周之封建初則藩屏王室翼戴天子未嘗不善也至於春秋之間則有尾大不掉之勢而周因以微秦矯其失罷侯置守又以孤立無助而亡漢又懲秦失遂大封同姓至景帝有七國之變武帝下推恩之今諸侯王削弱而王莽又得奮其奸魏仍漢末之失宗室踈逺而晉得以竊其國晉監魏亡分封太廣而骨月自戕羌氐因之以竊據由是觀之法雖善久必有弊要在隨時以審其勢之輕重以救之勿使至於偏甚則善之善者也不然則積之久至於偏甚而不可舉正自有大可慮者生乎其間矣時中似義字時中是活法而不死執中是死法而不活不可因喜而錯過當為之事纔舒放即當收斂纔言語便思簡黙只於坐次便見時中之義坐一也我尊人卑我坐於上人坐於下中也我與人同等相對而坐中也我卑人尊人坐於上我坐於下中也行一也我長人幼我先人後中也我幼人長我後人先中也至於當語而語語為中當黙而黙黙為中中無定體乃所謂時中也有益者不為無益者為之所以苦其勞而不見成功不可乗喜而多言不可乗快而易事唐初邉將未有久握兵者至天寳間李林甫為固寵之計杜絶邉將入相之路遂致擁兵年久而成藩鎮之勢須要有包含則有餘意發露太盡則難繼勢到七八分即已如張弓然過滿則折因喜而多言覺氣流而志亦為動常黙最妙己心既存而人自敬輕言輕動之人不可以與深計易喜易怒者亦然聞事不喜不驚者可以當大事小事易動則大事可知大事不動則小事可知自脩為要應事接物惟在時中人當自信自守雖稱譽之承奉之亦不為之加喜雖毁謗之侮慢之亦不為之加沮和而敬敬而和處衆之道不可因人曲為承順而遂與之合惟以義相接則可以與之合輕言則納侮自喜則自矜之心生張文忠公曰左右非公故勿與語予深體此言吏卒輩不嚴而慄然也待吏卒輩公事外不可與交一言待下固當謙和謙和而無節反納其侮所謂重巽吝也惟和而莊則人自愛而畏周子曰天下勢而已在乎早識而亟反之余論前古封建之勢意亦如此慎動當先慎其幾於心次當慎言慎行慎作事皆慎動也凡作事謹其始乃所以慮其終所謂永終知敝是也不能謹始慮終乗快作事後或難收拾則必有悔矣事纔入手便當思其發脫事已往不追最妙理一乃所以包乎分殊分殊即所以行夫理一分殊固在乎理一之中而理一又豈離分殊之外哉接下言貴簡不可一語冗長發言須句句有着落方好人於忙處言或妄發所以有悔惟心定則言必當理而無妄發之失矣有一毫取人之意則言必諛貎必諂所謂巧言令色鮮矣仁也只順理便是道人能於言動事為之間不敢輕忽而事事處置合宜則浩然之氣自生矣詩之變者何其多而正者何其少邪是皆氣化人事之自然也易之陽竒隂偶亦然程子作字甚敬曰只此是學余謂洒掃應對亦然洒掃應對之所以然即精義入神之妙也洒掃應對雖小子事尊長之禮然禮即天理之節文精粗本末又豈二乎讀書至聖賢言不善處則必自省曰吾得無有此不善乎有不善則速改之毋使一毫與聖賢所言之不善有相似焉至聖賢言善處則必自省曰吾得無未有此善乎於善則速為之必使事事與聖賢所言之善相同焉如此則讀書不為空言惡日消而善日積矣費是隱之流行處隱是費之存主處體用一源顯微無間如隂陽五行流行發生萬物費也而其所以化生之機不可見者隱也常黙可以見道活潑潑地無物不有無時不然只是尘生之機徳進則言自簡脩詞以立誠則言不妄發欲深欲厚欲莊欲簡多言最使人心志流蕩而氣亦損少言不惟養得徳深又養得氣完而夣寐亦安常乗快不覺多言至夜枕席不安盖神氣為多言所損也此雖近於修養之說然養徳亦自謹言始養之深則發之厚養之淺則發之薄觀諸造化可見窮冬大寒天地閉塞而元氣蓄藏既固至春則發逹充盛而不可遏若冬暖元氣露泄則春亦生物不盛而疫癘作矣矯輕警惰只當於心志言動上用力宋太祖若能大居正以天下傳子可也必若重違母氏之命為宗社之計亦宜早斷當斷不斷致晉邸生疑而有燈影離席遜避之變昔魯隠公欲傳位桓公而不即授乃使營莬裘曰吾將老焉將之一詞卒致鍾巫之及其事正與宋祖相類當時秉史筆者皆其臣子義所當諱故為㣲詞而其事迹晦昧不彰於後世竊謂晉邸之罪固不可勝誅矣而宋祖乃所謂為人君父不通春秋之義者必蒙首惡之名乎隠者無聲無臭之妙也常充無欲害人之心知天地萬物為一體則能愛矣行其無事則順理矣順理則心安而體適文中子曰僮僕稱恩可以從政矣文中子曰同不害正異不傷物文中子曰多言不可與逺謀多動不可與久處文中子曰我未見欲好仁義而不得者也如不得斯無性者也此言近理經書所載皆天地間事天地間事皆吾分内事知天地間事皆吾分内事則徳盛而不矜功大而不伐矣須是盡去舊習從新做起乃有進張子曰濯去舊見以来新意極有益宣徳五年閏十二月初二日夜余在辰州府分司睡至五更忽念己徳所以不大進者正為舊習纒繞未能掉脫故為善而善未純去惡而惡未盡當自今一刮舊習一言一行求合於道否則匪人矣徳不進病在意不誠意誠則徳進矣安於故習則徳不新性本自然非人所能强為也順其自然所謂行其所無事也有所作為而然則鑿矣理一猶一大城子無不包羅其中千門萬戶大衢小巷即所謂分殊也理一所以統夫分殊分殊所以分夫理一其實一而已矣實有向道之心則道必進近㸔得處事有二法知以别可否義以决取舍斯無過舉矣處事便當揆之以義當於心意言動上做工夫心必操意必誠言必謹動必慎内外交修之法也若胸中無物殊覺寛平快樂一念之非即遏之一動之妄即改之心虛有内外合一之氣象公則人已不隔私則一膜之外便為胡越發奮誠心要做好人一切舊習定須截斷古人功名不立有憂老之將至者吾於道徳無成亦憂老之將至誠心如此萬起萬滅之私亂吾心久矣今當悉皆掃去以全吾湛然之性見枯樹則心不悅見生榮之花則愛之亦可驗己意與物同也靜中有無限妙理皆見俯仰天地無窮知斯道之大覺四海為小矣學舉業者讀諸般經書只安排作時文材料用於已全無干渉故其一時所資以進身者皆古人之糟粕終身所得以行事者皆生来之氣習誠所謂書自書我自我與不學者何以異因思學不進大病在見理不明信道不篤今欲學道又怕既學道為道理拘束與自家身心上受用外物相妨欲不學道又見說此是箇好道理若見理明則必知外物之樂不如是道之樂信道篤則必使外物之樂不得以奪是道之樂如是而學其有不進者乎勢不内重外輕則内輕外重權其輕重使不至於一偏則無患矣凡與人言即當思其事之可否可則諾不可則無諾若不思可否而輕諾之事或不可行則必不能踐厥言矣有子曰信近於義言可復也意盖如此朱子語録雜論散見於諸書者甚多當時門人從旁記録豈無一二之誤况傳寫之久乎嘗竊謂讀朱子語録雜論不若讀朱子手筆之書為無疑然語録雜論中有義理精確明白發手筆之未發者則不可不考也子思姑舉鳶魚二物示人以道體耳其實盈天地間無一物而非道體之所寓也夫子川流之歎亦舉一端以示人左之左之右之右之無非此理識得誠不知手之舞之足之蹈之西銘曰予兹藐焉乃混然中處混然則内外一致物我無間也心大則如天之無物不包心小則如天之無物不入西銘混字塞字帥字皆一意但有理氣之别斯須茍且即非敬矣仁則不間斷間斷則非仁矣仁只是此心之理與萬物都相貫通故欣戚相關而能愛纔不貫通便相間隔只知有己不知有物欣戚不相關而不能愛矣敬則都是一片公正的心不敬則無限私竊的心生矣常人之言猶有可信者不信聖人之言可乎曾子忠恕姑借學者盡己推己其施不窮以著明一貫之體用無窮耳其實聖人之一貫從大本大原中自然流出初無待於盡而推也程子曰此與違道不遠異者動以天則見論語之忠恕為自然中庸之忠恕為勉然然忠恕依舊以中庸為定名要在㸔得活則知論語之忠恕乃曾子借彼移上一歩以明聖人一貫耳参伍以變只是以不齊之數互考之欲見其齊耳讀西銘不敢慢一人輕一物讀西銘着不得一毫私意讀西銘有天下為一家中國為一人之氣象讀西銘知天地萬物為一體西銘立心可以語王道讀西銘則知小智自私誠可恥也所見既明當自信不可因人所說如何而易吾之自信君子取人之徳義小人取人之勢利疑人輕己者皆内不足聖賢欲人皆善之心讀其書若親見之而不能體其心以為心可謂自棄者矣不可强語人以不及非惟不能入彼將易吾言矣自孔孟後皆不識性荀子謂性惡揚子謂善惡混先儒固已辨其非矣唐韓子原性以仁義禮知信論性以喜怒哀懼愛惡欲論情獨於性情為有見三品之說盖孔子唯上智與下愚不移之意兼氣質而言也是雖不明推出氣字而意在其中矣竊謂自孟子後論性惟韓子為精粹又豈荀揚偏駁者可得同年而語哉不下帶而道存焉此道不可離也孔子讀蒸民之詩曰為此詩者其知道乎故有物必有則民之秉􅂜也故好是懿徳子思中庸引詩曰維天之命於穆不已盖曰天之所以為天也於乎不顯文王之徳之純盖曰文王之所以為文也純亦不已凡聖賢說詩只加數字轉換過而義自見未嘗費詞也朱子詩集傳盖得此法矣幾在心當慎所發發不以正甚害事愈日新愈日髙篤志此道使天下之物不能尚其庶有進乎匹夫之志未必皆出於正而猶不可奪况君子之志於道孰得而奪之哉勢無兩重之理此重則彼輕此輕則彼重故道義重則外物輕道義輕則外物重為學之士常使外物不能勝其道義則此日重彼日輕積久惟見道義而不復知有外物矣因思千古聖賢垂訓炳明盖欲人讀其書行其道也茍徒資為口耳文詞之用而不行其道即先儒所謂買櫝還珠也可不戒哉舍小學四書五經宋諸儒性理之書不讀而先讀他書猶惡覩泰山而喜丘垤也藐乎吾知其小矣聖人論道多兼理氣而言如所謂一隂一陽之謂道形而上下之語皆兼理氣而言也太極圖上面大圏子即隂陽中小圏子在隂陽中見其不離在上見其不雜其實一而已矣非小圏外别有一圏為太極也孔子曰易有太極又曰一隂一陽之謂道又曰形而上者之謂道形而下者之謂器皆兼理氣而言周子無極而太極則純以理言至動而生陽靜而生隂則兼以氣言矣無極立言本欲明此理之無方所無形象耳後人將作虛無之無㸔則失周子之意矣讀書録卷一
