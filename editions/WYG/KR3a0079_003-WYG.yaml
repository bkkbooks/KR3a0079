body:
  text: 讀書録卷三明薛瑄撰太極動而生陽但就動之端說起其實動之前又是静也天地一終翕寂之餘太極動而生陽而天復開動極而静静而生隂而地復成一動一静互為其根天命流行無窮而萬物生生不息焉其天地翕寂之前如是之動而生陽静而生隂如是之一動一静互為其根如是之天命流行化生萬物者葢不可勝窮也斯所謂動静無端隂陽無始也歟太極圖一言以蔽之曰理氣而已程子性即理也之一言足以定千古論性之疑聖人之所以教賢者之所以學性而已今天地之始即前天地之終其終也雖天地混合為一而氣則未嘗有息但翕寂之餘猶四時之貞乃静之極耳至静之中而動之端已萌即所謂太極動而生陽也動極而静静而生隂静極復動一動一静互為其根分隂分陽兩儀立焉原夫前天地之終静而太極已具今天地之始動而太極已行是則太極或在静中或在動中雖不雜乎氣亦不離乎氣也若以太極在氣先則是氣有斷絶而太極别為一懸空之物而能生夫氣矣是豈動静無端隂陽無始之謂乎以是知前天地之終今天地之始氣雖有動静之殊實未嘗有一息之斷絶而太極乃所以主宰流行乎其中也無極而太極乃周子指出隂陽中之理以示人實未嘗離乎隂陽也若誤認隂陽别有一物為太極則非矣造化人事雖萬變不齊而理則一定也泰之九三當盛之極而衰之端兆焉可不慎歟否泰相因無一息之停盛衰之理微矣無我則内外合而與天為一矣或言未有天地之先畢竟先有此理有此理便有此氣竊謂理氣不可分先後葢未有天地之先天地之形雖未成而所以為天地之氣則渾渾乎未嘗間斷止息而理涵乎氣之中也及動而生陽而天始分則理乗是氣之動而具於天之中静而生隂而地始分則理乘是氣之静而具於地之中分天分地而理無不在一動一静而理無不存以至化生萬物萬物生生而變化無窮理氣二者葢無須臾之相離也又安可分孰先孰後哉孔子曰易有太極其此之謂與程子曰老子竊弄闔闢者也葢造化之翕聚所以為發散發散所以為翕聚老子將欲取之必固與之將欲翕之必固張之是所謂竊弄闔闢者也用力於詞章之學者其心荒而勞用力於性情之學者其心泰然而樂涵養之深翫索之久渙然氷釋怡然順理矣無極而太極本然之性也太極動而生陽動極而静静極生隂二五流行化生萬物者氣質之性也聖賢千言萬語只是明此理程子曰善固性也惡亦不可不謂之性也性一而已矣氣質清粹而無所蔽則皆以仁義禮智之性發而為惻隠羞惡辭讓是非之情所謂善固性也氣質濁雜而有所蔽則仁流為耽溺義流為殘忍禮流為矯偽智流為譎詐所謂惡亦不可不謂之性也天理本一也由隂陽之運參差而不齊人性本一也由人心之感而善惡有異程子曰有主則中虚虚謂心中無物也又曰有主則中實實謂有理也河圖乃萬數萬理萬象萬化之源水隂也生於陽火陽也生於隂見隂陽有互根之義畫前之易即太極也所謂冲漠無朕之中而萬象森然已具也太極之中無所不有所謂畫前之易也開卷即有與聖賢不相似處可不勉乎若實見得雖生死猶不可異况取舍之間乎一陽在上下五隂之間張子所謂隂在外陽在内而不得出則奮擊而為雷霆觀豫卦之象亦可見矣觀太極生兩儀四象八卦則物之一本可知矣懈意一生即為自棄春日和氣薫心有惻然之意一花即具元亨利貞之理花始萼而未開者元也開而盛者亨也盛而就實者利也實已成熟者貞也成熟可種而復生又為貞下之元矣生理循環葢未嘗毫髪止息間斷人惻然慈良之心即天地藹然生物之心漢光武不任三公而事歸䑓閣勢然也繼之者善其理一成之者性其分殊理氣在天地為公共之物一麗於形則萬殊矣古者宰相竊柄顯而猶可攻惟近習竊柄如恭顯輩則深而難去所謂城狐社鼠是也天地萬物形體皆虚而理則實薫然慈良惻怛之心與温然春陽之氣為一為人不能盡人道為官不能盡官道是吾所憂也徳行道藝皆不如古人豈可不自勉生之理仁也活潑潑地仁之發也禮者天理之節文孔子謂克己復禮為仁何也葢仁即天理也人欲熾則天理不行必克去己私事事皆復於禮則天理流行而為仁矣余思仁數日未得其説忽於惻然隠恤慈良之端似可即用以窺體有一毫忮害之心即非仁矣一氣流行一夲也著物則各形各色而分殊矣敬天當自敬吾心始不能敬其心而謂能敬天者妄也天包地外水在地中地中之水即天所生也山澤通氣地中之氣為地中之水也山川出雲地中之氣為天上之雨也地中之水天上之雨統一氣之流行欝蒸耳非有二也人知水生於地中而不知乃天所生也盖天包地外地處天中地外之天氣無時止息而鬱積流通於地中故能生水而不窮也大丈夫心事當如青天白日使人得而見之可也春秋時辭命猶有言禮義者乃先王之澤未泯也至戰國縦横之徒唯言利害而不及禮義先王之澤盡矣民心至柔真有不可强者惟順其心而道之則無不從矣自古未有逆民心而得天下者幸而得之亦不過數傳耳欲以虛假之善盖真實之惡人其可欺天其可欺乎隂多而陽少小人多而君子少鷹隼多而鳳凰少豺虎多而麒麟少荆棘多而芝蘭少碔砆多而良玉少其理一也夬九三壯于頄有凶獨行遇雨若濡有愠無咎决小人之道怒見于面必有凶惟從容和柔以决之則無咎單襄公曰君子不自稱也非以讓也惡盖其人也夫人性凌下者不可盖也求盖其人抑下滋甚故聖人貴讓此乃名言單襄公曰君子目以定體足以從之是以觀容而知其心矣目以處義足以歩目今晉侯視逺而足髙目不在體而足不歩目其心必異矣目體不相從何以能乆此亦名言川流不息之意余於先天圗見之一陽復而為之喜一隂生而為之戒聖人扶陽抑隂之意至矣觀復姤則知君子小人盛衰之理矣心誠色温氣和辭婉必能動人虚心接人則於人無忤自滿者反是人有負才能而見於辭貌者其小也可知矣天賦人以才徳本無不備才徳全始稱為人之名初無一毫加於本分之外乃知自矜自伐者皆妄也人知天下事皆分内事則不以功能誇人矣讀夬九三之辭而知决小人之道讀九五之辭而知克己私之功天無不包地無不載君子法之人須有容乃大古謂山藪藏疾川澤納汚瑾瑜揜瑕有容之謂也覺人詐而不形於言有餘味戒太察太察則無含𢎞之氣象經曰有容徳乃大有忍乃濟者宜深體之行有不得皆當反求諸已不愧於天不愧於人不愧於心斯近道矣不愧於心其本乎君子之志固非常人所識也少陵詩曰水流心不競雲在意俱遲從容自在可以形容有道者之氣象少陵詩寂寂春將晚欣欣物自私可以形容物各付物之氣象江山如有待花栁自無私唐詩皆不及此氣象天陽也其氣渾然無間故其數竒一以象之地隂也其形中虚而開故其數偶一以象之立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義隂陽以氣言剛柔以質言仁義以徳言三才分殊而理一也欲動情勝氣一之動志也係戀之私恩畜臣妾吉此待小人女子之道也待左右當嚴而惠孟子一暴十寒之喻皆格心之學孟子告君皆先正其心宋道學諸君子有功於天下萬世不可勝言如性之一字自孟子以後荀揚以來或以為惡或以為善惡混議論紛然不决天下學者莫知所從至於程子性即理也之言出然後知性本善而無惡張子氣質之論明然後知性有不善者乃氣質之性非本然之性也由是性之一字大明於世而無復異議者其功大矣自孟子之後漢唐以及五代之間異端與吾道争為長雄至有讀聖人之書㳺聖人之門以儒自名者猶匍匐而歸之况其餘乎獨唐之韓子不顧侮笑力救其失而一齊衆楚猶莫之能勝也至宋道學諸君子出直擣異端之巢穴而辯其毫釐似是之非由是邪正之分昭然若覩黒白雖未得悉絶其道無使並行然吾道既明如精金而不得淆以鉛錫明珠而不得混以魚目彼雖援引比附亦無自而入也是以庠序育才科舉取士講學命詞粹然一出於堯舜禹湯文武周公孔子顔曽思孟之正絶口於異端之教是皆道學諸君子距邪閑正之功也嗚呼盛哉斯須省察不至則妄念發有於一事心或不快遂於别事處置失宜此不敬之過也天地萬物渾是一團理氣人只為拘於形體自小若能不為形氣所拘則内外合一而不勝其大矣斯須心有不存則與道相􅁯要當常持此心而不失則見道不可離矣或讀書或處事或論人物必求其是處便是格物致知之功葢是者天理也非者人欲也得其是則天理見矣中夜以思只公之一字乃見克己之效驗人所以千病萬病只為有己為有己故計較萬端惟欲己富惟欲己貴惟欲己安惟欲己樂惟欲己生惟欲己夀而人之貧賤危苦死亡一切不恤由是生意不屬天理滅絶雖曰有人之形其實與禽獸奚以異若能克去有己之病廓然大公富貴貧賤安樂生夀皆與人共之則生意貫徹彼此各得分願而天理之盛有不可得而勝用者矣萬物萬事各有分各安其分自然無事矣已與人物本同一理一氣而或不能公好惡於天下者蔽於有己之私也凝定最有力往時怒覺心動近覺隨怒隨休而心不為之動矣一息不可不涵養涵養只在坐作動静語黙之間輕當矯之以重急當矯之以緩褊當矯之以寛躁當矯之以静暴當矯之以和粗當矯之以細察其偏者而悉矯之乆則氣質變矣作事切須謹慎仔細最不可怠忽踈畧先儒謂前輩作事多周詳後輩作事多闊畧余覺有闊畧之失宜謹之使民如承大祭然則為政臨民豈可視民為愚且賤而加慢易之心哉作官者雖愚夫愚婦皆當敬以臨之不可忽也余性偏於急且易怒因極力變化心一操而羣邪退聽一放而羣邪並興一念不謹即有偷惰之意所謂惟聖罔念作狂者豈虚語哉為學最要務實知一理則行一理知一事則行一事自然理與事相安無虚應不切之患操心一則義理昭著而不昧一則神氣凝定而不浮養徳養身莫過於操心之一法也許魯齋詩曰萬般補養皆為偽只有操心是要規惟心得而實踐者乃知其言之有味學者大患在行不著習不察故事理不能合一處事即求合理則行著習察矣聖人立教明白懇切直欲天下萬世之人皆入於聖賢之域纔收歛身心便是居敬纔尋思義理便是窮理二者交資而不可缺一也一於居敬而不窮理則有枯寂之病一於窮理而不居敬則有紛擾之患居敬有力則窮理愈精窮理有得則居敬愈固居敬以立本窮理以達用造化翕寂專一則發育萬物有力人心寜静専一則窮理作事有力如存心端坐之時此居敬也或讀書而思索義理或處事而求其當否即窮理也初學時見居敬窮理為二事為學之久則見得居敬時敬以存此理窮理時敬以察此理雖若二事而實則一矣堯典以欽之辭始益稷以欽之辭終則堯舜傳心之要可知矣天理流行賦予人物之機無須臾之止息兹所謂命也歟好議論前輩得失乃初學之大病前軰誠有不可及者未可輕議也在古人之後議古人之失則易處古人之位為古人之事則難以紙上之言觀往事率皆輕議古人處事之失設使身居其地吾見其錯愕失措者多矣言不及行可恥之甚非特發於口者謂之言凡著於文詞者皆是也嘗觀後人肆筆奮詞議論前人之長短及夷考其平生之所為不及古人者多矣豈非言不及行可恥之甚乎吾輩所當深戒也切不可隨衆議論前人長短要當已有真見方可唐之韓子乃孟子以後絶無僅有之大儒原道原性篇雖博愛三品之語有未瑩者然大體明白純正程子所深許朱子又為考正其書誠非淺末者可得而窺也後學因見朱子兼論其得失而不知此乃責偹賢者之意遂妄論前賢若不屑為者其可謂不知量也甚矣當韓子之時異端顯行百家並倡孰知堯舜禹湯文武周公孔子孟軻為相傳之正統又孰知孟軻氏没而不得其傳又孰知仁義道徳合而言之又孰知人性有五而情有七又孰知尊孟氏之功不在禹下又孰敢排斥釋氏濵於死而不顧若此之類大綱大節皆韓子得之遺經發之身心見諸事業而伊洛真儒之所稱許而推重者也後學因見先儒有責偹之言遂勦拾其説妄議韓子若不足學者設使此輩生韓子之時無先覺以啟其迷無定論以一其志吾見淪於流俗惑於異端之不暇又安敢窺韓子之門墻哉故論韓子之得失在周程張朱數君子則可茍未及數君子皆當自責自求殆未可輕加詆議以取僭妄之罪也性理之學經周程張朱諸君子發揮如此明白當時親炙者尚失其意而韓子生於道術壊爛之餘無所從逰質正乃能卓然有見排斥異端扶翼正道遂有立於天下後世真可謂豪傑之才矣韓子氣質明敏剛正樂易寛厚皆過於人但生於學絶道散之時無所講明切磋以底大就使生宋時得與道學諸君子㳺則其所立當不止是矣性理自宋道學諸君子反覆辯論發揮蘊奥之後粲然如星日麗天而異學曲說真如區區之爝火自不得亂其明也人不持敬則心無頓放處人不主敬則此心一息之間馳騖出入莫知所止也不主敬則嗜欲無涯馳騖不止真病風狂惑之人耳小人有功可優之以賞不可假之以柄羣隂長而陽道消大易之深戒也主敬則思不出位而分定矣只一理而改頭換面做出無窮物事神矣哉萬古不易者理而已氣無窮理亦無窮古人於小人有功可深慮而不可喜易曰開國承家小人勿用漢誅竇憲五侯有功而其勢自此盛故功由君子立國家之大慶功由小人立知者所深慮也讀易則知隂陽消長之幾皆由微以至著聖人謹其微故不至於著衆人圖其著則亦莫之及矣上蔡有一硯極愛之遂屏去此可為克己之法詩曰不愆不㤀率由舊章孟子曰遵先王之法而過者未之有也葢祖宗更事多為慮深故立法周且密後世率而循之何失之有不能克己者志不勝氣也器用當用者不可缺有私吝之心則不可外物得亦不喜失亦不怒則心定矣得失而喜怒生焉是猶累於外物而心未定也人之克己或能克於此不能克於彼此是克之有未盡也能推其所能以及其所不能則克無不盡矣私無大小覺即克去愛外物好則心不好矣以言乎逺則不禦六畫之上生生而無窮以言乎近則静而正六畫之中當體而理無不具以言乎逺則不禦生生而無窮以言乎近則静而正禀賦各定制服私意而不㧞其根如蓄火於毛羽之中得風復然矣故克伐怨欲不行固為難不若克伐怨欲净盡之為至也讀書以防檢此心猶服藥以消磨此病病雖未除常使藥力勝則病自衰心雖未定常得書味深則心自熟久則衰者盡而熟者化矣因一事不快於心而遷怒之心妄發此學者之通病許魯齋曰責己者可以成人之善責人者適以長已之惡周公告成王曰厥亦惟我周太王王季克自抑畏葢抑乃檢束收歛之意畏乃恐懼兢慎之意豈謂王者當然實為脩省之至要也周公曰無遑曰今日躭樂乃非民攸訓至哉言乎葢人君者天下之表儀人君一日之躭樂雖若不至於大害然作于上即應于下上以躭樂縱則下以躭樂從是其為訓于民非言語之訓乃以身訓之訓宜其感應之機為尤速也益之告舜曰罔逰于逸罔淫于樂臯陶告舜曰無教逸欲有邦皆此意也豈非萬世之永鑒與陶淵明曰此亦人子也可善遇之吾性覺踈快寫字有差遺者即此是敬不屬處謹之斷事當詳審安重為之以艱難處之以果决事了即當若無事者不可以處得其當而有自得之心若然則反為所累矣大事小事即平平處之便不至於駭人視聽矣處事了不形之於言尤妙處事大宜心平氣和治人當有操縱人不得而怨之嘗見人尋常事處置得宜者數數為人言之陋亦甚矣古人功滿天地徳冠人羣視之若無者分定故也如治小人寛平自在從容以處之事已則絶口不言則小人無所聞以發其怒矣處事最當熟思緩處熟思則得其情緩處則得其當治小人向他人聲揚不已不惟増小人之怨亦見其自小安重深沉者能處大事輕浮淺率者不能天下之事緩則得忙則失先賢謂天下甚事不因忙後錯了此言當熟思法者天討也以公守之以仁行之一字不可輕與人一言不可輕許人一笑不可輕假人揚雄年四十餘自蜀來㳺京師大司馬車騎將軍王音竒其文召以為門下史薦雄待詔嵗餘奏賦為郎給事黄門與王莽並其後卒為莽臣而死於其世是其進也以王氏終也以王氏大節之虧有自來矣心無須臾閒理欲之幾間不容髪此勝則彼負此負則彼勝學者之心當常有所操則物欲退聽斯須少放即邪僻之萌滋矣無義理以養心何所不至志固難持氣亦難養主敬可以持志少慾可以養氣廣大虚明氣象無欲則見之中夜坐思曰天賦之初本有善而無惡人而不為善是悖天也欲淡則心虚心虚則氣清氣清則理明知大事小事皆已分之當為則自不有其功矣徳如堯舜學如孔子皆已分之當為與人一毫無與以賢智誇人者皆不能究其本也人亦有此理我亦有此理人不能全而我能之視不能全者憫憐之可也鄙笑之不可也引掖之可也棄絶之不可也執已能以病人之不能適足以自病而已古人叙事之文極有法如禹貢篇首以敷土奠髙山大川為一書之綱次兾州以王畿為九州之首次八州次導山次導水以見經理之先後次九州四隩九川九澤四海以結經理之效次制貢賦立宗法袛台徳先分五服以述經理之政事而終之以聲教訖于四海執𤣥圭以告厥成功始終本末綱紀秩然非聖經其能然乎六十四乃三十二所分三十二乃十六所分十六乃八所分八乃四所分四乃二所分二乃一所分至一則隠矣微矣非耳目思慮之所及矣孔子所謂密邵子所謂畫前之易神而明之存乎人人能𢎞道也化而裁之推而行之舉而措之神而明之黙而成之皆指此理而言班固外戚賛曰夫女寵之興繇至微而體至尊窮富貴而不以功此道家所畏禍福之宗也余謂豈獨女寵為然哉小人無大功徳而竊髙位厚䘵亦若此而已矣大象辭皆以理言天之道元亨利貞民之故仁義禮智程子之易主孔子只一理春謂之元夏謂之亨秋謂之利冬謂之貞因時以立名耳伏羲時卦畫雖具而占卜之法未備意唐虞夏商之世已有占卜之法如禹曰枚卜功臣惟吉之從舜曰朕志先定昆命於元龜祖伊曰格人元龜罔敢知吉箕子陳洪範稽疑之疇尤詳於卜筮大卜掌三易夏曰連山商曰歸藏周曰周易以是觀之則周已上葢已有占卜之法矣周易則因文王演易繫彖周公繫爻而得名周以前占卜之法既皆不傳今所傳者唯周易至孔子則作彖傳小象大象文言繫辭説卦序卦謂之十翼然周以上易雖不可見觀經傳論載之語葢皆專主卜筮文王周公之易則皆發明伏羲卜筮教人之意尤著至孔子則始詳於義理而不遺卜筮程子之傳專主義理朱子本義則推原作易教人卜筮之意於千古之上讀易者各即其意而觀之可也朱子之易主邵子啟蒙可見親親仁也敬長義也無他達之天下也故知惟孝友于兄弟為為政之本成性存存所以立本也道義之門所以達用也性是本來固有之理惟存而又存則道義由是而出矣行浮於言行七八分言二三分不言而自能行出則人心服處事不可使人知恩法者天討也或重或輕一付之無心可也或治奸頑而務為寛縱暴其小慈欲使人感己之惠其慢天討也甚矣情可矜雖從寛典又當使之不知其寛可也欲人悦已則人有惡已者矣為政當以公平正大行之是非毁譽皆所不恤必欲曲徇人情使人人譽悦則失公正之體非君子之道也只令在己者處得是何恤浮言處事在己者只當務實若能動人否則在彼耳我何容心其間哉因讀朱文公與子受之書念之念之夙夜無忝所生之言不勝感發興􅁸中心惻然必欲不為一事之惡以忝先人瑄每顧遺體之重未嘗一日敢忘先人處事詳審安重伊尹曰接下思恭豈惟人君當然哉有官君子於臨衆處事之際所當極其恭敬而不可有一毫傲忽之心不惟臨衆處事為然退食宴息之時亦當致其儼肅而不可有頃刻䙝慢之態臨政持已内外一於恭敬則動静無違人欲消而天理明矣乾以易知坤以簡能乾坤只是自然故易簡人能順自然之理則易簡可黙識矣人只是箇心性静則存動則應明白坦直本無許多勞擾若私意一􅁸則支節横生而紛紜多事矣少欲則心静心静則事簡簡者非厭事繁而求簡也但為所當為而不為所不當為耳一為外物所誘則心無須臾之寧矣當事務叢雜之中吾心當自有所主不可因彼之擾擾而遷易也閑邪如城郭城郭不完則外寇入閑邪不密則外慮侵事貴斷制撇脱用法稱量輕重要不失其中而已法者天討也翫法所以翫天也敢不敬乎世有賣法以求賄者此誠何心哉夫法所以治奸頑也奸頑有犯執法以治之則良善者獲伸矣若納賄而縱釋奸頑則良善之寃抑何自而伸哉使良善之寃抑不伸是不惟不能治奸頑而又所以長奸頑也㨿髙位載顯名秉三尺者忍為此態乎世有假官柄以濟貪欲者吾不知此何心也至誠以感人猶有不服者况設詐以行之乎感自内出應由外來隂符經曰萬化定基易曰同歸而殊塗一致而百慮其㫖一也至宋儒而道術一漢儒識緯九流之雜唐士釋老辭章之支至宋儒出而道術定於一今學校之教經術之習絶口於漢唐異端駁雜之學者宋儒之功也圖象隠於異學者數千年至邵子而反之於易其有功於易學大矣易先天諸圖自希夷以前皆為方士所傳授至邵子反之易則知作易之本原實出於此朱子詩曰大易圖象隱正謂隱於異學也易之本原至邵子而復明行第一歩心在第一歩上行第二歩心在第二歩上三歩四歩無不如此所謂敬也如行第一歩而心在二歩三歩之外行第二歩而心在四歩五歩之外即非敬矣至若寫字處事無不皆然寫第一字心在第一字上為一事心在一事上件件專一便是敬程子所謂主一之謂敬無適之謂一與膽欲大見義勇為心欲小文理密察智欲圎應物無滯行欲方截然有執膽大心小似知崇禮卑知圓行方似和而不流象由卦生徳以象立仁健義順與天地合其徳也知周萬物與日月合其明也仕止乆速各當其可與四時合其序也進退存亡不失其正與鬼神合其吉凶也心細密則見道心麄則行不著習不察不言而躬行不露而潜脩書稱舜曰濬哲葢深則哲淺則否嘗驗之於人其深沉者必有智浮淺者必無謀也讀書皆以明本來固有之理而欲行之無疑耳為學大抵就已分上去其本無之私欲全其固有之天理耳徳不徳能不能厚之至也聖賢之子孫賢不肖皆天也天本無心人之生也偶值其氣之清明純粹者為賢知得其氣之昏濁駁雜者為頑愚若聖賢之子孫有賢不肖之異者則以所值之氣不同耳後人因見聖賢之子孫或有不肖者乃謂聖賢已奪其秀氣可謂繆愆之論矣體認之法須於身心之所存所發者要識其孰為中孰為和孰為性孰為情孰為道孰為徳孰為仁孰為義孰為禮孰為智孰為誠又當知如何為主敬如何為致恭如何為存養如何為省察如何為克己如何為復禮如何為戒慎恐懼如何為致知力行如何為博文約禮於凢天理之名皆欲識其眞於凢用功之要皆欲為其事如此則見道明體道力而無行不著習不察之弊矣有人為學者徒曰講道學道不知所以體認之則所講所學者實未知為何物也天理如人天理之名如人之有名既識人之名須親見人之貌方為真識其人既知理之名須真知理之實方為真知其理徒知理之名而不知理之實猶徒識人之名而未嘗親見其人之貌又烏為真知真識哉氣質之偏自生來便有此矣若自㓜至長歴歴曽用變化之功則亦無不可變之理若氣質既偏自少至長所習又偏一旦驟欲變其所習非百倍之功不能也無限量無欠缺無間斷學不進率由於因循事事不放過而皆欲合理則積久而業廣矣此果何物邪推而上之莫究其始引而下之不見其終測之而無窮資之而不竭離之而不開斷之而不絶此果何物邪竟不得而名也淵淵乎天源之莫測浩浩乎天流之無窮千古聖賢未嘗不以警懼之意為勉治世君臣警戒之辭多衰世君臣諛説之辭多借問天源深幾許古今常只是滔滔年年成就無邊物本體何曽減一毫聖賢立心扶持千萬世之綱常常日役役於物忽有一念之善生即夫子所謂譬如平地雖覆一簣進吾徃也平日力於為善忽有一念之懈生即夫子所謂譬如為山未成一簣止吾止也語之而不惰只是顔子之心深契聖人之言故毎聞毎新忻悦不已而行之亹亹㤀倦若心與言不相契則毎聞毎厭矣尚安能忻悦不已而發之所行哉理氣間不容髪如何分孰為先孰為後循循而不已者其有所至與防小人密於自脩三綱五常之理萬古猶一日非實理則月易而嵗不同矣太極只是箇性字周子之太極即中庸之誠今之學者有開口即論太極者不知果識否不然吾恐徒得其名而不得其所以名也程子親受太極圖於周子而終身不以語人其慮逺矣後學有未渉四書門庭者開口即論太極馳心𤣥妙而不知反求諸己其弊有不可勝言者一理涵萬物萬物分一理萬物各得一理之一分而一理之本體依然完具初無絲毫之減損也萬物一年生一畨是得一年之氣萬物雖銷落冺滅無餘而氣之滚滚日新者自無窮已而所以無窮己者豈非太極為之體與鄉黨一篇皆聖人之時中舜命棄播百榖即命契敷五教繼以臯陶明刑治教刑三者相因可見有虞為治之序養民生復民性禁民非治天下之三要萬物自微以至著聖人全體太極渾身是天理也究竟無言處方知是一源雲厚則雨甚雲薄則雨少欲問收功何所似𤣥天幽黙本無言不識理名難識理須知識理本無名孰為始乎氣之息其始乎始之前為終終之前復為始殆不可知其孰為終孰為始葢必有能始能終者居其間而卒莫之始終也海其大乎曰非也岳其大乎曰非也地其大乎曰非也然則孰為大曰天為大海者天氣之流萃岳者天氣之流峙地者天氣之流結是皆天之所為也天之所為者若有方矣而其所以為者則未有方也以其無方則天之大不亦宜乎駸駸而明者日之為乎曰日特陽之一物耳非能為明也駸駸而暗者月之為乎曰月亦隂之一物耳非能為暗也然則明暗孰為之哉曰氣機一動而羣陽闢晝之明從焉氣機一静而羣隂翕夜之暗隨之動静翕闢皆機之所為而實未嘗有為也是皆循環相推而不得已焉爾氣有形理無迹氣載理理乗氣二者渾渾乎無毫忽之間也萬物未生不加多萬物已生不加少易所謂富有日新其是之謂與謂有乎則視之無形也謂無乎則其來有本也有本而無形則有而無矣無形而有本則無而有矣有而無無而有非真知有無為一體者不足以語之天地山川日月星辰萬物皆可見也而其所以為是則不可見也以不可見者語人孰信哉葢必心得而後信也心得非他必自近始近莫近於吾身吾身百體皆可見也其所以為是百體之宜則不可見也可見而無不可見者為之主則百體皆失其職矣舉近以明逺則天地山川日月星辰萬物之理一也升堂入室必以階而君子為學亦必以階小學大學古為學之階也秦漢而下學者莫得其階升堂入室者寥寥而迷惑顛躓於異學功利之途者衆矣卒亦何所至邪今朱子小學四書猶古之階也循此而賢循此而聖是在人焉耳舍是而階於他吾不知其所至矣豈獨樂有雅鄭邪書亦有之小學四書六經濓洛闗閩諸聖賢之書雅也嗜者少矣夫何故以其味之澹也百家小説淫詞綺語怪誕不經之書鄭也莫不喜談而樂道之葢不待教督而好之者矣夫何故以其味之甘也澹則人心平而天理存甘則人心迷而人欲肆是其得失之歸亦何異於樂之感人也哉君子之心欲人同其善小人之心欲人同其惡形而上者謂之道形而下者謂之器聖人論理氣最分明又無離而二之之病萬物定於一萬事定於一萬古定於一如耳目口鼻手足之理各具之太極也一心之理統體一太極也讀書錄卷三
