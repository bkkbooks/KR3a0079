  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0079_WYG_017-1a, image: WYG0711/WYG0711-0789c.png}
body:
  text: 讀書續録卷六明薛瑄撰為學之要在於知性善知性善則知所用力矣告子以食色為性若紾兄之臂而得食得為性乎踰東家墻摟處子則得妻得為性乎故食色氣也食色之理性也寒暑陰陽也所以變化者神也變化之神無方陰陽之易無體天地設位而易行乎其中而易亦天地也成性存存道義之門而道義亦性也居處恭執事敬存吾心之天對越在天之天即顧諟天之明命畏天命尊徳性之謂也孟子道性善言必稱堯舜又曰聖人人倫之至也又曰堯舜性之也是則聖人之所以為聖人者全此性而已程子曰乾天也一節論天至矣顔子所言髙堅前後朱子曰道體也道體即性也天命之性渾然無間故存心養性即所以事天也聖人以四代禮樂告顔子使其得位則於前代之法必有因有革未必盡溺古法也朱子曰功用言其氣也妙用言其理也功用兼精粗闕論性是學問大本大原知此則天下之理可明矣自泰之否易自否之泰難卦爻隨時取義不同君徳明為本居敬窮理則明矣朱子曰至精之理於至粗之物上見班彪王命論真西山文章正宗取之知行雖是兩事然行是行其所知之理亦一也乾專直是一坤翕闢是二參同契終是方技之書顔子與聖人未達一間者以三月不違與純亦不已也聖人相傳之心法性而已既曰上天之載無聲無臭復何言哉萬古之闔闢不可得而窮程子所謂動静無端隂陽無始者與物格知至在物之理與在己之理無間故曰纔明彼即曉此格物是方推致其知物格則知至矣通天地萬物總是一理致知格物者正欲推極吾心之知以貫天地萬物之理也孟子曰使吏治其賦後世分封者多用其言天命有善而無惡性之謂也大同之道即理也誠之源即張子所謂性者萬物之一原唐郭子儀竭忠誠以事君故君心無所疑以厚徳不露圭角處小人故讒邪莫能害觀孟子答井田之問則其法壞已甚矣四徳仁為大知為重非知之明守之固則仁亦不能有諸己矣朱子贊明道曰龍徳正中甚大孟氏醇乎醇以其言不出乎仁義禮智言出乎已可警乎已程子曰心通乎道然後能辨是非如持權衡以較輕重盖道即仁義禮智心通乎道以辨人之是非其合於道者為是不合於道者為非道即權衡較輕重即辨是非也朱子論陸象山之學具有定論臨川吳氏猶左右之何也元人詩曰不宗朱氏元非學美哉言乎晉司徒魏舒凡有為先行而後言可以為法其遜位而去一節尤髙孟子專心致志四字讀書之至要率性之謂道全是自然天下後世有公是公非秦檜祖子孫三世領史職亦不能揜其奸邪之迹聖人之言皆自天理中流出所以為載道之文知性善則天下之道皆自此出不知性而論道者妄也學至知道乃可以言學道者何性是也在天成象在地成形皆造化之迹太極動而生陽静而生隂即二氣之良能也元亨利貞仁義禮智八箇字無物不有無時不然充塞天地貫徹古今日用須㬰不可離也君子行此四徳者故曰乾元亨利貞聖人盡性以至命也大哉乾元乃統天萬化之源也一隂一陽之謂道繼之者善也成之者性也無時不然天既無言恐理亦無名二氣之良能即屈伸之自然也細思人與天地本無二理惟無私貫之凡言性命仁義禮智道徳之理皆無形聲之可接惟黙而識之可也故曰上達必由心悟命之曰道盖借人所行實有道路之道以明人所行當然之理耳非真有形如道路之道也先儒言聞道見道者但心悟其理故借聞見以明之非真有聲之可聞有形之可見也降衷秉彞天理民􅂜朱子於孟子豪傑興及聞見章註兩言之千載聖賢所傳所學之道不外乎是持盈惟有徳者能之作徳心逸日休者誠也作偽者反是人無忠信不可立於世天地聖人誠而已本一氣而有動静耳荀子以人性為惡則是誣天下萬世之人皆為惡也其昩於理如是之甚周世宗亦五代之賢君而争南唐江北之地亦多傷兩國之生靈仁者不為也孟子處戰國之時不言兵其仁心大矣觀唐虞三代之書其世道可見宋元祐宣仁臨朝亦非大有為之時氣化流行未嘗間斷可見道體無一息之停周禮後世用其制者猶不可易可見為聖人之書成湯不邇聲色不殖貨利最為難事孟子得仁義禮智之大者其言千變萬化皆由此出天道元而已人道仁而已大學言明徳論語言仁中庸言性孟子言仁義一理也坤之元即乾之氣也一隂一陽之謂道繼之者善也成之者性也先儒謂是孔子言性與天道處非知道者不足以知聖人自孟子後知孔子者鮮矣至周張程朱乃知之顯諸仁是藏諸用之發見處藏諸用是顯諸仁之機緘處三代王佐事業皆本於道徳後世輔相事功多出於才氣莫之為莫之致皆當謹其在已者中庸惟聖人能之雖大賢亦未免有過不及者議論是非易行事合理難聖賢書所言之理神而明之在乎人不然書特塵編耳一之理不患不能知患無可貫之實耳朱子本義依吕氏所定經二卷傳十卷古易次序可見易本卜筮之義讀書續録巻六
