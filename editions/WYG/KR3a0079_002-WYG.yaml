body:
  text: 讀書録卷二明薛瑄撰孔子所謂易有太極者言隂陽變易之中而有至極之理是就氣中指理以示人周子無極而太極言雖無形之中而有至極之理則專以理言至太極動而生陽靜而生隂則亦兼以氣言矣學者知無者太極之無形有者太極之有理則有無合一工夫切要在夙夜飲食男女衣服動靜語黙應事接物之間于此事事皆合天則則道不外是矣陽明者善也隂濁者惡也人見天氣晴明則心意舒暢見天氣隂晦則心意黯􅆭亦可以驗好善惡惡之一端吉凶者貞勝者也治亂興衰相尋無端氣化之自然也眼底萬物不出水火木金土萬善不出仁義禮智信凡大小有形之物皆自理氣至微至妙中生出来以至於成形而著張子曰其来也幾㣲易簡其至也廣大堅固元無虧欠元無止息念慮一毫雜妄即非仁便當克去一念之差心即放纔覺其差而心即正心存則理見心放則理與我相忘矣水清則見毫毛心清則見天理斯須心不在而動即妄矣習舉業者借經書之文以徼利逹而不知一言之可用誠所謂侮聖人之言也科目進身者有一第之後四書本經悉置而不觀則身心事業從可知矣人倫明則禮樂興禮只是序樂只是和如君臣父子兄弟夫婦朋友各得其分而不相侵越所謂序也序則禮立矣君仁臣敬父慈子孝兄友弟恭夫義妻聴朋友有信所謂和也和則樂生焉是則人倫禮樂之本人倫不序不和則禮樂何自而興哉人有斯須之不敬則怠慢之心生而非禮矣有斯須之不和則乖戾之心生而非樂矣故曰禮樂不可斯須去身禮者因天理之自然而品節之以為制也仁者天理也人而不仁則天理亡矣禮何自而立哉讀書記得一句便尋一句之理務要見得下落方有益先儒謂讀書只怕尋思近㸔得尋思二字最好如聖賢一句言語便反覆尋思在吾身心上何者為是在萬物上何者為是使聖賢言語皆有着落則知一言一語皆是實理而非空言矣程子謂朞月三年必世大國五年小國七年之類皆當思其作為如何乃有益竊謂為學亦然凡讀聖賢書於其一字一句皆當思其作為如何乃有益也讀書不尋思如迅風飛鳥之過前響絶影滅亦不知聖賢所言為何事要作何用惟精心尋思體貼向身心事物上来反覆考驗其理則知聖賢之書一字一句皆有用矣天於善惡必有其報但人以淺近之見窺測天道便謂茫昧差爽而不可信如夏商之後皆統承先王脩其禮物作賔于王家雖改姓易物而宗廟血食子孫之封爵皆與時王匹休而不泯非其先世有大徳大功於民能如是乎因是以觀魏晉以来以及五胡南北朝楊堅五代之世皆素無功徳於天下徒以狙詐兵力竊命一時皆不數傳而子孫無容足之地廟祀遂以絶饗則天於善惡之報豈不明甚矣乎顔子終日不違如愚喋喋多言而能存者寡矣人性分而言之有五合而言之則一一不可見而五則因發見者可黙識也咸其輔頬舌人未信不可强以言聒之先儒曰他山之石可以攻玉與小人處則動心忍性增脩豫防而徳乃進人未已知不可急求其知人未已合不可急與之合聞人毁已而怒則譽己者至矣人譽己果有善但當持其善不可有自喜之心無善則增脩焉可也人毁己果有惡即當去其惡不可有惡聞之意無惡則加勉焉可也聞人毁己即怫然怒是水不可磯也其小也固矣顔子犯而不校乃其量大無所不包譬以寸莛而撞千石之鐘固不能使之鳴也中庸不可能猶顔子所謂如有所立卓爾雖欲從之末由也己之意程子曰克己最難誠哉斯言也易揺而難定易昏而難明者人心也惟主敬則定而明荀子性惡之論先儒固已辨其非然粹而王駁而霸之語則甚當其他猶知尊二帝三王之法屢舉以為言以聖學律之固極偏駁在戰國時言之視縱横之徒為近醇韓子所以取之者以是歟荀子為人意必剛愎咈戾觀其書其氣象可見果為時用未必不貽害於生人知莫先於知人荀子不取孟子子思則是以二子為非賢也使其見用於時有若孟子子思尚不為所取則其所取者又何等人邪既無知人之明而欲成治功也難矣仰不愧俯不怍心廣體胖人欲净盡天理渾全則顔氏之樂可識矣雖富累千金而心為物役寒氷焦火猶不樂也顔子雖簞瓢陋巷之窶而舉天下之物不足以動其中俯仰無愧胸次灑然樂可知矣嘗驗之天下之人雖至富者求無不遂欲無不得自他人觀之不啻足矣自其心察之彼方愈富愈不足計較得失之私日夜汲汲無須㬰寧息是曷嘗有泰然之樂耶實嘗用力於顔子之學則能知顔子之所樂不然但得其樂之之名而未知其樂之實也譬之泰山人皆知其髙然必親至其處方知其所以髙若聴人傳說泰山之髙而未嘗親至其處則亦臆想而已實未見其髙之實也主一則作事不差纔二三則動作小事亦差矣况大事乎中庸不可能即化不可為也孔子曰一隂一陽之謂道繼之者善也成之者性也皆兼理氣而言天下同歸而殊途一致而百慮一以貫之須知己與物皆從隂陽造化中来則知天地萬物為一體矣孟子曰天之生物也一本知易者莫若孟子處事不可令人喜亦不可令人怒夫子所謂一即統體之太極也夫子之所謂貫即各具之太極也太極即理也合天地萬物之理言之萬物統體一太極也就天地萬物之理言之一物各具一太極也統體者所以㴠夫各具者似合矣而未嘗不分也各具者所以分夫統體者似分矣而未嘗不合也太極中隂陽五行男女萬物之理無所不有所謂冲漠無朕之中萬象森然已具也無極是虚字正以無聲無臭明太極之無形耳天地萬物惟性之一字括盡思無疆為學思索義理者當深體之盖義理深逺無窮茍思慮淺近則不足以造其蘊惟思慮無疆則可以得髙深𤣥逺之㫖易曰惟深也故能通天下之志萬理之名雖多不過一性性之一言足以該衆理朱子謂孟子七篇皆不能外性善之一言竊意豈獨孟子七篇哉學者黙識而旁通之則雖諸經之所言皆不外於是理矣秉心塞淵可以為積徳之要思無疆思無斁可以為進學之要思無邪乃誠身之要聖賢之書神而明之在乎人凡讀書必虛心定氣緩聲以誦之則可以宻察其意若心雜氣粗急聲以誦之真村學小兒讀誦鬬髙聲又豈能識其㫖趣之所在邪讀書當出己之口入己之耳觀書惟寧靜寛徐縝宻則心入其中而可得其妙若躁擾􅄶急粗畧以求之所謂視而不見聼而不聞食而不知其味者也焉足以得其妙乎口念書而心他馳難乎有得矣惟敬足以神明其德耳目口天下之善由於此而惡亦由於此隂符經所謂三要也主一則氣象清明二三則昏昧矣各安其分而天下平矣宋太祖取天下與五代無異然能用趙普之謀収宿將之柄削藩鎮之勢挈數百年塗炭之生民置諸袵席之上其功大矣宋祖取天下之失安天下之功不相揜焉可也易曰形而上者謂之道又曰一陰一陽之謂道道者何太極是也讀書不體貼向自家身心上做工夫雖盡讀古今天下之書猶無益也趙普功之首罪之魁自家一箇身心尚不能整理更論甚政治後人開口論天下事若指諸掌然自治空踈作事無本果能有成乎將聖賢言語作一塲話說學者之通患當官不接異色人最好不止巫祝尼媪宜踈絶至於匠藝之人雖不可缺亦當用之以時大不宜乆留於家與之親狎皆能變易聴聞簸弄是非儒士固當禮接亦有本非儒者或假文辭或假字畫以媒進一與之欵洽即堕其術中如房琯為相因一琴工董庭蘭出入門下依倚為非遂為相業之玷若此之類能審察踈節亦清心省事之一助心不可有一毫之偏向有則人必窺而知之余嘗使一走卒見其頗敏㨗使之稍勤下人即有趨重之意余遂逐去之此雖小事以此知當官者當正大明白不可有一毫之偏向清心省事居官守身之要申公曰為治不在多言顧力行何如耳余謂為學不在多言亦顧力行何如耳讀書體貼到自己身心上方有味皆實理也聖賢豈欺我哉詩曰至于太王實始翦商朱子論語集註用舊説最是唯如此則與三以天下讓之言相合通考中金履祥熊禾皆力辨詩人之言謂姑取其王迹之所由始耳太王實未始有翦商之志若如其說則泰伯三以天下讓之言為不通矣夫子既稱泰伯三以天下讓則詩人之言為有自太王果無翦商之志則必不稱泰伯三以天下讓只泰伯之逃便見與太王之志有不合處使太王無翦商之志天下無歸周之勢周一侯國耳泰伯之去夫子當稱其三以國讓足矣何至稱其三以天下讓邪以夫子之言證詩人之語則集註尤為確論而通考金熊之說有不然矣金氏熊氏辨太王事所以為名教慮其意固美但以夫子稱泰伯三以天下譲之語觀之則當時天下盖有歸周之漸周之子孫又多賢聖太王亦已逆知天命人心之㣲矣故欲傳位季厯以及昌泰伯知之遂逃去若如金氏之說詩人皆假設張大之詞則太王欲傳季厯以及昌之意又何為邪書言太王肇基王迹詩言實始翦商皆相合生天生地神鬼神帝太極也學力未能勝舊習正如藥力未能除舊病頃刻學力不至則舊習仍在一日不服藥則舊病復作學力勝則無此病矣志動氣多為理氣動志多為欲不可以色詞說人求民而不已者其東野稷之御乎下學上達如事君事親事長皆人事也能盡事之之道則仁義之理不外于是所謂上達也以至視聴言動飲食男女之類皆人事也于是而處之各得其宜則天理也下學人事形而下之器也上達天理形而上之道也有是事則有是理有是器則有是道精粗本末無二致也程子所謂意在言表者在人因人事而黙識天理耳人皆知夫子為聖而不知夫子所以為聖欲知夫子所以聖則黙契化育之妙有非言語所能及也故曰知我者其天乎洗心退藏于宻以約失之者鮮矣循理則事自簡雖數十年務學之功茍有一日之間則前功盡棄故曰為山九仭功虧一簣徳性之學須要時時刻刻提撕警省則天理常存而人欲消熄茍有一息之間則人欲長而天理㣲矣不察理之有無而泛讀一切不經駁雜之書務以聞見該博取勝於人吾知其記愈多而心愈窒志愈荒而識愈昬矣如此讀書非徒無益是又適所以為心術之害也學至於心中無一物則有得矣自有文籍以来汗牛充棟之書日益多要當擇其是而去其非可也鄭聲亂雅樂雜書亂聖經詩困於小序之牽强晦於諸家之穿鑿至朱子集傳一洗相沿之陋習洞開千古之光明真所謂豁雲霧而覩青天也人生而靜以上不容說繼之者善也曰命曰性曰誠曰道曰理曰太極一也一念不謹即作狂之端兆一念能謹即作聖之端兆充其極則堯桀分矣於聖賢言理處若天理若人心若性命道徳誠善忠恕一貫太極之類要當各随其㫖而知所以異又當旁通其義而知所以同也鳥雀巢茂林蛟龍潛深淵聖人洗心退藏于宻言不謹者心不存也心存則言謹矣謹言乃為學第一工夫言不謹而能存心者鮮矣文言曰脩辭以立其誠為學不能立誠皆不能謹言也能謹言斯能立誠謹言之功大矣一語妄發即有悔可不慎哉易有修辭立誠之訓書有惟口出好興戎之訓春秋有食言之譏禮有安定辭之訓金人有三緘之誡論語孟子與凡聖賢之書謹言之訓尤多以是知謹言乃脩徳之切要所當服膺其訓而勿失也余於坐立方向器用安頓之類稍有不正即不樂必正而後已非作意為之亦其性然公則一私則殊正則大邪則小衆人非不視也而聖人則異乎衆人之視衆人非不聴也而聖人則異乎衆人之聴盖衆人之視聴徒得其形聲而聖人之視聴則獨得其所以為形聲此聖人聰明睿知卓冠羣倫也歟四方八面之聲無不聞者竅雖在耳神則在心不行而至不疾而速心之謂歟易曰君子行此四徳故曰乾元亨利貞隂符經曰觀天之道執天之行盡矣天地之所以大日月之所以明四時之所以運鬼神之所以靈是皆理之自然也聖人體道無二與天地合其徳矣知周萬物與日月合其明矣動靜以時則與四時合其序矣屈伸以正則與鬼神合其吉凶矣天地也日月也四時也鬼神也聖人也形雖有異而道則無間是皆自然一致夫豈有一毫强合之私哉惟其自然一致是以聖人之心即天地之心聖人意之所為與天無毫忽之差爽所謂先天而天弗違也天理所在聖人率而循之無一息之差繆所謂後天而奉天時也天且不違則人與鬼神之不違者從可知矣此聖人之所以為聖人也歟從心所欲不踰矩先天而天弗違也上律天時後天而奉天時也太極第二圈太極隂陽皆具道器合一上以包無極而太極下以包五行男女萬物故朱子於觧剥圖意終曰易有太極之謂也道器精粗本末此圈盡之周子作太極圖乃心得之妙畫出造化以示人為學於應事接物處尤當詳審每日不問大事小事處置悉使合宜積久則業廣矣言動舉止至㣲至粗之事皆當合理一事不可茍先儒謂一事茍其餘皆茍矣目欲視即當思其邪與正耳欲聽即當思其是與非口欲言即當思其可與否正焉是焉可焉則視之聽之言之邪焉非焉否焉則勿以止之此之謂三要觀太極中無一物則性善可知有不善者皆隂陽雜糅之渣滓也無極而太極天地之性也太極動而生陽靜而生隂氣質之性也天地之性以不雜者言之故曰無極而太極是也氣質之性以不離者言之故曰太極動而生陽靜而生隂是也然無極而太極即隂陽中之太極隂陽中太極即無極而太極太極雖不雜乎隂陽亦不離乎隂陽天地之性氣質之性一而二二而一者也無極而太極氣未用事故純粹至善而無惡及動而生陽靜而生隂則善惡分矣見事貴乎理明處事貴乎心公理不明則不能辨别是非心不公則不能裁度可否惟理明心公則於事無所疑惑而處得其當矣暑不生於暑而生於寒寒不生於寒而生於暑動不生於動而生於靜靜不生於靜而生於動治不生於治而生於亂亂不生於亂而生於治盛衰相根之理㣲矣細㸔萬物皆自冲漠無朕之㣲以至於形著堅固天地之氣相感而物乃成形如星在天乃氣之精英耳及隕於地得地氣遂凝而為石纔資始即資生無纎毫之間也天之氣一着地之氣即成形如雪霜雨露天氣也得地氣則成形矣雨露霜雪近地方有形若太虚至髙則氣愈清而不能凝聚嘗在湖南登山之極髙處日色晴霽俯視山下則雲合而雨以此知雨露霜雪之類皆得地氣而成形也觀隂陽互根之㣲則知治亂盛衰之端其来逺矣有意悅人便失其本心纔敬便渣滓融化而不勝其大不敬則鄙吝即萌而不勝其小矣人外無道道外無人見天人之合一也纔有間即非道矣動為靜根故父生長女而為姤靜為動根故母孕長男而為復造化一嵗一畨新往者既過則草木之枯落者皆煨燼糟粕也萬物之始終雖有遲速不同其理皆然非力所及而思者妄也故君子思不出其位知止所包者廣就身言之如心之止徳目之止明耳之止聰手之止恭足之止重之類皆是就物言之如子之止孝父之止慈君之止仁臣之止敬兄之止友弟之止恭之類皆是盖止者止於事物當然之則則即至善之所在知止則定靜安慮得相次而見矣不能知止則耳目無所加手足無所措知止即智者不惑之事知止則萬理明而心自定矣不能知止猶迷方之人心揺揺而莫知所之也知止則能素其位而行不願乎其外矣知止則動靜各當乎理萬物不能礙天之大萬事不能礙心之虛朱子作濓溪贊其曰風月無邉以言乎逺則不禦也其曰庭草交翠以言乎近則靜而正也其曰書不盡言圖不盡意此理之㣲妙誠有非圖書所能盡者心靜能處事平旦虛明氣象最可觀使一日之間常如平旦之時則心無不存矣平旦虛明之氣象有難以語人者惟無欲者能識之平旦未與物接之時虛明洞徹胸次超然真所謂清明在躬志氣如神者此盖夜氣澄靜之驗茍一日之間勿使物欲汩雜而神清氣定常如平旦之時則心恒存而處事無過不及之差矣瑄因憶少年時晚間誦書愈數而不能誦至来早即心志豁然昨晚所讀之書悉能成誦今思之晚間誦多不能記者氣昏也早間能背誦者氣清也此亦可驗夜氣之說因思古来事勢之去有非人力所能及雖聖賢亦無如之何理盛則能勝氣氣盛亦能勝理因思古来治亂盛衰固有因人事得失所致然所以或生賢哲而人事脩或生昏暴而人道乖亦莫非氣運之自然有非人力所能與也治世之音文武成康而已下此則變風變雅盛焉人事之得失氣化之盛衰于此可考矣亢極之治惟聖人有道以持之使不至於傾如堯之治極矣時當衰也有舜則能持其盛舜之治極矣時當衰也有禹則能保其治使堯之後無舜舜之後無禹則鳴條牧野之事不待後世而後見也乃知治亂盛衰相尋無端者理之常然或當衰不衰當亂不亂者則聖人斡旋造化之功也偽學之謗正如毁日月者初何損其明法立貴乎必行立而不行徒為虛文適足以啓下人之翫而已故論事當永終知敝立法之初貴乎㕘酌事情必輕重得宜可行而無敝者則播告之脩既立之後謹守勿失信如四時堅如金石則民知所畏而不敢犯矣或立法之初不能㕘酌事情輕重不倫遽施於下既而見其有不可行者復遂廢格則後有良法人將視為不信之具矣令何自而行禁何自而止乎中者立法之本信者行法之要為政以愛人為本法者因天理順人情而為之防範禁制也當以公平正大之心制其輕重之宜不可因一時之喜怒而立法若然則不得其平者多矣論事不可趨一時之輕重當思其久而逺者日入而羣動息者氣機闔也日出而羣動作者氣機闢也一闔一闢至理昭然人之性與氣有則一時俱有非有先後也望道未見之心即求道不己之心學者以是自勵則其進自不能止矣許魯齋力行之意多不力行只是學人說話文士學做聖賢文詞如中國人學外國人言語學得雖是自身却只是中國人做得雖是自身却只是庸衆人禽鳥得氣之先者也丑則雞先鳴者陽氣動也午中雞亦鳴者隂氣動也是皆天機之自然𤣥鳥鴻雁往来亦如此魯齋不陳伐宋之謀其志大矣魯齋不對伐宋之謀伐國不問仁人之意也魯齋出處合乎聖人之道魯齋以王道望其君不合則去未嘗少貶以徇世真聖人之學也世祖雖不能盡行魯齋之道然待之之心極誠接之之禮極厚自三代以下道學君子未有際遇之若此也魯齋學徒在當時為名臣則有之得其傳者則未之聞也程朱之外諸儒性理雜論尤當大著眼力以辨其真是真非不可執以為先儒成說而悉從其言魯齋謂其言有彌近理而大亂真者盖謂是也魯齋厭宋末文弊有從先進之意處事即求是處格物致知之一端格物所包者廣自一身言之耳目口鼻身心皆物也如耳則當格其聰之理目當格其明之理口鼻四肢則當格其止肅恭重之理身心則當格其動靜性情之理推而至於天地萬物皆物也天地則當格其健順之理人倫則當格其慈孝仁敬智信之理鬼神則當格其屈伸變化之理以至草木鳥獸昆蟲則當格其各具之理又推而至於聖賢之書六藝之文歴代之政治皆所謂物也又當各求其義理精粗本末是非得失皆所謂格物也然天下之物衆矣豈能遍格而盡識哉惟因其所接者量力循序以格之不踈以畧不宻以窮澄心精意以徐察其極今日格之明日格之明日又格之無日不格之潛體積翫之久沉思力探之深已格者不敢以為是而自足未格者不敢以為難而遂厭如是之久則塞者開蔽者明理雖在物而吾心之理則與之潛㑹而無不通始之通也見一物各一理通之極也則見千萬物為一理朱子所謂衆物之表裏精粗無不到而吾心之全體大用無不明者可得而識矣有不速之客三人来敬之終吉處横逆之道也人非堯舜安能每事盡善真名言也學貴乎日新履端者時之新也為學亦當與時俱新宣徳辛亥元日書于辰溪分司一語一黙一坐一行事無大小皆不可茍處之必盡其方程子作字甚敬曰只此是學盖事有大小理無大小大事謹而小事不謹則天理即有欠缺間斷故作字雖小事必敬者所以存天理也勿起一念之妄誠可存矣觀經書所載之道即當求吾身固有之道心常存則因事觸發有開悟處所謂左右逢原者可見心不存則與理相忘雖至近至明之理亦無覺無見也聖賢知覺運動雖不能不以氣而理則為主衆人知覺運動但氣之所為漫不知理為何物斯須無序即非禮斯須不和即非樂然不和由於無序是知禮又樂之本也如數人在坐尊卑貴賤各得其序自無乖争失序則争矣以是知禮先而樂後度數所以辨人倫自然之序聲音所以發人倫自然之和無序不和禮云禮云度數云乎哉樂云樂云聲音云乎哉古之樂正人心後之樂蕩人心古稱唐太宗語及禮樂房杜有愧論者因謂房杜無制作之才余謂非特房杜有愧盖太宗有愧也上有虞舜之徳則天叙天秩明而上下和由是伯夷后䕫得以推其序與和形之度數播之聲音而為禮樂太宗之德果如有虞之盛乎天叙天秩果明而上下和乎不然雖使伯夷后䕫生於其時亦無如禮樂何矣是又不得為房杜病也用人當取其長而舍其短若求備於一人則世無可用之才矣凡取人當舍其舊而圖其新自賢人以下皆不能無過或早年有過中年能改或中年有過晚年能改當不追其往而圖其新可也若追咎其往日之過并棄其後来之善將使人無遷善之門而世無可用之才也以是處心刻亦甚矣大抵常人之情責人太詳而自責太畧是所謂以聖人望人以衆人自待也惑之甚矣作詩作文寫字皆非本領工夫惟於身心上用力最要身心之功有餘力游焉可也作詩作文寫字疲弊精神荒耗志氣而無得於己惟從事於心學則氣完體胖有休休自得之趣惟親歴者知其味殆難以語人也養深則發於文詞者沛然矣有徳者必有言是也明徳指此心昭然不昧而言盖心明則理亦明故朱子釋明徳曰明徳者人之所得乎天而虛靈不昧以具衆理而應萬事者也重在虚靈不昧上其曰具曰應皆虚靈之所為所謂心統性情者也求在外者未可必求在内者必可得未可必者一聴於天必可得者當責之已萬金之富不以易吾一日讀書之樂也外物之味久則可厭讀書之味愈久愈深而不知厭也酒色之類使人志氣昏酣荒耗傷生敗徳莫此為甚俗以為樂余不知果何樂也惟心清慾寡則氣平體胖樂可知矣事無小大即求合理聴言雜則與之俱化遂失其正故貴乎聴徳惟聪理氣本不可分先後但語其㣲顯則若理在氣先其實有則俱有不可以先後論也理氣决不可分先後讀書録卷二
