body:
  text: 讀書續録卷一明薛瑄撰往年因讀張子心中有所開即便劄記不思則還塞之矣之言遂於讀書心中有所開時隨即劄記有一條一二句者有一條三五句者有一條數十句者積二十餘年乃成一集名曰讀書録蓋以備不思還塞如張子所云者近年又於讀書時日記所得者積久復成一集名曰讀書續録但有即録不覺重復者多欲皆删去而意謂既亦以備不思還塞則辭雖重復亦可為屢省之助云河東薛瑄謹識乾知大始坤作成物造化生物皆乾為之主而坤則無所為惟順承天施而已造化人事皆以靜為主造化非專一翕聚則不能直遂發散人心非寂然不動則何以酬酢天下萬事哉天地常久之道元亨利貞而已天下常久之理仁義禮知而已天地萬物皆自微以至著張子曰其來也幾微易簡其究也廣大堅固乾元是氣之統體無所不包故曰統天只於鼻息之間可見屈伸相感之理吸之極為屈感得呼來為伸呼之極為伸又感得吸來為屈吸又感呼呼又感吸呼吸屈伸相感無端與晝夜寒暑相感屈伸同一理也朱子太極圖解曰太極者本然之妙也動靜者所乘之機也此易之變易流行者也又曰太極形而上之道也隂陽形而下之器也此易之交易對待也朱子所謂易有兩義者如此凡人動為震靜為艮健為乾順為坤與夫入為巽說為兌之類皆易之用故易之於人也周遍而無窮民之於易也隨取而各足聖人作易因隂陽之實體為卦爻之法象是則卦爻之法象無非模寫天地隂陽之實體而已卦爻未畫時至虛至靜之中而卦爻之理已具及卦爻既畫而天地萬物之理皆具於卦爻之中故曰易與天地凖故能彌綸天地之道卦爻分明是天生的聖人不過因其自然者畫出太極性也隂陽氣也論太極而不言隂陽則徒知太極為至善之性而不知氣有昏明清濁之殊故曰論性不論氣不備論隂陽而不言太極則徒知隂陽之氣有昏明清濁之異而不知太極為至善之性故曰論氣不論性不明雖然太極即在隂陽之中隂陽不在太極之外理氣渾然而無間若截理氣為二則非矣靜聞鳥鳴風韻以至萬響皆至理寓焉泛觀天地萬物之有形者何往而非是道之所寓程子所謂顯微無間者當默㑹之禮曰君子不盡人之歡不竭人之忠所以全交也此言有易道存焉子在川上曰逝者如斯夫不舍晝夜是就水言道之往者過來者續無一息之停也所謂道體正在水上水尤易見道體故發以示人邵子詩𤣥酒味方淡太音聲正希乃形容陽稚之意元者善之長也即亨利貞無非善矣仁道至大是萬物皆仁也看來天地之道只一元字都括盡人道只一仁字括盡朱子論無極而太極所以動而陽靜而隂之本體也動靜無時不然而太極無時不在太極即是中正仁義非四者之外又有太極也太極之有動靜即天命之流行也天命即元亨利貞也中庸章句序繼天立極繼字是從易繼之者善字來蓋天理流注到聖人身上聖人以身立極於天下故謂之繼天立極艮其背不獲其身行其庭不見其人無咎竊意艮其背一句是統說艮止也惟止得其止故靜則不有其身動則行其庭不見其人故彖傳曰艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也可見艮其背一句是綱下靣却分作兩支說艮其背是止之本下靣兩支是止之效朱子曰忠者誠有是心而不自欺也恕者推待己之心以及人也推其誠心以及人則其所以愛人之道不逺於我而得之矣此忠恕違道不逺也忠恕違道不逺道即其不逺人者率性而已孟子曰强恕而行求仁莫近焉故忠恕違道不逺所為悖理悔吝之應如響故曰從逆凶四陽在內二隂在外為大過四隂在外二陽在內為小過得意忘言乃知讀書不可滯於言辭之間當㑹於言辭之表言所以述理不述理之言其可尚乎天地之德只是元聖人之德只是仁元於四德無不統仁於萬物無不該理學不明無往而不陷溺於異學心術不正即事事不正理明心正即所見所行皆出於正聽人之言即知其人之邪正所謂知言知人也春秋書楚子入陳納公孫寧儀行父左氏曰書有禮也夫二人皆淫亂之賊陷君於惡楚不能討其罪而戮之復納於陳謂之有禮可乎左氏學識之淺深可見矣程子曰知義之為用而不外焉可與語道矣蓋道即仁而義即仁之用得其宜處非仁之外又有義也故程子云然非知周萬物者不能辨天下之惑河圖之數木火土金水春夏秋冬元亨利貞在人肝心脾肺腎仁義禮知信萬理咸備文王後天圖離南坎北震東兌西正河圖火水木金之位也河圖之數一隂一陽一竒一偶以兩其五行五行木火陽金水隂就五行觀之一行又各具一隂一陽如天一生水地六成之一為陽而六為隂地二生火天七成之二為隂而七為陽之類又如木之甲乙火之丙丁之類皆一行各具一隂陽也四夷來王本於無怠無荒乃知人君一心之敬雖微而逺人歸往之效甚大聖人篤恭而天下平二帝三王之治皆原於此邵子所謂畫前有易者即朱子所謂已定之形已成之勢則固已具於渾然之中而不容毫髮作為於其間也畫前之易即冲漠無朕之中萬象森然已具也涵養吾一一即主敬也致中致和為難涵養不可不深省察不可不密體用一原顯微無間默而觀之凡事分所當為不可有一毫矜伐之意伊傅周召王佐事業大矣自其心觀之則若浮雲之漠然無所動其心天之道公而已聖人法天為治一出於天道之公此王道之所以為大也程子曰謂之變則堅者腐存者亡輪回之說何其誕邪必首出庶物而後萬國咸寧也四時行百物生莫非天理發見流行之實所謂天理即元亨利貞是也聖人一動一靜莫非妙道精義之著所謂妙道精義即仁義禮知是也在天為天理在聖人為妙道精義其理一也天理發見流行於四時行百物生不待言而可見妙道精義著見於聖人之一動一靜又豈待言而後顯哉須要實見得天理發見流行與妙道精義之實處一一體認得分明乃可見道觀太極圖皆天理流行發見之實聖人定之以中正仁義而立人極以至與天地日月四時鬼神合德合明合序合吉凶皆妙道精義之著太極圖包括天地貫徹古今偶見日影之移與川流之意同鑿穿孔也枘刻木端所以入鑿也不量其鑿而納枘其能入乎太極形而上之通也隂陽形而下之器也即是充塞天地太極本然之妙也動靜所乘之機也即是貫徹古今太極即理也性也故朱子太極圖解節節指出性言之太極性理之尊號在天為元亨利貞在人為仁義禮知太極不外乎此也中庸言中也者天下之大本也即仁義禮知皆中也此專言中也周子言聖人定之以中正仁義而主靜此中只是禮之一德偏言之中也專言之中是未發之中偏言之中是時中之中天人合一流通往來之理無間好善優於天下若自用己能惡聞人善何以成事功有一毫矜飾即心馳於外而氣象卑陋矣不知仁義道德為美其所事者皆外物也心役物不可役於物只循理而餘悉聽之天象數未形而其理已具即畫前之易也用人不可不慎才不稱事事何以立聖人謂舉爾所知爾所不知人其舍諸正欲人各舉其所知也必欲舉人皆出於己何以公天下取人之道乎天下之生久矣一治一亂知易者莫若孟子率仁義禮知之性謂之道聖門專論求仁為本心之全德求仁得仁即仁義禮知在其中而率性之道不外是矣只循理便是行道程明道曰中有主則實則外患不能入此實字指主敬而言主敬則天理存而心實外患自不能入伊川曰中有主則虛虛謂外邪不能入此中有主即主敬之主主敬則理雖實而心體常虛虛謂外邪不能入又曰中無主則實實謂物來奪之此實字指外物言中無主謂不主敬即中無主而天理不存外物皆得以入故曰實實即物來填塞於中敬而和處衆之要處己事上接下皆當以誠敬為主有不合當知幾而不可妄求易曰浚恆貞凶霍光小心謹慎沈靜詳審可以為人臣之法易於十二月臨卦二陽方長之時已為八月遁卦二隂初長之戒聖人之逺慮如此春秋不言事應而事應具存天道真可畏未有虛發於前而不應於後者視天為茫茫不足與言天道聖人凡事皆謹於微姤初六坤初六之類可見道者率性而已皆出於天之元亨利貞故曰道之大原出於天本領之學天命之性是也守約施博體用之謂也守約斂之退藏於密施博放之彌滿六合學到口不言而心自得者乃可言自得也造化萬物皆從虛中來故程子謂老子𤣥牝一章最善亦謂虛中生萬化所謂谷神也伊尹周公但能輔其君為太甲成王而已固不能輔之為成湯文武也學易最要知時識勢不然茫茫不知吉凶悔吝之機無極而太極便是元亨利貞天命之全體渾然而未分者動而生陽靜而生隂即天命之流行也天何言哉四時行焉百物生焉天何言哉聖人以道體告子貢而子貢未喻也默識心通活潑潑地無物不有無時不然不為物纍覺得身心甚輕自古以來汲汲於外物之求者併與外物漠然無存矣外物果何益哉天地之塞氣也形而下者也天地之帥理也形而上者也氣也理也渾合而無間者也定之以中正仁義而主靜蓋義與正為靜中與仁為動以中與仁為動是以中仁之用言也只為外物所纍太重便不能有為清心省事為官切要且有無限之樂靜坐中覺有雜念者不誠之本也惟聖人之心自然真一虛靜無一毫之雜念莊生各有儀則謂之性朱子有取焉隂陽迭為消長夬之後姤即繼之泰之後否即繼之剝之後復即繼之此即吉凶貞勝之理嘗提省此心勿令昏蔽妄馳即處事少錯矣無忘無助即天理存心切不可外馳未應事時常持守此心勿失應事時省察此心勿差既應事了還持守此心勿失常主敬則心便存心存即應事不錯切不可聽人之言而隨和之故聽不外馳即無知誘物化之失視聽言動善惡吉凶悔吝之幾皆由於此檢察身心只在視聽言動上用工夫聽人之言而隨和之而不知其言之是非得失此修已第一失也自秦漢以來不知自何時易之圖象不傳於世如王輔嗣作易解只自乾元亨利貞經文以下皆不論其圖象至邵子得先天圖於希夷而後圖象始明易圖象本原至邵子復明因見園中花草茂盛曰此即顯諸仁也窮通醜好之說士大夫所當知在天成象在地成形萬狀彌滿於天地之間皆顯諸仁也而其所以然乃藏諸用也粲然者顯諸仁隱然者藏諸用君子思不出其位而天下定矣四夷來王本於無怠無荒故知以威武服逺人者末也三風十愆遵其戒則治違其戒則亂二五事之疇貌言視聽思恭從明聰睿肅乂哲謀聖乃踐形盡性之學朱子曰道則天人性命之理天命元亨利貞也人性仁義禮知也理統性命而言天人之學貫於一收斂檢束身心到至細至密至靜至定之極作事愈有力凝定靜密自不外馳不知操持此心則馳騖出入無一息之寧靜虛則萬理咸具於寂然之中動直則感而遂通天下之故此聖所以可學也與欲寡而理明則心虛而自無克伐怨欲之纍人之一動一靜即隂陽之動靜也一動一靜之理即一隂一陽之道人能順動靜自然之理即與隂陽動靜之道相合矣朱子曰聖人太極之全體一動一靜無適而非中正仁義之極蓋太極動而為中與仁靜而為正與義即太極之全體也循理即率性也自一身之耳目口鼻手足百體各順其則以至人倫庶事各得其宜皆循理也知化則善述其事化者天地之化一過而無迹如隂陽之變化是也知隂陽之變化則凡率性而行見諸事為之間者無非天地之事猶孝子之善述其事也窮神則善繼其志神者妙而不測如天命之神明是也有以窮之則吾性之全體無非天地之志亦猶孝子之善繼其志也化以氣言故曰知化則善述其事志以理言故曰窮神則善繼其志謂之知猶知化育之知默與之契非但聞見之知也謂之窮則洞見天地之心猶易所謂通神明之德心與之相合無一毫之間也知天地隂陽五行變化之道體之吾身而有動靜五常之道則所行者無非天地之事矣通天地元亨利貞神明之德體之吾心而有健順五常之性則所存者無非天地之心矣然神者天地之本化者天地之用必窮神而後知化也知天地之變化而行事循乎天理皆知化而善述其事也知天道之本原而存心純乎天理即窮神善繼其志也剝上九碩果不食言陽有復生之理夬上六不言隂有復生之理十月純坤而初六之中陽已生至十一月冬至成一陽爻為復聖人則言復亨四月純乾而初九之中隂已生至夏至成一隂爻而為姤聖人則有羸豕躑躅之戒聖人扶陽抑隂而贊天地之化育者可見矣致中是窮神繼志之意致和是知化述事之意剝窮於上而陽生於下夬決於上而隂生於下以此見陽固未嘗有息而隂亦未嘗可絶隂陽消息相因之理微矣仁義禮知道也道出於天之元亨利貞故曰道之大原出於天天人一理也天有不能為人所為者人有不能為天所為者此其分殊也太極者性理之尊號道為太極理為太極性為太極心為太極其實一也不可於中正仁義之外求太極上天之載無聲無臭至矣舉中庸之義而約言之是無極太極之理中庸言之備矣道是自然之理不待盡己推己而後然未至於自然之理誠能盡己之忠推己之恕則至自然之理為不逺也天命之性太極之理也天之晝夜隂陽人之語默動靜皆與道為體運行而不息也仁即道也能以愛己之心愛人則盡仁道也明道作字甚敬曰非欲字好只此是學推之凡事皆然河圖木火土金水即人心所具肝心脾肺腎之形仁義禮知信之德是人心上自有一河圖也河圖之數五行一隂陽也隂陽一太極也太極本無極也萬化之本原中也一心之妙用和也聖人之能事致中和天地位萬物育也學問之極功言復聖之事也天下之本在國國之本在家家之本在身身之本在心心正身修家齊國治天下平王道不過如此此理在天未賦於人物謂之善己賦於人物謂之性故朱子太極圖解曰其動也誠之通也繼之者善萬物之所資以始也其靜也誠之復也成之者性萬物各正其性命也孟子言性善指理之在人心者而言易言繼之者善指理之在造化者而言其實一也時中即性之發而為情中乎節者便是性即未發之中也太極既無聲無臭而又可圖之乎當默識於圖之表勿忘最是學者日用切要工夫人所以心與理背馳者正緣忘於所有事耳誠能時時刻刻不忘於操存省察等事即心常存而天理不忘矣萬物惟其同一氣故皆同一理一氣一理渾然無間萬物各得一氣一理分之則殊合之則一聖人定之以中正仁義而主靜主靜即中庸立天下之大本也三綱五常為萬事之本綱常立而萬事舉唐虞三代治天下之道不外乎此中是道理得其恰好處太極即易書詩春秋禮記四書所言性天道之理非性天道之外别有太極也守約是守此心性之理施博是推此心性之理誠者自成也天命之性也而道自道也率性之道也己欲立而立人己欲達而達人仁者之事小人反是誠是性之真實無妄非性之外别有誠也聰明睿知生知之資而具仁義禮知之德即性之之聖人也萬物並育道並行大德敦化太極之體也不害不悖小德川流太極之用也天道流行而賦於萬物其流行者即繼之者善也賦於萬物者即成之者性也渾然性理無方所無內外非知道者孰能識之性命合一即學貫天人矣天人之理同條而共貫者也格物致知到豁然貫通處即所謂天下無性外之物而性無不在也天地萬物分雖殊而理則一所以可格而致其知中者天地萬物所全具之理和者天下古今所共由之道只中和二字包括無窮之理其要只在心大哉乾元萬物資始至哉坤元萬物資生始者氣之始生者形之始萬物資乾元為氣之始即資坤元為形之始是則坤元之氣即乾元之氣坤無所作為惟順承天施而已朱子曰道者天理之自然中而已矣是則中者其道理之總名與朱子曰知其性分之所固有職分之所當為而各俯焉以盡其力千古聖賢之學只是學於此而已舍此皆是俗學讀易謹察象占二字斯得易之本義荀卿之托身黃歇揚雄之失節莽賊子曰邦有道危言危行邦無道危行言孫其知幾乎一本萬殊萬殊一本於太極圖見之一貫即中和之義程子言忠恕所以明聖道之體用一貫之妙於太極圖見之直書其事其義自見此實春秋之本義顔子幾於無我觀曽子之言可見即至著之象顯至微之理無物不然程子曰復其見天地之心一言以蔽之天地以生物為心朱子論仁本於此咸其輔頰舌艮其輔言有序悔亡發言之得失可見天地自然之易所見皆是天地隂陽晝夜四時人物男女萬物始終皆真易充滿六合貫徹乎古今也象數自河圖始滿天地間無非象數也而理在其中顔子犯而不校蓋不知物我之有間常人才有觸即有不平意只是量小犯而不校最省事只可潛修默進不可求人知待人而人不信只可自反其忠禮運曰人者其天地之德隂陽之交鬼神之㑹五行之秀氣也與此言與太極圖頗相合律呂律法也述也呂助也助陽以宣氣也統天地萬物一氣之變化天下古今萬物萬事皆隂陽之變化而理為之主天地間只一氣因有動靜故有隂陽剛柔之分先儒言之詳矣舉目皆實理實氣此外無一物程子言天本廓然無窮知此則道大無窮可知矣只順理而行都無一事之勞擾順理心安身亦安矣易簡處事自無勞擾事來只順應之不可無故而先生事端進修皆分內事與人何所干涉而求知乎為善求人知者皆非為己之學也韓子曰未聞響大而聲微者也故君子務求響之大而不可急於聲之大易曰震無咎者存乎悔動其補過之心可以無咎此日新之要又曰憂悔吝者存乎介介即周子所謂幾也於此憂懼豈復有悔吝乎凡事皆能謹於幾微則不至於差之大矣四時行百物生皆與道為體運乎晝夜未嘗息也太極自能生兩儀四象八卦加倍生生而不容已所謂生生之謂易也卦爻皆隂陽竒偶之變易皆氣也而太極理也理不雜乎氣故一卦一爻皆有太極焉卦爻形而下之器也太極形而上之道也朱子解曾㸃言志處有三節其曰曽㸃之學蓋有以見夫人欲盡去天理流行隨處充滿無少缺缺故其動靜之際從容如此此一節言其應對之際也其曰而其言志又不過即其所居之位樂其日用之常初無舍己為人之意此一節言其言志也其曰而其胸次悠然直與天地萬物上下同流各得其所之妙隱然自見於言外此一節又是想象曾㸃言外之意與聖人之志同處便是天地氣象也誠者聖人之本誠為太極太極之有動靜是天命之流行也天命為太極天下無性外之物而性無不在性為太極一隂一陽之謂道道為太極聖人定之以仁義中正而主靜立人極焉仁義中正即太極以主宰而言謂之帝帝即太極以妙用而言謂之神神即太極以理而言謂之天天即太極德無常師主善為師善無常主協于克一一為太極喜怒哀樂謂之中中為太極心統性情心為太極惟皇上帝降衷于下民衷為太極繼之者善也善為太極太極者至大至極至精至妙無以加尚萬理之總名也與上天之載無聲無臭至矣易言繼之者善也此善字實指理言也孟子言性善此善字虛言性有善而無惡也然孟子言性善實自繼之者善來因繼之者善故性有善而無惡也無適而非道但當隨時隨處識得分明行得切實耳大傳曰初率其辭而揆其方既有典常茍非其人道不虛行朱子曰方道也始由辭以度其理則見其有典常矣然神而明之則存乎其人也是則凡聖賢之書無非度天下之理必神而明之則人與理為一不然則書自書人自人耳神而明之存乎其人融㑹貫通之謂也神而明之亦足以發之謂也至神而明之乃有得矣隂陽有實體有實氣天地者隂陽之實體也寒暑者隂陽之實氣也然實體實氣非有二也知言則知人才聽人之言便知其於是理有是非常存心於義理久久漸明存心於閒事即於義理日昧矣無忘無助長最切於日用之功而無忘尤急處事最要妥帖定善即無瑕隙之可議中人以上可以語上也中人以下不可以語上也須謹守此訓斯無失言之過夫子之言性與天道不可得而聞也在子貢尚如此况不及子貢者乎交馳於聲利之場而此心存焉者寡矣一切外物放下緊緊於身心上用力斯得近裏之效矣放下一切外物覺得心閒省事人心感而遂通天下之故者元亨誠之通寂然不動者利貞誠之復天人合一之理也理之散在天地萬物各殊者小德之川流理之本於一源深逺不已者大德之敦化小德者即大德之分大德者即小德之具體用一源非有二也朱子曰鬼神謂凡竒偶生成之屈伸往來者蓋生也伸也來也皆神也成也屈也往也皆鬼也嘉言罔攸伏萬邦咸寧古之聖君賢臣皆樂聞善言以成善治若君臣皆惡聞正言有可慮者矣窮理者窮人物之理也人之理則有降衷秉彞之性物之理則有水火木金之性以至萬物萬事皆有當然之理於衆理莫不窮䆒其極而無一毫之疑所謂窮理也窮得人之理必須盡仁義禮知之性窮得事物之理必須使事物各得其宜所謂盡性也理也性也皆天命之元亨利貞也窮理盡性與天命無一毫之間所謂至命也曰理曰性曰命雖無彼此之殊曰窮曰盡曰至則略有先後之序矣此先儒之成說愚竊述之凡聖賢之書神而明之則在乎人也內史過曰敬禮之輿也不敬則禮不行春秋之時議論如此猶有先聖之遺訓焉百里奚曰行道有福即自天祐之吉無不利即永言配命自求多福之意充滿天地皆元氣流行此仁道所以為大也天乃陽氣之實體地乃隂氣之實體元亨利貞仁義禮知之道流行古今充塞宇宙無物不有無時不然聖人性之而無不盡賢者復之而求其至凡民則日用而不知也中只是性情未發已發不偏不倚無過不及便是非性情之外别有中也庸只是此中平常之理便是非中之外别有庸也已發之中無過不及之處便是和非已發之中中節之外别有和也庖丁解牛只是順理人處事能順理即如庖丁無全牛矣程子謂未出門時此儼若思也又曰未接物時只主敬便是為善皆發先聖所未發古人云自勝者强抑暴猛之氣克方縱之欲皆自勝之强也彼血氣之勇烏足謂之强哉虛中無我惟善是從偏執已私而不能從善者由無克己之功也異端邪誕之說欺惑萬世貽害萬世舜處父子兄弟之變湯武處君臣之變周公處兄弟之變聖人處人倫之變而不失其正者亦惟盡乎天理之當然而已程子曰古之為學專養性情蓋性者仁義禮知乃道之體情者惻隱羞惡辭讓是非乃道之用故養性情即學道也太極涵萬物萬物統體一太極也萬物分太極物物各具一太極也即天地萬物觀之渾然一理逺邇大小之間萬物統體一太極也即天地萬物分而言之天有太極地有太極萬物有一太極一物各具一太極也太極之理其大無外其小無內上下四方無一毫空缺之處而天地萬物自不能外此太極常包涵乎天地萬物如大海之水包涵夫水之百物所謂萬物統體一太極也就天地萬物觀之各有一太極如海中之百物各得海水之一所謂萬物各具一太極也惟其萬物統體一太極故萬物各具一太極一國一家常使外有可虞內有可懼則警畏常存而國家安心無外者可以當大任命有以理言者天命之謂性是也有以氣言者死生有命是也數自河圖始理在其中維天之命於穆不已於太極圖見之不度事勢之可否故妄作六十四卦三百八十四爻皆隂陽之變所謂易也而一卦一爻之理即太極也周子曰太極動而生陽靜而生隂朱子解曰太極本然之妙也動靜所乘之機也是太極即在隂陽之中周子又曰陽變隂合而生水火木金土朱子解曰五行各一其性而渾然太極之全體無不各具於其中是太極即在五行之中也以太極生兩儀言之兩儀隂陽而太極無不在即所謂太極本然之妙也動靜所乘之機也以兩儀生四象言之四象即水火木金而太極無不在即所謂五行各一其性而太極渾然之全體無不各具於一物之中也由八卦至六十四卦三百八十四爻每卦每爻無非竒偶隂陽卦卦有太極爻爻有太極氣之所在理隨在焉夫豈有虧缺間隔哉太極自能生兩儀四象八卦加倍生生而不已所謂生生之謂易也聖人與曽㸃言志處全在言外蓋曽㸃當春氣和煦之時浴乎沂風乎舞雩見夫天地上下同流不息飛潛動植萬物各得其所此時曽㸃之心即對時育物之思乃聖人物各付物之妙故曰與聖人之志同便是天地氣象此夫子所以與㸃也無逸一書只是敬與怠故其效不同殷之三宗與文王無逸而敬也故有永年之效自時厥後帝王生則逸逸則不敬也故享年不永天之道只是隂陽之理人之道只是動靜之理聖人只教人求仁蓋人之性雖有四而仁無不統能求仁而克盡已私復還天理則四者之性無不全而天下之萬善豈復有加於此哉元亨利貞仁義禮知之道流行古今充塞宇宙無物不有無時不然性之者聖人也復之者賢人也百姓則日用而不知矣天理元亨利貞也民彞仁義禮知信也天理民彞一而二二而一者也程子曰冲漠無朕萬象森然已具未應不是先已應不是後蓋未應有已發之理具故不是先已應有未發之理在故不是後元亨利貞古無此名至文王彖易乃立此四言以釋乾卦元大也亨通也利宜也貞正也文王意謂乾道大通而至正筮得此卦六爻不變者其占當得大通而必利在於正固乃可以保其終也至孔子為傳遂分為四德元為始於時為春亨為通於時為夏利為宜於時為秋貞為正固於時為冬此即天理之流行而賦於物者所謂天所賦為命也是命賦於人為性元為仁亨為禮利為義貞為知所謂人所受為性也率是性而行所謂道也理既無聲無臭隂陽亦變化不常是豈得而圖之周子作太極圖不過假象以顯義耳學者要當默識其理於圖像之表茍只於圖中溺意以求之又焉有超然自得之妙哉天命即天理也詩曰永言配命自求多福朱子解曰常自省察使其行無不合於天理則盛大之福自我致之有不外求而得矣太極只是性朱子曰乾男坤女以氣化者言也各一其性而男女一太極也萬物化生以形化者言也各一其性而萬物一太極也又曰天下無性外之物而性無不在此無極二五渾融而無間也則太極只是性可見朱子曰性為之主而隂陽五行為之經緯錯綜又各以類而凝聚而成形焉即所謂上天之載無聲無臭而實造化之樞紐品彚之根柢也朱子曰聖人太極之全體一動一靜無適而非中正仁義之極是則太極即中正仁義也四者之外别無太極太極合性命而統言之其致一也先儒曰凡有形者皆為氣無形者皆為密而密即理也凡涉於有為者皆氣其無為者道體也體用一源顯微無間隨時隨處見之性理難强以語人可語者必其人也韓子謂世無孔子不當在弟子之列其自任如此夬履貞厲非但居高自任剛決雖正亦危凡人居顯位操勢柄遇事果行不顧者亦若此占也素履最吉以其不為物誘而率其所履者也韓子曰觀貌之是非不若論其心與行事之是非可否為不失足以破相術之謬周子誠上章誠即太極也大哉乾元萬物資始誠之源也即陽動也乾道變化各正性命誠斯立焉即隂靜也純粹至善者即太極之理有善而無惡也故曰一隂一陽之謂道隂陽即動靜也道即太極也繼之者善即誠之源也成之者性即誠斯立焉元亨誠之通即太極動而陽也利貞誠之復即太極靜而隂也大哉易也其性命之源乎易即隂陽互根動靜循環而性命之源即隂陽動靜之理太極是也圖與書相表裏如此心常存即默識道理無物不有無時不然心不存即茫無所識其所識者不過萬物形體而已理不外乎氣惟心常存則能因氣而識理性理無聲無臭自非存心體認之久不能默悟其妙也道之大原出於天聖賢發明其理言各不同而理則一也庖丁解牛而技經肯綮之未嘗者只是處事順理自無齟齬也朱子曰中者不偏不倚無過不及之名庸者平常也蓋不偏不倚解五性渾然未發之中無過不及解性發為情各中其節之和庸即性情未發已發皆平常之理非性情之外别有所謂庸也周子通書誠上誠下等章皆與中庸相表裏性者萬善之一源即無極而太極也天命天道天理天性天德一也天地間可見者皆造化之迹其不可見者密也太極圖五行各一圈雖曰各一其性各一太極其實初無空缺處但自統體者分之各有一太極耳男女萬物各有一太極亦如此太極其大無外其小無內分而言之天地人雖各具一太極合而言之則統體一太極也道無所不在故莊子有道在稊稗螻蟻瓦礫之類之言程子言莊生形容道體之言亦有之此類是也鬼神字始見於書而詳於易大傳陳北溪曰如鼻中呼吸是氣那靈處便屬魂視聽是體那聰明處便是魄太極上一圈是天地之性隂陽五行男女萬物各一太極是氣質之性然氣質之性即天地之性隨在氣質中非有二也程子曰在物為理處物為義體用之謂也如在父子有仁在君臣有義之類是在物之理也處之各得其宜所謂義也隋文聽獨孤言以廣易勇晉武聽楊后言不易衷後來皆致亂婦言可畏如此義理精則能辨是非定豫奪故綱目非朱子不能作知覺運動之蠢然人與物同者人皆知之仁義禮知之粹然人與物異者知之者鮮矣中庸言道皆率性之謂也中庸不可能者以人不能得性情之正也私欲盡則性情得其正而中庸可能矣故日用求中庸之道者不外乎性情得其正也人才動便有差只是妄動不妄動則不差矣行之而不著習矣而不察學者之通患也程子曰古之學者專務養性情蓋養性情即求中庸之道也朱子曰五性之殊散為萬事是萬事皆一性性即太極也太極動而生陽神之伸也靜而生隂鬼之屈也屈伸相感動靜相因循環無端易之謂也太極通書皆相表裏朱子曰聰明睿知神武而不殺者只是譬喻蓍龜雖未用而神靈之理具在猶武是殺人底事聖人却存此神武而不殺也又曰神武得其理而不假其物之謂又曰神武不殺之言只是譬喻謂聖人已具此理却不犯手朱子曰明道愛舉聖人以此齊戒以神明其德夫雖不是本文意思要之意思自好養性情便是為善便是學道全體呈露是仁義禮知信之性妙用顯行是惻隱羞惡辭讓是非之情全體呈露是大德之敦化妙用顯行是小德之川流全體呈露是維天之命於穆不已妙用顯行是乾道變化各正性命交人而人不敬信者只當反求諸己善莫大於取人之善凡事皆當推功讓能於人不可有一毫自德自能之意性情之外無道性者道之體情者道之用體用一源顯微無間朱子解剝太極圖括盡周子圖說至為精密易只是隂陽剛柔仁義三極之道一太極也仁之道大仁即天地之元也元於天之四德無不統仁於人之四德無不貫其大可知朱子曰道之顯者謂之文即所謂體用一源顯微無間也人之寐隂也闔也寤陽也闢也一寐一寤一隂一陽一闔一闢即所謂易有太極也物有本末不可分本末為二物道有體用不可分體用為二致渾然天理而與物無間道器合一也左氏孟獻子曰禮身之幹也敬身之基也此言猶有先王之遺教焉劉子曰民受天地之中以生所謂命也中也命也即天命之性也召誥敬德之言不一而足則古大臣告君之本端在此矣萬物統體一太極理一也萬物各具一太極分殊也舉天下萬物總而言之只是一理即理一也就天地萬物分而言之各有一理即分殊也理一貫乎分殊之中分殊不在理一之外詩曰永言配命自求多福朱子曰命天命也天命即元亨利貞也永言配命即已之仁義禮知之德合乎天命則自然順理而多福矣君子行此四德故曰乾元亨利貞聖人與天地合德也晉伯宗每朝其妻必戒之曰盜憎主人民惡其上子好直言必及於難後伯宗果為三郤所害伯宗之妻有先見之明如此仁為天之尊爵則禮義知信皆仁所統也惟深也故能通天下之志只是見理透徹學不明所見皆淺末之事修道之教正是聖人贊天地之化育只循理凡事無不順序讀書續録卷一
