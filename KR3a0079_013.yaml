body:
  text: 讀書續録卷二明薛瑄撰天下之大本中也所謂萬化之本原也洛誥以沖子孺子稱成王皆不可曉周公雖元聖豈可以此稱其君不可解無逸書曰昔在殷王中宗嚴恭寅畏天命自度治民秪懼不敢荒寧此數言皆主敬而言治天下之本不外乎此太極圖水火木金土五圈雖曰各具一太極其實初無間隔渾然一理已具而五行各得其一天地萬物皆如此無逸書有天下者不可不斯須熟念而力行之也裕蠱往見吝從容治蠱而蠱益深大臣行事當逺慮後來之患雖小事不可啓其端上卦茍止下卦巽順而無為所以成蠱為學只是學天理人倫外此便非學亦有小廉曲謹而不能有為於事終無益大化滔滔竟莫知所止即太極圖觀之無極而太極者體用一源也隂陽五行男女萬物者顯微無間也蓋無極而太極冲漠無朕而萬象已具故曰體用一源也隂陽五行男女萬物各具太極之理故曰顯微無間也即太極之理而言已具有隂陽五行男女萬物之象故曰體用一源也即隂陽五行男女萬物之象而言太極之理無所不在故曰顯微無間也即太極而言已具兩儀四象八卦以至六十四卦三百八十四爻之象故曰體用一源也即兩儀四象八卦六十四卦三百八十四爻而言太極之理無往不在故曰顯微無間自理而言冲漠無朕而天地萬物之象已具故曰體用一源自象而言即天地萬物之著而冲漠無朕之理各在故曰顯微無間程子又曰冲漠無朕萬象已具未應不是先已應不是後蓋未應而已應之理具存故不是先已應而未應之理常在故不是後萬物統體一太極可見道之極大無外其小無內渾然無間斷處冲漠無朕而萬象昭然已具蓋才有理即有象初非懸空之理與象分而為二也微者理也顯者象也理不離象故曰一源象不外理故曰無間易有太極是生兩儀兩儀生四象四象生八卦謂之生則一齊生就非有片時之間斷也無極而太極太極動而生陽靜而生隂以至陽變隂合而生水火木金土真精妙合氣化生男女形化生萬物竊意其初理為之主而一齊造化生就性即理也千萬世論性之根基朱子所以明程子之言也太極理也隂陽氣也理只在氣中非氣之外懸空有太極也朱子曰此無極而太極也所以動而陽靜而隂之本體也然非有以離乎隂陽也即隂陽而指其本體不雜乎隂陽而為言耳理與氣一時俱有不可分先後若無氣理定無止泊處即行事之公私而可知其人矣體用一源理包乎象顯微無間象不外乎理微隂眇重淵至於六隂盛長知幾者當謹乎此不能三年而緦小功之是察放飯流啜而問無齒决不能於大而謹於細也但明其理而不求諸事則所明之理虛而無用但求諸事而不明其理則所求之事未必皆出於理之正必明其理而求諸事求諸事而明其理俾理在於事皆有的實事合乎理而不違戾斯理明事當而知行兩得矣明理所以處事徒明其理而不能處事則所明之理為無用矣事事物物皆有理就事物上明得理透徹斯可處事物各得其當矣明理是格物致知事理明而後誠意正心修身齊家治國平天下之事可次第用力也天下無性外之物萬物統體一太極也而性無不在一物各具一太極也語大天下莫能載萬物統體一太極也語小天下莫能破一物各具一太極也自太極之體統貫乎隂陽五行男女之用所謂體用一源也即隂陽五行男女萬物之用而各具夫太極之體所謂顯微無間也言貴乎時雜念多雜言多能存乎道者鮮矣惟一念一言專在於道則久久自然雜言多最害正理以其與道相忘也不雜亂多言而心自存心存而於道其庶乎天命云者實理之源性乃天命賦與人物之實體道即率性當然之實用教因性道體用之實而品節之蓋中庸一書不過一誠而誠即性命之實理推之萬事者也體用顯微不曽間斷相離為二物冲漠無朕之理與昭然之萬象一時俱有非先有理而後有象也非象則理無所寓兩儀四象八卦以至六十四卦三百八十四爻天地間自有此象所謂畫前之易也性者人所受之天理仁義禮知之性是也天道者天理自然之本體元亨利貞之常是也性命一理也勿忘最切於學者與道相悖者只是忘之而念不在是也論閒事之言語多論義理精切之言語少欲其有得也難矣學問實自靜中有得不靜則心既雜亂何由有得順理便是順天天之外無理理之外無天也誠即性命之實非性命之外别有誠也晋悼公即位任官各得其人所以復霸况王者能用天下之賢使各舉其職何患天下不治乎渾渾然理氣無窮盡無方體而天地萬物畢貫為一切問近思最於身心有益是非之心人皆有之反之有不可曉者篤志力行而不知道終是淺只於文辭議論是非得失而不本於道終是淺朱子論前輩有云事往之非者不可拈起說有從逆而饗福者幸也譊譊所爭者真細事耳令人厭之群居不可泛言雜駁不近正理之事謹之子曰忠告而善道之不可則止無自辱焉此章有易道存焉蓋能見幾知止也人臣當各立於其職不可有出位之思應事最當知幾人不能受言者不可妄與一言至言非常人所能知范氏曰豫於采薇見先王以人道使人後世則牛羊而已矣觀此則先王之仁厚豈可及哉子路曰未同而言觀其色赧赧然非由之所知也故與人未合者切不可强與之言曾子曰脅肩諂笑病于夏畦觀此則君子之所養可見物外即身外之物也其實不足為身之重輕孔子以不義之富貴為浮雲信然舜禹之有天下而不與蓋天下雖大不能加性分之毫末試看千古以來溺於外物者竟亦何益於己但垂貪不知止之名而已未發之中大德之敦化已發之和小德之川流中者大本也和者達道也大本為體達道為用體用一源顯微無間於此可見大德敦化是萬物之一源小德川流是萬物之殊體一源流而殊體殊體本乎一源非有二也萬物並育而不相害道並行而不相悖並育指飛潛動植而言並行指日月四時而言並育並行皆大化之源故曰大德敦化不害不悖則自大化中流出如飛潛動植各遂其生而不相害日月四時代明錯行而不相悖故曰小德川流然大德敦化者小德川流之本小德川流者大德敦化之分大德敦化如泉源小德川流如泉源散而為千支萬派其實皆理氣之一源達而為理氣之萬殊分而言之各有體用之别合而言之則體用一源也謹言最是難事只與人相接輕發一言而人不從便是失言不可不謹易曰庸言之信庸常之言人以為不緊要輕發而不慎殊不知一言之妄即言之失故庸言必信德之盛也凡事必有徴驗之實乃可言不然即妄言者多矣小學一書不出乎父子君臣夫婦長幼朋友之五倫五倫不出乎仁義禮知信之性是則性也者其小學之樞紐也歟太極隂陽五行男女萬物理氣混合為一元無間隔就中細分之則隂陽五行萬物各具一太極也理氣真實不可分先後動之前為靜靜中有太極靜之極為動動中有太極程子所謂動靜無端隂陽無始也周子通書誠上誠下誠幾德聖慎動道六章只是一箇性字分作許多名目洪纎髙下飛潛動植各具此理所謂各正性命誠斯立焉也偶見栁花悠揚髙下因悟造化流行雍容自然之妙通書一書不外乎太極隂陽五行男女萬物萬事之理與太極圖一一相合無間惟細玩之可默悟其妙通書一字一義皆與太極圖相合人動處有差造化亦有差如寒暑不時福善禍淫之不當者朱子云然四書集注下小注腳程朱外諸家固有發明集注者而穿鑿者尤多許魯齊所謂彌近理而大亂真者不獨異端為然大哉乾元萬物資始至哉坤元萬物資生才資始即資生無須臾之先後元亨誠之通利貞誠之復大抵春夏為誠之通秋冬為誠之復然物亦有生於秋而成於夏者亦有生於春而成於夏者亦有生於春而成於秋者亦有生於夏而成於秋者凡一物始終即一物之元亨誠之通利貞誠之復也中人以上可以語上中人以下不可以語上教人者當謹守此言與人談論亦當謹守此言聖賢真是人不能識如程明道去聖人為不遠陳襄薦明道謂其可為風憲之職是豈足以知明道哉通書聖第四朱子語録曰須知此大哉乾元萬物資始以上更有寂然不動竊意大哉乾元萬物資始是太極動而生陽乃太極之用流行者也動前即隂靜而隂靜之中乃太極之體立豈非寂然不動者乎朱子曰知者心之神明所以妙衆理而應萬事也故知不昧斯能妙衆理而應萬事日用之間知最為切要或茫不知理之所在而應事不差者鮮矣孔子得堯舜三代之事實文章乃可以致删述朱子得濂洛關中師弟子之議論著述乃可以成傳注故孔子集群聖之大成朱子集群賢之大成其揆一也許魯齊答竇先生書中間一節議論深識命時勢三者蓋深於易者也不知時識勢而妄為即孟子所謂小有才而不知君子之大道如黃流滔滔之下流而欲捧塊以塞之愚之甚矣莊子人間世篇揣摩人情世態曲盡而無遺言當察受否識微者知之凡天地萬物有形而可見者皆乾道變化各正性命誠斯立焉色斯舉矣翔而後集大而出處小而交接皆當見幾而作也履霜而知堅氷之必至羸豕而知蹢躅之有孚故凡事必謹於微微不謹必至於著矣中庸末章引詩曰衣錦尚絅如此方是為己之學有一毫求知之心即非為己之學矣曾㸃言志便是道也者不可離也可離非道也無物不有無時不然曾㸃言志便是太極隂陽五行萬物流行各得其所之妙曾㸃言志便是乾道變化各正性命誠斯立焉朱子曰曾㸃之學蓋有以見夫人欲盡處天理流行隨處充滿無少缺缺即取之左右逢其原語大天下莫能載語小天下莫能破道也者不可須㬰離也之意觀曾㸃之志雖至小之事不可妄為是何也以道無不在也天理流行即隂陽動靜而太極無不在理雖不雜乎隂陽亦不離乎隂陽也元亨利貞之流行即天理之流行無一息之間斷無一毫之缺缺所謂天理流行隨處充滿可以心悟不可以目覩也太極之有動靜是天命之流行也天命之流行即天理之流行也體即微顯即用體用一源先言體而用在其中顯微無間先言用而體不能外夬之九三曰壯于頄有凶君子夬夬獨行遇雨若濡有慍無咎故决小人之道貴乎不係私愛雖若與之合而終能不露形迹以夬之也程明道不用文字蓋誠意既不能動人文字何補古之聖人不語人以未及言實未易聽必允迪厥德然後謨明弼諧聖人雖教人不倦亦未嘗輕以大本大原語人觀論語問答處可見姤之時義大矣哉朱子曰幾微之際聖人所謹待人當宏而有節天地不交無以成化功上下不交無以成治功神無方而易無體就太極圖亦可見太極或在隂中又在陽中或在陽中又在隂中此神無方也或為隂又為陽或為陽又為隂此易無體也究而言之隂陽之易無體太極之神無方氣與理蓋未嘗離也程子萃彖傳曰有無動靜始終之理聚散而已聚則為有為動為始散則為無為靜為終萬物死生之理如此而已矣張子曰一故神即神無方曰兩故化即易無體大抵少能省己之失惟欲尋人之失是所謂不攻己之惡而攻人之惡大異乎聖人之教矣不能深識事幾妄為而中實亦可耻也聖人最惡訐人之隂私物我彼此渾然一理但所得之分各殊耳程子所謂豁然有覺處覺者悟此理精粗本末渾然一致也程子曰雜信鬼怪異說者只是不先燭理不相知者雖終日同處亦不知也進退出處只當居易俟命無妄主於人庶幾不失所守游程朱之門者得其傳者有其人與為學只是要知性復性而已朱子所謂知其性之所有而全之也體用一源即體而用已具顯微無間即用而體不外雷二月發聲八月收聲者氣之動靜也人不謀諸己而强為之謀彼即不從是謂失言日用間此等甚多人以為細事而不謹殊不知失言之責無小大也謹之日用間纎毫事皆當省察謹慎孔子五十而知天命子貢以夫子言性與天道不可聞若開口即論天命性與天道聽者果能入乎四書滿天下聖經賢傳妙㫖無窮讀者果能真知其理而實踐之乎學術不造乎髙明正大則所就之事業卑陋可知日用體認仁義禮知之性於所存所發之際最是為學之切要實氣實理充塞而無窮盡流行而無止息大無外小無內一實理實氣貫之春而大始夏而亨通秋而利遂冬而貞固一實氣實理貫通流行如循環之無端天地人物之理渾合而無間但其中自有條理所謂理一而分殊也知道則言自簡是何也以非道不敢言也句句著實不脫空方是謹言溫公謂誠自不妄語始信哉斯言也信口亂談者無操存省察之功也謹言是為學第一工夫能謹言則句句是實理不能謹言則句句是虛談言是實理則能實其行矣言是虛談則必不能踐其言矣信口亂談妄道真猶病風狂而不自覺也元城劉忠定力行不妄語三字至於七年而後成力行之難如此而亦不可不勉也行仁義謂之道行道而有得於心謂之德道德仁義名雖殊而理則一也道德仁義禮知一理也老子乃謂失道而後德失德而後仁失仁而後義失義而後禮是分道德仁義禮為五也老子言道德而外仁義果可謂之道德乎韓子謂其去仁與義而言道德亦可謂深知老子之失矣人臣事君當竭忠盡誠雖細事不可欺雖曲禮皆當謹不知道即不知所行之是非三才雖各一太極又總是一太極如天有元亨利貞地亦有元亨利貞人亦有元亨利貞分而言之為三才各一太極合而言之地與人之元亨利貞即天之元亨利貞是三才各一太極又總是一太極也朱子曰天即理也逆理則獲罪於天矣然則欲免獲罪於天必須事事所為合理即順乎天而無事於禱矣逆理而獲罪於天不特禱於奧竈而不能免雖禱於天亦無益也朱子答學者之問多告之以性與天道之妙乃聖賢接引後學不得已之盛心也必若待中人以上之資始告之以此則可告者亦少矣是則孔子所言者教人之正也朱子之接引後學者權也讀正書明正理親正人存正心行正事斯無不正矣斯須不可不近正人斯須不可不行正道五經之後大學論孟中庸程朱易傳義詩傳四書集注周子太極圖說通書張子西銘中庸二十二章言至誠三十一章言至聖三十二章又言至誠三章之義融而會之可合於一二十二章言至誠盡己之性即三十一章至聖盡仁義禮知之事溥博如天淵泉如淵即三十二章立天下大本之事其曰盡人之性盡物之性即三十一章洋溢施及中國蠻貊之事即三十二章經綸大經之事其曰贊化育與天地參即三十一章配天之事三十二章知天地化育之事究而言之一誠而已夏月暑氣鬱蒸萬物發生暢茂邪說異端斯須不可近為害至大堯舜禹湯文武周孔顔曾思孟周程張朱正學也不學此者即非正學也四書頃刻不可不讀大要當洗滌盡此心之欲有一毫之欲未盡即本體蔽昧而用失其當矣心性為天下之大本必涵養純一寧靜則萬事由此而出者皆天理之公矣心如水之源源清則流清心正則事正涵養省察雖是動靜交致其力然必靜中涵養之功多則動時省察之功易也周子通書誠幾德章幾字兼善幾惡幾而言聖章誠神幾此幾字專以善幾而言中庸只說未發已發周子又指未發已發之間說幾字乃發前聖所未發也易曰憂悔吝者存乎介此介字似周子幾字中庸示人靜存動察功已密矣周子又發出動靜之間幾字教人於此用力又功之至密至密者也靜坐洗心殊覺快愜易中幾字乃周子幾字所自出一切外物皆不可思思之又未必得得之又無所益不若專思義理至於久而精明純熟則可以馴達天道矣用力於曲學之差矻矻終身而無所得韓文所以髙於諸子者以約六經之㫖而為之也先儒猶謂其先學文失進為之序况為文不本於六經義理徒取文士之辭華綴集而敷衍之者乎自勝者强克己最為難事不可不勉周子曰果而確克己之功當如是宴安之私最難克宴安鴆毒此言當深省體用一源者即源而流在其中顯微無間者即流而源不外是書曰顧諟天之明命明命即天之元亨利貞賦於人為明德仁義禮知也中庸所謂天命之謂性是也至善即明德之極處非明德之外别有一理為至善也惟天下至聖為能聰明睿知足以有臨也唐虞三代以下漢唐宋之君有如是之德者乎無如是之德欲其行二帝三王之道難矣朱子曰其體則謂之易這只是隂陽動靜剛柔闔闢消長不著這七八箇字說不了若喚做易只是一字便了然則易之為義於是可識矣莫不飲食鮮能知味日用而不知凡民也不獨凡民為然恐讀書而不明理者亦然佛老之教初無齊蘸之說齊蘸皆起於後世梁武道君之事可驗矣宋之時不惑於異端者無幾雖名士公卿亦陷溺其中道之難明也如此夫異端邪誕妖妄之說惑世誣民充塞仁義為害不可勝言自古如此潔矩是恕心鬼神是二氣之靈隂陽合散無非實者鬼神是二氣實然之理鬼神合理氣為一而言全體呈露是元亨利貞妙用顯行是春夏秋冬全體呈露是仁義禮知妙用顯行是惻隱羞惡辭讓是非五氣布四時行即元亨誠之通利貞誠之復鳶飛魚躍之機舉萬物皆然思齊一詩修身齊家治國平天下之道偹焉讀之有以逺想前王之盛身在堂上方能辨堂下人是非茍雜於堂下衆人之中則亦不能辨矣此先賢之成說有感而書於此人好靜而擾之不已恐非為政之道太極十箇圈總是一箇而二氣五行男女萬物之外無太極也太極圖男女各一太極萬物各一太極又皆各有隂陽之氣涵太極非有理而無氣也觀日影之漸移即造化之密移可知矣謂之道謂之器謂之變謂之通謂之事業名雖殊而其為道則一也即太極無聲無臭而隂陽五行男女萬物之象已具於其中所謂體用一源也即隂陽五行男女萬物之象而太極之理無所不在所謂顯微無間也顔子於聖人體段已具即孟子中公孫丑所謂顔子具體而微也體段是聖人所具之天理顔子亦有蓋以一身四肢之體段喻一心四德之體段也張子曰性者萬物之一原即周子所謂無極而太極也維天之命於穆不已即乾之四德流行而不息也程子曰立人之道曰仁與義據今日人道廢則是今尚不廢者猶只是有那些秉彞卒殄滅不得觀程子之言其所感者深矣抑之詩曰相在爾室尚不愧于屋漏無曰不顯莫豫云覯神之格思不可度思矧可射思此即川流不息之意其要在謹獨豫誦此詩深有警於心乾有元亨利貞坤亦有元亨利貞至哉坤元萬物資生乃順承天坤之元也坤厚載物德合無疆含𢎞光大品物咸亨坤之亨也牝馬地類行地無疆柔順利貞君子攸行坤之利貞也人之仁義禮知人之元亨利貞也三極之道本一極也伊傅告君之辭曰德曰仁曰誠曰敬曰明命曰一曰道皆歸於人君之一心大臣正君之職於是可見帝王之治皆本於道德而禮樂刑政乃為治之具帝王為治之本在德其次莫先於用賢才修治法治法者禮樂刑政是也義即是天命君子行義所以立命也術數之學專以窮通夀夭為命常人信其說而不修在己之義惑之甚矣太極之有動靜是天命之流行也天命元亨利貞也動者元亨誠之通靜者利貞誠之復天命之流行是即太極之流行太極天命其理則一也維天之命於穆不已天命即元亨利貞天命深逺流行不已即程子所謂動靜無端隂陽無始朱子所謂太極之有動靜是天命之流行也天道天德天命天理一也三代而下文武長才有武侯數學之精有康節道學之純有程朱程朱在當時知者甚少程朱立朝時人多欲背行之正如安童之論許魯齊程朱接孟氏之統有功於萬世程朱之道萬世之後必有追崇盛於前時者程朱從祀不宜在漢唐諸儒之下程朱傳注少有用心於其間者真知力行元有許魯齊程朱之書得其門者鮮矣舉天下之物不足以動其中道學君子也濂洛關閩數君子雖所學成就不同要皆有大功於聖門者也尊程朱之學者許文正也維天之命於穆不已於太極圖見之治不生於治而生於亂亂不生於亂而生於治亦猶隂不生於隂而生於陽陽不生於陽而生於隂治亂相根之理微矣觀隂陽之互根見治亂之相根一言之失喪邦邦未必喪也而喪邦之原基於此一事之失而喪邦邦未必遽喪也而喪邦之幾兆於此非識微之君子孰能知之天人禍福相應之幾至微而不爽戲言無實最害道易曰修辭以立其誠必須無一言妄發斯可學道茍信口亂談而資笑謔其違道遠矣笑謔不惟亂氣而且亂心言謹則氣定心一言要專一心要專一或者謂以漢髙祖之明達誠得大儒佐之可以成三代禮樂之治竊謂漢髙祖以馬上得天下不事詩書果有祇德檢身反身自治純亦不已如禹湯文武之德乎不然雖有大儒佐之亦不能成禮樂之治也中庸篇末八引詩工夫極其精密義理極其深妙非知道者孰能識之孔子多教人學詩觀中庸大學引詩居多則其有得於詩者深矣太極圖之理自朝至暮說不盡但少肯聽者耳無限量無空缺無間斷無窮盡大莫大於此者故遊於聖人之門者難為言大以包小小以分大一以貫之有四大而道包之理直是難言而言亦人未之信好仁者無以尚之純是天理克己為仁孔門有顔子汩溺於聲利之中而不覺何道之敢言言之適足以為口耳之末耳程子所謂醉生夢死真不為虛語孟氏統絶漢唐間言道者皆妄也韓子亦止能言道之用耳道至濂洛關閩而明今其書雖存吾不知道之要何在抑之詩相在爾室至不可度思五句茍能力行之可以至天德無極太極理也隂陽五行氣也無極太極非有離乎隂陽即隂陽而指其本體不雜乎隂陽而為言是理雖不雜乎氣亦不離乎氣也五行雖各具一太極而五行各有其氣是理雖不雜乎氣亦不離乎氣也無極之真二五之精妙合而凝是氣理相合而無間也男女各具一太極而男女各有隂陽是理又未嘗離乎氣也萬物各具一太極而萬物皆有隂陽是理又未嘗離乎氣也是則萬物男女五行一隂陽隂陽一太極太極本無極初無精粗本末之間則理氣不相離者可見矣理氣豈可圖而周子圖之非超然有得於圖之表者不能知程子終身不以示人者其意微矣蠢然動之氣人皆知之粹然動之理則知者鮮矣一是寂然不動貫是感而遂通天下之故一是天下之大本貫是天下之達道一是一本貫是萬殊在一心之理與在萬事之理本無二致惟聖人一心之理能通萬事之理者以其純乎天理之公也道即理也聖人一心之理通乎萬事之理體用之謂也誠為萬理之樞故曰誠者聖人之本易者隂陽也充滿天地流行古今無一物之不體無瞬息之有間程子曰其體則謂之易隂陽之謂也大傳曰易無體言或為隂或為陽無一定之體也性為萬理之樞故曰天下無性外之物而性無不在行有不得反求諸己乃接物之要心之理即仁也三月不違仁者心在內即仁在內為主日月至焉者心在外即仁在外為賔或以宅喻仁謂心在仁之內為主心在仁之外為賔嘗考程子有曰心如穀種其生之性仁也以此觀之則心與仁未嘗相離若謂心在仁之內心在仁之外是分心與仁相離為二矣且曰心在仁之外則其在內之仁又孰為之主是有無心之仁也恐其說有未盡竊意三月不違仁者心在內即仁在內為主日月至焉者或一日心與仁在內或一月心與仁在內是心與仁在外之時多為賔未知是否姑書以俟來世無物不有道之大充塞天地無時不然道之久貫徹古今太極圖明一理隂陽五行化生萬物通書明一理隂陽五行散為萬事表裏相合者如此聽人之談即知其是非邪正所謂知言知人也讀通書筆録誠上第一誠者聖人之本即圖之太極隂陽五行之謂也誠下誠即圖之太極五常即圖之五行之性靜無動有即圖之太極在隂陽也誠幾德第三誠即圖之太極幾即圖之隂陽動靜之間仁義禮知信之德即圖之五行之性也聖第四寂然不動之誠即圖之太極在靜中感而遂通之神即圖之太極在動中幾即圖之隂陽動靜之間也慎動第五曰道曰德即圖之五行之性也道第六聖人之道仁義中正即圖之中正仁義也師第七性者剛柔善惡即太極隂陽五行之內氣質之性也中則本然之性也幸第八有耻即圖之義也思第九無思思通幾動即誠神幾即圖之太極在隂陽中與隂陽動靜之間也志學第十伊尹顔子所志所學即圖之太極也順化第十一陽生之仁隂成之義即圖之隂陽仁義也治第十二仁義禮知動靜言貌視聽即圖之五性隂陽五行之事也禮樂第十三禮樂即圖之隂陽也務實第十四實勝善也即圖之太極也愛敬第十五其曰善即圖之太極純粹至善之理也動靜第十六動靜即圖之隂陽神即圖之太極也樂上中下第十七十八十九其曰樂即圖之動陽也聖學第二十其曰一即圖之太極其曰靜虛動直即圖之隂陽其曰明通公溥即圖之五行也公明第二十一其曰公曰明即圖之太極誠而明也理性命第二十二曰彰曰微即圖之陽明隂晦靈即圖之太極剛柔善惡五二一本即圖之隂陽五行太極也顔子第二十三顔子之樂即全乎圖之太極也師友下第二十四二十五其曰道曰德曰義皆圖之太極也過第二十六過者違乎圖之太極也勢二十七勢之輕重即圖之隂陽迭運相勝者也文辭第二十八載道之文道即圖之太極因辭以明理者也聖藴第二十九豫欲無言天何言哉四時行焉百物生焉即圖之太極無聲無臭而為造化之樞紐品彚之根柢也聖人之藴即圖之太極也精藴第三十精即圖之太極至精之理藴即圖之太極至廣之業也乾損益動三十一乾乾不息之誠即圖之太極於穆不已之實理也損益動所以求至此實理也家人睽無妄第三十二曰端本曰誠心曰善皆圖之太極也睽天地睽而其事同同即圖之太極也復則無妄即太極也陋第三十四曰道曰德皆圖之太極也文辭之陋不本於太極者也擬議第三十五至誠動變化即圖之太極隂陽也刑第三十六春即圖之陽秋即圖之隂也公第三十七天地至公即圖之太極也孔子上第三十八其曰王道即圖之太極其曰王法即圖之太極見於修道之教也孔子下第三十九道德髙厚教化無窮實與天地參而四時同孔子即圖之太極五行也䝉艮第四十時中即圖之中艮止即圖之主靜也竊嘗觀之太極圖不過一理隂陽五行化生萬物通書亦不過明一理隂陽五行五性散為萬事故通書一字一義皆與圖意相合愚雖融會旁通不能詳舉其說而大略則庶幾其萬一姑筆録于卷以俟後之君子薛瑄謹識朱子曰聖人作止語默無非教也蓋作與語是動動即太極之用所以行也止與默是靜靜即太極之體所以立也用之行中與仁是也體之立正與義是也作止語默皆太極之道所謂無非教也聖人體道無隱其作與語是動處即感而遂通天下之故天下之達道也其止與默是靜處即寂然不動天下之大本也聖人無行而不示人以至理理即作止語默之則也人多以言語觀聖人而不察其天理流行之實故聖人無行而不示人者皆天理流行之實也天理只是仁義禮知信散而為萬善當於聖人作止語默之間一一默識其何事是仁何事是義何事是禮知信無不了然於心而無疑庶可以知聖人所以為聖矣於人無憎惡之私惟公好惡而行之費而隱即顯微無間民咸用之謂之神但人由之而不知也子曰巍巍乎舜禹之有天下也而不與焉朱子曰不與猶不相關言不以位為樂也蓋舜禹德冠人羣雖處富貴之極而漠然無所動其心况肯窮侈極欲以位為樂乎宜乎夫子以巍巍稱之其髙也可見矣孔子曰不仁者不可久處樂朱子曰久樂必淫蓋不仁者失其本心為富貴所動窮侈極欲無所不至正與舜禹有天下而不與相反聖人則超出萬物之上不仁者則陷於物欲之中聖人則役物不仁者則役於物此正天理人欲之所由分也學者不可不察但為外物所動者便被他壓得低了巍巍乎髙出萬物之表者其惟舜禹乎聖人不以天官私非其人故曰天命有德五服五彰哉聖人首出庶物巍巍乎舜禹之有天下也而不與焉河圖天一生水地二生火故太極圖水根於陽火根於隂聖人之治天下仁心仁政本末具舉聖人子民之心無時而忘朱子曰天地之間只有動靜兩端循環不已此之謂易而其動其靜必有所以動靜之理乃所謂太極也愚竊謂人日用之間亦只有動靜兩端循環不已亦所謂易也而其所以動靜之合乎道者亦所謂太極也惡非有意之私而合乎天理之公即所謂惟仁者能惡人也名節至大不可妄交非類以壞名節守官最宜簡外事少接人謹言語聖人之心方其靜時至虛至明所謂寂然不動者也事至物來應之各有條理所謂感而遂通者也是其未應之時初無一毫妄念之起所謂無意也既應之後隨事而休所謂無必無固無我也止非一定不移之謂乃隨時而止也如當動而動止在動上當靜而靜止在靜上當止而止止在止上當行而行止在行上當語而語止在語上當默而默止在默上以至萬事萬物各有當止之理惟止得其時乃止之義也茍當動不動非止也當靜不靜非止也與夫行止語默各失其當止之時皆非止也蓋止無定體惟隨時而各止其當然之理則止之為義得矣止在人無須㬰之可離當識其時之所當止者止之止之為義廣大無所不包大而人倫綱常之道細而語默動靜之間止得其止則為天理止失其止則為人欲矣易言艮止書言安止欽止詩言敬止大學言知止止之為義最精乃天理當然之極也須㬰失其止即人欲之私矣止當內外動靜交致其力靜而心不止於天理非止也動而事不止於天理非止也天理者仁義禮知信而已萬事所以不治者失其所當止也萬事各止其止則天下治矣止則心定理明止則順理而無事止則靜一而精明不止則紛擾而雜暗非禮勿視視必合禮視得其止也非禮勿聽聽必合禮聽得其止也非禮勿言言必合禮言得其止也非禮勿動動必合禮動得其止也視聽言動皆得其止則人欲盡而天理全矣人心失其動靜之時者皆不得其止也止則物各付物自無紛擾之患止則天地位萬物育矣朱子所謂動靜各止其所而皆主夫靜即周子定之以中正仁義而主靜之意蓋中也仁也動也正也義也靜也仁義中正動靜周旋而常主夫靜則動靜各止其所矣艮其背不獲其身行其庭不見其人只是動靜各止於理而不知有人也伊川艮傳曰外物不接內欲不萌如是而止乃得止之道於止為無咎先儒言只說得靜之止非明則動無所之非動則明無所用知行貴乎兼盡也張子曰天體物而不遺猶仁體事而無不在也語意與鬼神體物而不遺之體同鬼神體物而不可遺物物一太極隂陽也大哉乾元元即太極之動亨利貞皆太極之流行也易有變易交易兩義變易之易隂陽晝夜流行是也交易之義天地上下四方對峙是也語大天下莫能載焉語小天下莫能破焉即太極也太極即性也即天下無性外之物而性無不在也誠命性理太極道名雖殊實一理也天命性道德皆天理也分而言之自其出於天者謂之天命元亨利貞是也天命賦於人者謂之性仁義禮知是也率性而行莫不各有仁義禮知父子君臣夫婦長幼之道所謂道也行是道而得仁義禮知之性於心所謂德也合而言之莫非天理也然所以具天命之性行率性之道得仁義禮知之德全天理之體用者皆本於心故張子曰心統性情讀書續録卷二
