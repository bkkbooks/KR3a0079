body:
  text: 讀書續録卷四明薛瑄撰太極涵萬象體用一源也萬象具太極顯微無間也漢初文章猶是論事所以近古至司馬相如輩詞賦專尚華藻文體變矣漢文帝天資恭儉非由學力中庸戒慎恐懼慎獨靜存動察為仁之功也正理所見既明則邪說不能惑陽一以施隂兩而承此理萬古不易天所賦為命元亨利貞也人所受為性仁義禮智也天下古今萬理不出性命程子曰理無形也故假象以顯義乾六爻皆然其餘卦爻皆然竒陽之數健陽之性有數即有理元不相離偶隂亦然動心忍性則日新矣隨處有天理順天理皆可樂也大本大原無所見淺矣大本大原直是不可得而形容上天之載無聲無臭至矣天何言哉其理則至顯卦畫只是隂陽而其理無窮隂陽中有理理不外乎隂陽精粗本末無二致觀太極圖可見矣理氣物物皆然理氣之外無一物惠迪吉理也希夷陳氏曰羲皇始畫八卦重為六十四不立文字使天下之人觀其象而已能如象焉則吉凶應違其象則吉凶反後世卦畫不明易道不傳聖人於是不得已而有辭學者謂易止於是而不知有畫矣觀希夷之言如此則卦象者其易之本與易是氣道是理隨時變易以從道氣在是而理亦在是也如人之一動一靜易也動靜合理即從道也修辭以立誠一言必須實多記駁雜之事妨正理惻隱羞惡辭讓是非皆善幾之發見也天下古今只有一善而已人不為善何以為人妄念邪念息則意自誠矣繼之者善也成之者性也善性一理也在造化為善在人物為性繼之者善誠之源也成之者性誠斯立焉消息盈虛大而天地之闔闢小而日時之始終皆一理也自太極生一竒一偶加倍至六十四卦便是易伏羲元無文字至文王繫彖周公繫爻文王周公之易也孔子十翼孔子之易也皆發明六十四卦三百八十四爻之理而已天地間隂陽是自然之易卦畫竒偶不過模寫隂陽之象而已故亦謂之易卦之竒偶法隂陽之竒偶而畫天地之易易書之易同一隂陽而已自一竒一偶漸次生滿六畫是聖人作易之本原後聖卦下繫之辭亦謂之易伏羲先天圖卦畫次序方位是易文王周公孔子之畫乃易之辭也隂陽滚滚不已造化人事皆由此出造化日新人事亦日新周禮三易經卦皆八其别六十有四即易也伏羲之卦因文王周公繫之辭故曰周易後天圖乃文王之圖彖爻之辭文王周公所繫故謂之周易遲速不尤人只歸之天如先天圖陽交於隂隂交於陽天地定位山澤通氣雷風相薄水火不相射八卦相錯是交易之易朱子所謂交易為體也自坤而復以至於乾自乾而巽以至於坤一動一靜互為其根寒往暑來循環不已是變易之易朱子所謂變易為用也易有交易變易之義如此交易為體以定位而言變易為用以流行而言天地上下四方定位也晝夜寒暑往來流行也交易為體以定位而言天地上下四方是也變易為用以流行而言晝夜寒暑往來是也隂陽竒偶天地之易卦畫竒偶易書之易天地之易易書之易同一隂陽而已交易為體以定位而言天地上下四方是也在圓圖上即乾坤坎離之定位變易為用以流行而言晝夜寒暑往來是也在圓圖上即卯酉子午之流行圓圖定位流行之易模寫天地間定位流行之易於穆不已於先天圖見之精是卦畫之理蘊是卦畫之辭就卦畫推出偏傍之理也如乾健是卦德象天是卦象內外卦爻位是卦體爻自外來是卦變先天圖離卯為春乾午為夏坎酉為秋復子為冬坤為晦復為朔自坤之震月之始生初三日也至兌月之上弦初八日也至乾月滿為望十五日也至巽則月之始虧十八日也至艮則月之下弦二十三日也至坤三十日又為晦矣卯離晝而旦酉坎夜而昏春夏秋冬晦朔弦望晝夜昏旦莫不見於此圖自復之息至乾而盈自巽之消至坤而虛復又息而至於乾而盈巽又消而至於坤而虛消息盈虛皆氣之流行而理為之主也消生於極盈之時息生於極虛之際以是見亂生於治治生於亂其幾微矣如乾卦六陽爻而已就乾上有天之理四德之義六爻有六龍潛見惕躍飛亢之義凡彖爻文言之辭皆發明卦爻之理而已餘卦皆然故朱子曰先天圖所該甚廣易中一字一義無不自其中流出者也易之辭皆自易之卦畫中出學者舊習語言出於鄙俚者皆當絶去必使一言無不正所謂修辭立誠也陽息而盈則隂消而虛隂息而盈則陽消而虛天之外無人物人物之外無天天地人物渾合無間一本故也息而盈自無而有消而虛自有而無易言修辭立誠乃為學第一功夫潜修不求人知理當如此善即性也為善即所以盡性也為不善則失其性矣性之一字無所不包當時時體認而力行之孟子所謂左右逢其源者即此性也性雖無物不有無時不然然或心有不存則不能體是性而與之相違矣故道雖不可離而存養省察之功不可間也孟子言仁義禮智之性惻隱羞惡辭讓是非之情道之體用全具古今天下之理不外乎此與人居官者言當使有益於其身有惠及於人所謂欲寡其過而未能者吾老猶體之西銘曰乾稱父坤稱母豫兹藐焉乃混然中處天地之塞吾其體天地之帥吾其性天地萬物分明為一體五行有質有氣有性有事有味有色有聲天下萬物之理皆不出五行五行之氣循環無端動靜無始知言則能知人如持權衡以較輕重錙銖不差莫大於理天下之言合乎理者為是不合乎理者為非惟知言者能辨之舜執其兩端用其中於民知言之至也濓洛關閩諸儒之書皆根據至理而切於人生日用之實文章止論古今得失事體利害而不根於天命人心之正朱子所謂以文自立者也五行之質之氣之理渾合無間文中子心在天下為甚公但明德之功未至遽欲新民失本末先後之序如朱子所論是也董子曰尊孔氏者黜百家若尊孔氏又信百家必不能真尊孔氏矣君子有所為有所不為如為聖人之學則不為異端之學茍無所不為則其學雜矣漢四百年識正學者董子唐三百年識正學者韓子為學當謹守聖人之道雖未至是亦聖人之徒也孔子安仁即天地之心也天下古今學術之邪正義利之分而已王者之心無私如天地人得而知之闕孔子廟廡謂宜更立廟於其鄉世官其宗子以主祀事略如孔子闕里之儀斯得崇德報功之意矣師上六開國承家小人勿用此實萬世之大戒自三代以至後世守其戒則治違其戒則亂見於載籍者可考也五嶽四瀆五鎮四海神號之正本於宋儒之議論立言當百世以俟聖人而不惑朱子論祀典之說今用之過前代逺矣聖人為後世慮無所不至但人自不察耳見而知之者聞而知之者自堯舜至孟子其人可考周程朱子蓋亦神㑹心得聞而知之者萬物皆氣之凝聚而理亦賦焉靜坐默存未發之中萬化皆從此出自有靜時自有動時若當靜時心亦馳於外是不能立天下之大本矣立身常在禮義中斯不為清議所少細思理義出於天至貴至重外物世之所有至賤至微當常保其至重至貴而不為賤而輕者所移庶幾近道矣履之上九其旋元吉人之所履必周充而無缺缺斯應元吉之占故人之履行不可不慎或謂乾九三言誠坤六二言敬先儒誠敬之學起於此乾九二言仁坤六二言義仁義者隂陽之變也先儒論仁義之用起於此然誠敬仁義之名書己言之矣謂皆起於易恐未然也朱子曰天地之間萬物粲然而畢陳者皆隂麗於陽其美外見者也如坤之六三六五皆隂麗於陽也如花木之類其中流行者氣之陽也其支幹花葉美而外見者隂也此所謂隂麗於陽也與隂麗於陽乃形麗於氣也治大衆必有容乃可易曰包蒙吉中庸序以天下之理豈有加於此哉此即精一執中也中即天命之性也天下之理豈有出於天命之性哉萬物不出中者以性上不可加一物如龜山所云也論老莊之失程朱之言曲盡矣以世儒之論折衷於程朱之言其是非一見而判然矣觀人之文章即知其學術之邪正孟子所謂知言也不知言而讀天下之書何以知其是非邪正哉物格知至是明得天理盡也觀人與讀書惟知言可以知其賢否是非孟子不尤臧倉與孔子不尤公伯竂之意同知言物格知至也如此而觀天下之事是非得失了然矣惟不知言為異端惑為小人罔為俗學眩知言皆無此失矣孔子述而不作學聖賢之道不述聖賢之言而自立新竒之說去道逺矣老子莊子不述前聖之言自為新竒之說所以為異端也濓洛關閩之書一日不可不讀周程張朱之道一日不可不尊舍此而他學則非矣在人始有心之名在天則渾然是理理具於人心乃可言心統性情天理在造化繼之者善也至成之者性則天理在人物矣心統性情張子就人心說心體無窮故於性情無不統天道流行命也命賦於人性也性與心俱生者也性體無為人心有覺故心統性情孔子登泰山而小天下聖人所處愈高則所見愈下矣立言不在乎艱深竒古貴乎明理而已如程朱之言平易簡質而理自明矣朱子曰周子通書近世道學之源其言簡質如此則務為閎衍華藻者去道逺矣布帛菽粟之文民生日用之常一日不可缺金膏水碧空青丹砂之文雖曰竒寶饑不可食寒不可衣亦何益於生人哉慮事周密處心泰然孔子自得之樂深故視不義之富貴輕也聖人之心千變萬化一以貫之孔顔之樂其全盡天理者與堯舜禹湯文武治天下皆不出性分之外漢光武規模不及高祖者以好吏事如馬援所論也妄念生不誠之源也左右逢其源隨處皆此理無窮盡無方體山川草木霜雪雨露之類皆造化之糟􅀈張子言之詳矣太極者本然之妙也動靜者所乘之機也理與氣無間亦無息也天下之理具於吾心性無不同也雜博之學不可以入堯舜之道理學淵源無窮道學以五經四書為本專用心於史學者無自而入道聞一君子進則喜好善之心自不能已也宋景濓諸子辨列周程於其後非尊道學者也失倫次甚矣周程聖賢豈諸子之敢望乎或者謂立言當求先儒所未言者夫以孔子之大聖猶述而不作况後學不述古聖賢之言而欲創立已說乎專心致志於仁義禮智之道則不雜離此即雜矣程子曰始比不以道隙於終者多矣如不擇賢否非類相比得不隙於終乎蓋世有其人讀易至此有合識之師以文章為教弟子以文章為學何以入聖人之道近思録宜熟讀程子論未發之中處當參看朱子中庸或問其餘間有不同者亦當參考道教盛於宋道君林靈素後世踵其妄誕求福不已使果有可求之福道君得之矣明道曰邪誕妖妄之說競起塗生民之耳目溺天下於汚濁然則邪誕妖妄之說彌漫充塞自古如此矣渾然一理至大而粲然條理至密窮理盡性至命學貫天人也在天成象在地成形皆一氣也上下四方曰宇往古來今曰宙氣無窮理亦無窮歧伯論地曰大氣舉之則地有涯氣無涯矣雨水自天而降人不異者見之熟也况地下之天獨不能為水而行於地中乎源泉混混不舍晝夜生生之氣無窮肉羶而蟻聚至微之物亦有知覺性無不在可見矣雲氣合而成雨故雲散則雨止地氣合而成水地常凝聚故水無窮孟子守得大綱定遇事只以此應之大綱者何仁義禮智是也聖人之心寂然不動隨感而應所謂神也見理熟則處事易行或使之止或尼之行止非人之所為也天也順乎天則心自泰然矣性命之理具於心施於四體四體不言而喻者熟也順理則裕四字用之不盡程子論漢唐雜伯雜夷斷盡其失事親奉祭未盡孝為臣奉職未盡敬宗族疏戚未盡仁交友接人未盡忠讀書行已未盡誠此吾自少至老恆念有未盡也汲汲自修不及何暇責人不自修而責人舍其田而耘人之田也程子論蠱之上九高尚其事有不同者以人品而言也易言貞吉守正未有不吉者正其誼不謀其利明其道不計其功仁者之事即王者之事道學治道不可歧而為二道學正所以推而為治道孟子之後知王伯之分者董子漢宣帝亦自言漢家本雜王伯為治春秋時有五伯之名有楊朱異端之名皆衰世之事也尊德性而道問學致廣大而盡精微極高明而道中庸溫故而知新敦厚以崇禮朱子曰德性者吾所受於天之正理竊謂尊德性所以尊此理也道問學所以窮此理也致廣大所以極此理之大也盡精微所以盡此理之細也極高明所以極此理之明無不照道中庸所以行此無過不及平常之理溫故而知新者因溫尋此理而有知新之益敦厚以崇禮者敦篤乎此理而日謹其節文之詳故此五句尊問致盡極道溫故知新敦崇皆指吾所受於天之正理而言也人之動靜語默寤寐皆易也人與天地之理氣混然無間故天地為人之父母而人當心父母之心行父母之事也天地為人之父母故人知天地變化之道則所行者能述父母之事矣通天地神明之德則所存者能繼父母之志矣人心所具之性即天地之理人身所禀之氣即天地之氣故能致其性之中則天地位致其氣之和則萬物育早作夜息無非順隂陽自然之理即所謂易也自思誠不如古人古人處大震懼不少動其心自思誠不如古人逺矣勇者不懼誠亦難能交易變易雖有體用之分其實體即所以為用而用不離體也周子曰不善之動妄也妄復則無妄矣無妄則誠矣程子曰無妄之謂誠周程相傳之學可見道之大原出於天故聖人繼天立極太極渾然其大無外其小無內無物不有無時不然實未嘗分也但就萬物各有一太極而言則似乎有分然渾然者則未嘗不統也太極不可分者以理無不在也周子曰聖可學乎曰可曰有要乎曰有請問焉曰一為要一者無欲也無欲則靜虛動直靜虛則明明則通動直則公公則溥明通公溥其庶矣乎蓋一即無極之真靜虛隂動直陽即兩儀明木通火公金溥水即四象朱子謂學者能深玩而力行之則有以知無極之真兩儀四象之本皆不外乎此心而日用間自别無用力處矣無極之真是性之全體靜虛為隂無極之真在隂中動直為陽無極之真在陽中明木通火公金溥水無極之真在五行中即圖之太極隂陽五行也靜虛隂也而曰明通木火根於隂也動直陽也而曰公溥金水根於陽也即圖之木火根於隂水金根於陽之理人之息呼根於吸吸根於呼亦隂陽相根之理孟子曰天下之生久矣一治一亂即易之隂陽盛衰之理也周子曰有至貴至富可愛可求朱子言即周子之教程子每令尋仲尼顔子樂處所樂何事學者當熟思而實體之不可但以言語解㑹而已愚按朱子之言引而不發竊意天地間至貴至富可愛可求者莫過於天命之性能深知其理而實體之於身則日用動靜之間莫非天理之流行而無一毫私欲之雜撓仰不愧俯不怍心廣體胖樂可知矣妄意如此書之以俟來哲周子顔子章不言貴富為何事其下師友章言天地間至尊者道至貴者德道德即天命之性也恐孔顔之樂亦不過全天命之性而已不責人即心無凝氷焦火之纍孟子論孔子之仕止久速皆踐履易之道也卦畫陽竒而隂偶天地鬼神之理豈有出於隂陽之外哉浩然之氣即乾元坤元之氣人資以為始為生者也朱子曰浩然之氣乃天地之正氣人得以生者其斯之謂與孔子微服過宋其自處雖裕慮事則密蕩滌私邪存養心性端謹容節五行之生各一其性則渾然太極無不各具於一物之中而性之無所不在又可見矣然太極既無不在果不可分也聖人定之以仁義中正而主靜立人極焉中正仁義性也性即人極也萬物之生同一太極此不可分也因物物各具一太極若有分耳雖若有分而統體之太極實未嘗分也聖賢之忠厚不可當如明道之去分明不容於時猶謂巳學未至當時誠意不能動人其忠厚如此人自得者深則不慕乎外矣朱子論宗廟之制宜為法太極圖說在當時惟朱子盡得其妙其次張南軒而已專用心於內則有進或出或入則有間矣旅獒之書萬世當法有本則應之無窮老子執左契而不責於人因應之謂也聖人天理爛熟自無不樂朱子曰惟人也得其秀而最靈純粹至善之性是所謂太極也是則太極即性明矣太極在隂中其體立太極在陽中其用行太極隨隂陽而無不在果不分也天地間理無縫隙實不可分天之生物一本故理無不同就萬物萬事上求實理格物致知之要也天地生物之心元也人得之為仁程子曰由辭以得其意則在乎人焉不但讀易實讀書之要法也神妙萬物之體神妙萬物之用即太極也統一氣而有動靜故曰隂陽輕清之陽雖升而為天重濁之隂雖降而為地統一氣之升降耳上下四方曰宇以充塞無窮而言往古來今曰宙以流行不息而言天地間只一動一靜而理為之主萬化皆由是出萬物皆由是生乾元坤元萬化之源也堯之克明峻德實萬世君天下之本天地之塞天地之帥人物得之以為形性者也萬物一本舉目可見安於義命即泰然矣一性散為萬善萬善原於一性一本萬殊萬殊一本也人有萬善纎毫動作不可輕也克勤小物者以善無不在程子取柳宗元封建論其必有說矣賈誼疏中教太子法宜為後世法柳子守原議有關於世道伊川經筵疏皆格心之論三代以下為人臣者但論政事人才而已未有直從本原如程子之論也朱子章疏有本有末有綱有目當時不能行其一二信乎用言之難也王安石作新法以功利蠱君心害天下斫喪有宋之兀氣奸邪迭踵其跡持紹述之說以媒進至於板蕩而後巳此天下後世之所共知劉將孫猶謂朱子未必主元祐右君實豫不知其為何說也王道備於大學之書孔子曰居上不寬大抵居上以寬為本太狹則難為其下矣詩云天生蒸民有物有則人之秉彞好是懿德孔子曰為此詩者其知道乎以有一物必有一理而言謂之則以秉執此常理而言謂之秉彞以是理之美得於心而言謂之懿德則也彞也德也皆理也理即道也故曰為此詩者其知道乎周子言勢之輕重朱子以秦漢之事明之其意深矣萬物皆自天地之塞之帥來所謂一理也至散而為萬物則殊分矣事以義為者則事無不正以利為者事雖正猶未免出於利心孟子老吾老以及人之老幼吾幼以及人之幼王道仁政皆自此出有一夫之不獲其所聖人之心為之戚然不寧聖人惟言求仁仁則萬事出於正不仁則萬事出於不正司馬遷論儒博而寡要第彼自不識其要耳要者何天命之性是也歷代史學議論之卑不知王道為何物至宋道學君子王道始明朱子綱目是非定天理明孟子言人無四端非人也人無四端則靡所不為而入於禽獸矣四端雖並說然必有惻隱之心斯有羞惡辭讓是非之心此仁所以統四德也前代史載異端駁雜怪誕之說不足以立教適足以惑人讀書吾得其要天命之性是也讀書續録卷四
