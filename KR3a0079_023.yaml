body:
  text: 讀書續録卷十二明薛瑄撰窮理之言出於易以致知格物為窮理始於程子天地生物之心流行於四時無一時之間斷伊尹言顧諟天之明命見天人合一之理自是而後聖賢之言天命者皆原於此周張程朱之前知孟子者韓子一人而已自有大學書以來發明致知格物為窮理之事者程子而已繼程子而發明其言者朱子一人而已不知致知格物之功即始條理之事有缺矣程子謂韓子言所傳者何事竊謂聖人之心天理渾全得其心斯得其傳矣程子言性即理也故滿天地間皆理即滿天地間皆性矣此合内外之道也朱子曰天地之間只有動靜兩端循環不已更無餘事此之謂易而其動其靜必有所以動靜之理焉是則所謂太極也愚謂朱子之言即所謂一隂一陽之謂道也易曰安土敦乎仁故能愛此言仁之體用天地以生物為心元亨利貞也人得天地生物之心以爲心仁義禮智也是即天命之性也學後世之詩到工處止做得詩人學聖人之道到極處可以為聖人上天之載無聲無臭維天之命於穆不已乃詩言天道之至妙處昊天曰明及爾出王昊天曰旦及爾游衍是亦詩言天之妙處一隂一陽之謂道繼之者善也成之者性也一息如此萬古如此表章大學語孟中庸始於程子成於朱子天有以形體言者有以理言者然以形體言即有理以理言即有形體非可二之也㡬字始見於書如萬㡬時㡬之類至易有知㡬之類周子發明㡬字至矣君子無終食之間違仁造次必於是顛沛必於是此專言之仁則包四徳無違仁則欲常存仁義禮智之性矣易雖古於書然伏羲時但有卦畫而無文辭文辭實始於書故凡言德言聖言神言心言道言中言性言天言命言誠言善言一之類諸性理之名多見於書書之後乃有易繫辭及諸經書聖賢發明性理之名雖有淺深不同實皆原於書也孟子知言亦本於孔子不知言無以知人之説孟子言知言即孔子所謂知者不惑其言養氣即孔子所謂勇者不懼程子言孟子學已到聖處故其論堯舜性之湯武反之孔子聖之時之類皆深知聖人所以為聖人使非學到聖處安能知聖人哉論古今人物賢否得失惟心通乎道者能之心不通乎道而論人之賢否得失鮮不差矣程子曰天人一也更不分别浩然之氣乃吾氣也觀此則天人一理可知矣程子曰荀子只一句性惡大本已失揚子亦不識性更説甚道盖性者大本也言性惡則大本已失道者率性之謂不識性更說甚道孟子養氣章縮字直字義字皆意同書以前雖已有文籍皆不傳今文籍可見者自書堯典始知言最難惟心乎道乃能知古今天下言之是非所行不合乎仁義禮智即莫由道也見賢思齊見不賢而内自省不獨見當時之人如此以至讀古人之書見古人之賢者皆思齊見古人之不賢者皆自省則進善去惡之功益廣矣論性不論氣不備有二說專論性不論氣則性無安泊處此不備也專論性不論氣則雖知性之本善而不知氣質有清濁之殊此不備也論氣不論性不明亦有二説如告子以知覺運動之氣為性而不知性之為理此不明也如論氣質有清濁之懸殊而不知性之本善此不明也二之則不是蓋理氣雖不相雜亦不相離天下無無氣之理亦無無理之氣氣外無性性外無氣是不可二之也若分而二是有無氣之性無性之氣矣故曰二之則不是論性不論氣不備言孟子於極本窮原之性已明但未備耳論氣不論性不明則是告子全不識性也大學之明徳即中庸天命之性黙識仁義禮智之性與元亨利貞之天合則有得矣聞道即知性知天也天者理也其尊無對逆理則獲罪於天矣蓋理即仁義禮智之理逆理則獲罪於天矣程子曰四端不言信者既有誠心為四端則信在其中矣愚謂若無誠心則四端亦無矣故四端必以信為本克己復禮與天地合德性者人所受之天理仁義禮智也天道者天理自然之本體元亨利貞也性與天道渾合無間故曰其實一也聖人接人惟一誠由辭以得意如元亨利貞仁義禮智辭也由辭以得元亨利貞仁義禮智之意則有得矣鬼神者天地陰陽之靈魂魄者人身隂陽之靈學不至於聖賢只是有不誠處讀書續録卷十二
