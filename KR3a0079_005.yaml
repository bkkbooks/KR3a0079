body:
  text: 讀書録卷五明薛瑄撰易大象重坤相因其勢極厚君子法之以厚徳載物水洊至君子以常徳行習教事水相續不已有恒乆之意故君子以常徳行相沓而来有重復之意故君子以習教事天下有山遯君子以逺小人不惡而嚴天髙去而不留山卑下而常止有懸絶不相及之勢君子猶天也小人猶地也君子以莊敬自持則小人自不能近故取此象山上有火旅君子以明愼用刑而不留獄火照有明意山静有慎意火去又有不留之意澤上於地萃君子以除戎器戒不虞萃聚也人聚既衆易致變故故除戎器以備不虞地暗火明明出於暗為晉君子觀其象以去暗即明故曰以自昭明徳雷出地中其聲大而氣和暢故樂之聲音和暢象之機不可妄發康節詩曰施為欲似千鈞弩此意近老子之術至日閉關商旅不行后不省方安静以養微陽聖人賛化育之一端雲雷參錯震迅乃天地屯難之時君子觀其象宜經綸以濟時難震動坎險時之未通君子宜不遑安處以濟其屯火雷噬嗑火明雷震先王明法取火之意勅法取雷意以茂對時育萬物皆實理也故取法於無妄外晦則氣象含蓄内明則文理宻察蒞衆之道也既濟乃已盛而有将衰之兆故當思患而豫防之剛明並用折獄致刑之道也明相因而不息大人緝熙光明以照臨天下也澤没火則火滅火燥澤則澤涸相革之義也四時寒暑迭相更革故治厯明時取革之義類族辨物各别其所同也臨下之道無過於教思無窮保民無疆山下有澤澤滙山減乃損之義人所當損者莫過於忿怒嗜慾也麗澤有互相浸灌之義講習有互相滋潤之益上天下澤其分甚明辨上下定民志法之鼎器所處安重故能受所載之實君子居位法鼎器之安重故能凝聚上天之命静則聚動則㪚故正位足以凝命木上有水井其出無窮君子勞民勸相亦無倦天之不息以剛君子法天之不息亦以剛地厚無水不容故為師君子法之亦當無物不容也天下有風鼓物无不周徧誥命施四方法之隨風巽風有漸次柔入之義君子法其象亦當丁寧其命於再三以行事則入人深而人易從矣雷相沓而至聲可畏無甚於此故君子以恐懼修省艮内外皆止故君子所思不出其位木自地出為升君子法升之象順積其徳自小以至大澤性潤下山體中虛内能受外也君子亦當虚中無我以受天下之善天氣也山形也以形畜氣所畜至大君子法之多識前言徃行以畜其徳山上有木為漸長之義君子居賢徳善俗亦當以漸而不可驟風行地上无不周徧先王省方觀民設教亦无不周徧物之相比莫過水與地故先王建萬國親諸侯取其義他物相比猶有間惟水與地無間君子之顯晦屈伸隨時而已故否之時則儉徳辟難人不得以禄榮之過恭過哀過儉皆過之小者也上安由下厚故剥上厚下以安宅山下出泉雖䝉昧而有可行之理山上有水則窒礙而有難行之勢故君子觀䝉之象則當果行育徳觀蹇之象則當反身修徳果行水之義育徳山之義天上水下天左水右二者相違而為訟君子觀其象作事謀始則訟端絶只六十四卦之名儘有義理以言者尚其辭此亦可見君子議獄緩死出於中心之實故取中孚之義遷善如風之速改過如雷之迅益之大者雷入澤中聲響閴寂嚮晦入宴息取其義山下有火賁君子以明庶政無敢折獄明庶政取火之義無敢折獄取止義山下有火明不能燭逺故其象如此制度數議徳行節之義中孚全體則中虚二體則中實中虚如心之無物中實如心之有理火上水下各行其性而不相資故君子觀其象以慎辨物居方辨物謂水火二物居方謂火上水下凡物皆然風行水上渙散之義享帝立廟所以合其渙山本髙地本下髙而能下謙之義遏惡揚善非内剛外明者不能故大有象之山下有風蠱君子以振民育德振作其民取風意養育其德取山義澤上於天夬君子以施禄及下居德則忌施禄取澤下之義居德則忌取乾健之義慎言語養德之大節飲食養生之大雷雨作解赦過宥罪取解散之義上火下澤睽君子以同而異同者秉彞之自然異者制行之當然君子需時飲食宴樂以需之隨日入之晦而宴息隨之大者陽根隂隂根陽而太極之理無不在焉程子所謂易變易也變易以從道也道者何太極之謂也天地之化一過而不留聖人之心一應而無迹金剛經只欲說形而上之道以形而下者為幻迹此所以偏於空虛也聖人則道器合言所以皆實立法當審度時宜後世論者多欲復肉刑此不度世宜者也唐虞三代風氣淳敎養備犯者至少故肉刑可施後世風氣日漓他事皆與古異獨欲復此法殆有屨賤踊貴之機矣先儒謂肉刑於今死刑中取之亦足以寛民之死太極圗右邊黑中之白白盡即為陽非自右而左也左邊白中之黑黑盡即為隂非自左而右也但假象以顯義姑以黑白分左右耳静中之動亦自此起動中之静亦自此起非有二也聖人之心廓然大公與化無累異端必求一超出隂陽之外不生不滅之說有是理乎聖人大公至正之道開眼即見萬世無弊雨亦有就隨處雲氣蒸騰而成者亦有自他方雲氣風雷挾持而至者雖有逺近不同及雲氣布濩周匝則無間矣想韓文公敬大顛只是被他說着已病故為其所動韓公不能忘情富貴而大顛以物外清虛曠蕩之說格之此公之所以為其動也為學以四書為本四書五經周程張朱之書道統正傳舍此而他學非學也漢唐以来正敎與異學並行而學者莫知所宗自宋諸君子表章四書五經而發揮之如日月經天而爝火自息有志之士宜熟讀精思而力行之庶不負先正之敎云四書滿天下眞知實踐者盖有之矣吾不得而識其人也書求精一之㫖詩求思無邪之㫖禮求敬樂求和春秋求是非易求象占義理皆體於身心則有實用矣惟無欲最髙有欲則低矣伊傅周召佐王行道其功大矣而彼不自為大也如有自大之心則非伊傅周召矣舜禹有天下而不與分定故也天地日月風雷雲雨金木水火山澤八卦之象健順麗明險陷止動說入八卦之徳揚子法言意實淺而飾以短澁竒古之詞何邪聖人雖澤及四海功被萬世而無一毫自滿之意釋氏動輙言其功徳無量何邪聲香色味觸佛書所謂五欲世人之所貪彼欲滅絶者也及其論聲香色味之盛又極世人之所無者而誇耀之何邪學有所得必自讀書入讀書千熟萬熟時一言一句之理自然與心融㑹為一斯有所得矣象山謂人讀書為義外工夫必欲人静坐先得此心若如其說未有不流於禪者太極是易之精六十四卦三百八十四爻中無限事是易之藴下民雖所禀之性皆同而其實拘於氣質愚昧無知者多傳曰堯舜帥天下以仁而民從之桀紂帥天下以暴而民從之使皆有知則帥之以暴而不從矣如異端怪誕之說分明理所無者而民皆靡然信從之可見其無知也好異端者天資髙則淪於空虚氣禀下則惑於罪福要見道只在存心存心則觸處與道相值心不存則雖至近者亦莫識其為道矣程子釋中庸鳶飛魚躍曰與必有事焉而勿正心之意同活潑潑地存心之謂也萬事猶可力為只此理非力所及理如物心如鏡鏡明則物無遯形心明則理無蔽迹昏則反是惟心明則映得理見道雖未嘗逺人心有斯須不存則人自逺道矣釋子以罪福誘人豈是公道釋子不問賢愚善惡只順己者便是一片實理徹上徹下萬古完具而有生之類自不能外理如日光氣如飛鳥理乘氣機而動如日光載鳥背而飛鳥飛而日光雖不離其背實未嘗與之俱往而有間斷之處亦猶氣動而理雖未嘗與之暫離實未嘗與之俱盡而有滅息之時氣有聚㪚理無聚㪚於此可見一理古今完具而萬物各得其一理如日月之光小大之物各得其光之一分物在則光在物物盡則光在光消息者氣而所以消息者理聖人所以不矜者只為道理是天下古今人物公共之理非已有之私故不矜論語一書聖人多就事言而理在中其答問仁處亦只以求仁之方為仁之資告諸子至於仁之理則未嘗及也此所謂無迹也歟論理而不及事末流為虚無之弊聖人多敎人以下學人事古者詩書禮樂多就事上敎人而窮理亦就物上窮究故所學精粗本末兼該而無弊後世或論理太髙學者踐履未盡粗近而議論已極精深故未免有弊也君子偕老其辭含蓄微婉畧無激發不平之氣可見詩人之忠厚而學者翫此亦可以進徳矣詩人氣不暴戾而詞語和平雖其一已有涵養之功是亦先王徳澤入人之深也後世之詩有佻薄淺露者雖其人無涵養之功亦可以觀世變矣讀書固不可不思索然思索太苦而無節則心反為之動而神氣不清如井泉然淆之頻數則必濁凡讀書思索之乆覺有倦意當歛襟正坐澄定此心少時再從事於思索則心清而義理自見思索太勞而不節暴其氣也顔子於聖人之言無所不說正與不違如愚互相發事来不問大小即當揆之以義萬物本諸天萬事本諸心氣昏物誘者性之害識明理勝者學之功三代之治本諸道漢唐之治詳於法敎不以道則非敎學不以道則非學古之學也一後之學也支公於己者能公於人私諸人者由私諸己周程張朱有大功於天下萬世不可勝言於千餘年俗學異端淆亂駁雜中剔撥出四書来表章發明遂使聖學晦而復明大道絶而復續粲然各為全書流布四海而俗學異端之說自不得以干正其功大矣心不錯即諸事不錯矣法言澁而晦中說暢而淺思天理則心廣而明思人欲則心狹而暗中說勝法言聖賢之書其中必有體要如明徳為大學之體要誠為中庸之體要仁為論語之體要性善為孟子之體要以至五經各有體要體要者何一理而足以該萬殊也荀揚諸子之書詞亦竒矣論亦博矣其中果有體要如聖賢之書乎不然則偏駁支離而已矣文中子論治道固多條暢只是碎細若聖人論治道則自源徂流本末兼舉不若是之碎細也語人以所及者當語人以所不及者妄黙觀太極圗與己一一契合五經四書之外義理之精妙者無過太極圗切要者無過西銘太史公謂儒家者流博而寡要非寡要也雖有要而人自不知也要者何一之外無餘言也觀衆水之流當知其一源觀萬物之生當知其一本觀羣聖之言當知其一理宋以前知孟子者韓子一人而已實過其名者魯齋其人也須彌納芥子以形言芥子納須彌以理言程子挈敬之一辭示萬世為學之要程子之主敬周子之無欲皆為學之至要讀書貴知要只顔子四勿心不絶想口不絶念守之勿失循之勿違豈有差錯泛觀天下之書而不知用力處雖多亦奚以為理無影就事可黙識尋思千能百巧都不濟事只無欲是髙處不善之端豈待應物而後見邪如静中一念之刻即非仁一念之貪即非義一念之慢即非禮一念之詐即非智此君子貴乎慎獨也程子曰人之於性猶器之受光於日日本不動得此一證則此理萬古常存而可知矣理為主氣為客客有往来皆主之所為而主則不與俱往元亨利貞天之命也仁義禮智人之性也四者惟人與天合而得其全就人中細分之又有氣質清濁通塞之不齊有全之全者有全之半者有全之少者有皆不能全者其品盖不能勝計也至於物則拘於氣質愈不能全矣如木得仁之性火得禮之性金得義之性水得智之性皆不能相通也蜂蟻得義之性雎鳩得智之性虎狼得仁之性豺獺得禮之性亦不能盡推也是則同者生理之一源異者氣質之萬殊仁之性物得者尤多如牛呼犢而鳴鳥䕶子而翔鷄䕶雛而啄犬䕶子而噬皆慈愛之發於自然也但為形氣所拘於此一端畧能發見他則不能類推矣天将隂而穴居者先知如蟻出而鸛鳴於垤是也以此見物物各有一性至微之物尤可見其性識之靈常看蟻出穴者雖行百歩之逺一往一返行列不亂而又不迷失故穴非其性識之靈能若是邪飛潛動之物皆有知有性植物則無知而有性性之本體未感物時渾是善到感物而動之初則有善有不善周子所謂幾也衆蟻得一物合力舉之以歸其穴謂之無知不可仁義禮智之謂性率性而行之謂道行道而有得於心之謂徳全是徳而真實無妄之謂誠無欲如至清之水秋毫必見有欲如至濁之水雖山嶽之大亦莫能鑑矣人欲盡而天理見如水至清而寳珠露人欲深而天理昏如水至濁而寳珠暗此先儒之成說但先儒以氣禀言某以人欲言犬至賤而有義主家雖貧甚而不去亦可見性無不在也鳥逮天未隂雨而綢繆牖户亦其智之一端鳥性巧如燕作巢之類可見𤓰瓠之類以竹木引之皆纒附而上又似有心者盖主宰乎是者乃其心也鴻鴈之避寒暑鶢鶋之避風皆其智之一端鳥獸皆知寒煖饑渴牝牡利害之情而不知義禮之當然乃其氣體昏塞之甚而不能通也晦菴朱子所謂知覺運動之蠢然者人與物同仁義禮智之粹然者人與物異正謂此耳今人開口論治道殊不知治道之大不出乎大學一書孔子敎人說下學處極多說上達處極少至宋諸老先生多將本源發以示人亦時不得不然耳細看植物亦似有心但主宰乎是使之展葉開花結實者即其心也聖人敎人以正容謹節即是持敬之道如告仲弓出門如見大賔使民如承大祭之類可見程子曰善固性也惡亦不可不謂之性也可見理雖不雜乎氣亦不離乎氣仁義禮智即是性非四者之外别有一理為性也道只是循此性而行非性之外别有一理為道也徳即是行此道而有得於心非性之外别有一理為徳也誠即是性之眞實無妄非性之外别有一理為誠也命即是性之所從出非性之外别有一理為命也忠即盡是性於心非性之外别有一理為忠也恕即推是性於人非性之外别有一理為恕也然則性者萬理之統宗歟理之名雖有萬殊其實不過一性省察之功不可一時而或怠詩曰夙夜匪懈其斯之謂與一而無二内外合一性與理無二致太極中無一物外物於吾何有老子多藏必厚亡之言極善老子曰身與貨孰多身一而已矣世有迷貨喪軀者何其愚之甚邪天誠可畏近而吾心吾身宻室顯地無非天也敢不畏乎人為不善者將以欺天而天不可欺將以欺人而人不可欺曷若不為之愈也性一也本然之性純以理言氣質之性兼理氣言其實則一也故曰二之則不是程子曰形易則性易性非易也氣然也萬變不齊者皆氣之所為而理則自若也輕與必濫取易信必易疑此理為氣所挾持或善或惡至於萬變之不齊而其體則一也性譬如一源水引去清渠中則水亦清亦猶氣清而性亦明也引去濁渠中則水亦濁亦猶氣昏而性亦昏也是則水有清濁者渠使之然而水則本清性有昏明者氣使之然而性則本明此先儒之說余特述以明已意耳凡待人當盡其忠而不可以欺人我一致欺人實所以自欺也理本齊而氣不齊氣強理弱故昏明善惡皆隨氣之所為而理有不得制焉至或理有時而發見隨復為氣所揜終不能長乆開通所謂為學者正欲變此不美之氣質使理常發見流行耳然非加百倍之功亦莫能致也慮事周宻處心泰然敬字一字無欲字乃學者至要至要余近日甚覺敬與無欲之力此理經宋儒大加發揮之後燦爛明白真所謂江漢以濯之秋陽以暴之皜皜乎不可尚已惡亦是性只是性翻轉了便為惡非性之外别有一物為惡也如隂符經三盜之說可見畧有與人計較短長意即是渣滓消融未盡人能𢎞道非道𢎞人見氣強而理弱氣自是新者非既散之氣復為方生之氣也程子論呼吸亦如此上天之載無聲無臭復何言哉不行而至不疾而速葢當體皆具亦無至亦無速理只為氣所隔蔽故不明去其蔽隔則天理明矣至大之惡由於一念之不善君子惟義是守命有所不恤也君子性其氣小人氣其性掃却浮雲而太虛自清徹去蔽障而天理自著世人信占卜小術以為己有富貴之命一切不修人事恣縱妄為偃然僥倖所獲葢有不遂所欲而反罹咎者多矣命其果可恃乎惟君子則不然凡百恐懼修省惟義是守而貧賤富貴一聴於自然命葢有所不計也星命家最誤人君子得吉卜固若常事而不廢其修省之功小人得吉卜則曰吾命素定矣雖為不義之事可無傷也恃此而取敗者多矣命雖在天而制命實在己有人於此以星命家言之謂其有永年之壽矣然入水即溺入火即焦所謂永年者不可恃也不入水火即不焦溺豈非命雖在天而制命在己乎又如人素羸瘠乃能兢兢業業凡酒色傷生之事皆不敢為則其夀固可延永矣又如素強壯乃恃其強恣意傷生之事則其禍可立待也此又豈非命雖在天而制命在已歟程子曰修養之引年為國之祈天永命常人之至於聖賢皆工夫至此則有此效驗信哉斯言也觀無逸耽樂之戒則祈天永命者誠有在程子曰吾以徇欲傷生為深恥學者體此則可以保身矣聖人為治推其固有之善及人纔有私意即入於權謀術數矣為善須表裏澄徹方是真實為善有纎毫私意夾雜其間即非真為善矣韓魏公范文正公諸公皆一片忠誠為國之心故其事業顯著而名望孚動於天下後世之人以私意小智自持其身而欲事業名譽比擬前賢難矣哉君子行義以俟命小人恃命以忘義天道福善禍淫昭然可驗間有不然者幸不幸耳敬是方做工夫誠是已成就處心如鏡敬如磨鏡鏡纔磨則塵垢去而光彩發心纔敬則人欲消而天理明讀書録卷五
