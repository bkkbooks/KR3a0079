body:
  text: 讀書續録卷十一明薛瑄撰天地以生物為心而所生之物因各得夫天地生物之心以為心所以人皆有不忍人之心茍為物欲所蔽失其不忍人之心所謂戕滅天理自絶本根者賊殺其親大逆無道也故謂之賊以氣中有太極則可以氣即太極則不可程子曰無妄之謂誠朱子曰真實無妄之謂誠誠非虚字皆指實理而言程子不言太極其論性天道即太極也性與天道不可得而聞故程子不以太極圖説語學者知之至信之篤則實有得於已矣伊川曰學者於道不知所向則孰知斯人之為功不知所至則孰知斯名之稱情此言當深翫讀聖賢書於凡切要之言皆體貼到自己身心上必欲實得而力踐之乃有益不然書自書我自我雖盡讀聖賢書終無益也孟子言見而知之聞而知之尹氏曰知謂知其道也盖道即仁義禮智之道也程子明道者明是道也伊川言學者於道不知所向所至亦此道也道即朱子闕其理於象言之表矣養氣則人之氣與天地之氣同其大盡心則人之性與天地之性同其大一息之運與古今之運同一塵之土與大地之土同一夫之心與億兆之心同陽氣成形之大者為天隂氣成形之大者為地乾元天之徳也坤元地之徳也克勤小物為學之􅋀要物格知至則異端邪誕妖妄之説不辨而自明矣孔子言生而知之學而知之其知之字皆指知性而言故為學之本求知其性之所有全之而已學而知之之功夫條目如格物致知擇善明善博學審問慎思明辨學聚問辨博文知性知天之類皆是也天道之全體大用元亨利貞四時而已人道之全體大用仁義禮智四端而已外物無窮不能以禮制心則逐外物亦無窮聖賢道尊徳貴舉天下之物豈能尚乎自得之為難自得之則實有諸已矣雖能建立大事功而不知道猶為淺故君子貴乎知道朱子論子産管仲於道槩乎未有聞也魏伯陽參同契假易論長生之術若指諸掌然伯陽今竟能踐其言而度世常存邪程子曰仙者天地間一賊若非竊造化之機安能延年邪愚謂仙者雖竊造化之機以延年亦未有乆而不散者不然自古以仙得名者多矣何千百年不見一人在世邪神仙既自謂能度世常在人間以化人可也何必作為言語邪以作為言語而不常在人間則其誕妄不可信也明矣萬物始終乃隂陽造化自然之理神仙者必欲超出隂陽造化之理以常存必無此理老莊亦無神仙之説自秦漢來乃有之秦皇漢武求之之效可見矣屈原逺遊篇神仙度世之言皆假設耳人將謂神仙真可學誤矣羲周之易專主動察變占至孔子之易乃有居省象辭堯曰允執其中故言中自堯始聖賢相傳之道中而已矣尚書言中最多中者天命之性書多言無過不及之中乃性之已發者至子思作中庸乃兼言未發已發之中程子朱子論之詳矣讀書不於身心有得懵然而已本朝祀典極正以不雜於佛老天地以生物為心元亨利貞也人得天地之心為心仁義禮智也是即天命之性與人物從天地大化之本原來故天人一理程子曰氣清則才善氣濁則才惡禀得至清之氣為聖人禀得至濁之氣為愚人如韓愈所言公都子所問之人是也愚謂韓子所言即性有三品之説公都子所問即有性善有性不善云云者此皆言氣質之性也韓子言堯舜禹湯文武周公孔子孟氏之傳又曰軻之死不得其傳焉又曰孟氏醇乎醇者也又曰惟孟軻師子思而子思之學出於曽子自孔子殁獨孟軻氏之傳獨得其宗愚謂自秦漢以來諸儒未有論道統相傳之詳且正如韓子者至程朱論道統之傳亦主其説若韓子所見誠所謂豪傑之士矣一故神或在隂中或在陽中皆此一也故曰兩在故不測兩故化陽化為隂神在其中隂化為陽神在其中故曰推行乎一程子曰動静有無始終之理聚散而已盖聚則為動為有為始散則為静為無為終議擬二字出易大傳今法家用之雖細事亦可見易無不包之一端人皆知求鬼神於茫昩不測之間殊不知天地四時日月星辰雨露風霆雪霜山川草木人物鳥獸皆鬼神之著者舉天地萬物皆至理民鮮知之孟子七篇雖論有不同皆本於此心之義理學者忘之時多所以於義理不熟聖人只以仁義禮智之心應天下之事中庸書天命之謂性盡之大哉聖人之道洋洋乎發育萬物峻極于天此性天道合一也致知格物者欲推極知識以知性也故朱子曰知性則物格之謂盡心則知至之謂也明道曰道之不明也異端害之也一段辯盡異端之失觀大學經致知格物連誠意説則格物先欲格身心之理而後誠意之功可施故程子曰格物莫若察之於身其得之尤切論天地隂陽造化莫備於易外易而論造化者即程子所謂邪誕妖妄之説也天之明命即天之所以與我而我之所以為徳天命之性是也孟子言浩然之氣至大至剛及言知性知天是其論理氣處致知格物於讀書得之者多各正性命各得性命之正孔子之道得孟子而愈尊程子之道至朱子而始明理萬古只依舊氣則日新理大無窮氣亦大無窮天所賦之性無時不然物所受之性無物不有舍己從人最為難事所以舜稱堯孟子稱舜公都子所問三者之性前二説朱子以告子蘇氏胡氏之言證之固非矣後一説以韓子性有三品之説明之程子曰氣清則才清氣濁則才惡禀得至清之氣生者為聖人禀得至濁之氣為愚人如韓愈所言是也然則此一説正論氣質之性未為非也但孟子專論性不及氣耳易書一字一義皆自先天圖出通書一字一義皆自太極圖出以静言性則可以静形容性則不可宋言官有以䇿題作詩為謗訕者皆非也觀周公無逸之書曰小人怨汝詈汝則皇自敬徳厥愆曰朕之愆允若時不啻不敢含怒則古之聖臣曷嘗道其君以言語罪人哉感中有寂寂中有感人心惟危道心惟微皆以心之用言聖人之教皆自近以漸及髙逺循循有序不忍人之心即天地生物之心所謂元也仁道至大以即天地生物之心也健而無息之謂乾即逝者如斯夫不舍晝夜之意邵子論天地始終之數乃前聖所未言者先儒謂邵子以一萬八百年為一㑹初間一萬八百年而天始開竊疑天未開時只是氣塞既未有日月星辰厯數四時不知如何計其年數讀書續録卷十一
