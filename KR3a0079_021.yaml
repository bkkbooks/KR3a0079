body:
  text: 讀書續録卷十明薛瑄撰朱子詩曰渾然一理貫即性與天道也心性天一理也其大無外誠即性命之實理非性命之外别有誠也天人之理誠而已維天之命於穆不已即乾之健而不息也人之威儀須臾不可不嚴整蓋有物有則也張子反原之説吕氏屈者不亡之言謝氏歸根之論程子朱子辨之明矣程子曰人心一有所欲則離道矣此克己所以為難也嚴子陵有懷仁輔義天下恱之言非不仕也但不肯少貶其道耳觀其謂光武差增於往則其微意可見作史者列於逸民傳非知光者出處去就士君子之大節不可不謹禮曰進以禮退以義孔子曰有命孟子不見諸侯尤詳於進退之道故出處去就之節不可不謹王者行一不義殺一不辜而得天下不為也魏晉五胡南北朝十六國五代或假禪授以竊人之國或騁兵力以荼毒生民皆王者之賊也古經易畫自伏羲始書自堯典始周子之學當時無知者太極圖説通書傳之程子程子以其理微不以語學者至朱子始發明之然能因朱子之言以求周子之學者亦未易得也誠心父母斯民為王道有一毫不誠即非王道矣性與天道只在目前默而識之可也顔子簞瓢陋巷不改其樂使逹而在上則有天下而不與矣韓子言孟子醇乎醇以其言仁義而不雜也朱子謂程子説荀揚等語是就分金稱上説下來蓋所謂知言知人也無物非氣無氣無道千古聖賢之心仁而已自近古四海九州無不崇信釋老惟今孔子闕里曲阜一縣無佛老之居無僧道維天之命於穆不已者誠而已朱子曰程子言以功用謂之鬼神以妙用謂之神功用言其氣也妙用言其理也凡易兼言鬼神者皆言其氣單言神者皆言其理朱子釋隂陽不測之謂神章言道之體用不外乎隂陽而其所以然則未嘗倚於隂陽是則神即道也理也神無方而易無體不但隂陽造化為然如人之動而陽神在動中靜而隂神在靜中此神無方也人之動而靜靜而動動而又靜此易無體也一隂一陽之謂道繼之者善也成之者性也流行賦豫無一息之間但人自不察耳論性不論氣不備有二説性氣不相離專論性不論氣則性無安泊處此不備也性氣既不相離因氣有清濁故性有明暗若専論本然之性善而不論氣則不知有清濁明暗氣質之性此不備也論氣不論性不明是指告子以知覺運動生之氣為性而不知性即理也故不明萬事萬物一理貫之理即性也性之仁貫乎父子之親仁民愛物之類性之義貫乎君臣之義尊賢之等事物之宜性之禮貫乎長幼之序天秩之節文儀則性之智貫乎夫婦之别是非善惡賢否之分性之信貫乎朋友之交五常萬事之實只一性貫乎萬事萬物所謂一理渾然而泛應曲當也知一隂一陽之謂道繼之者善也成之者性也則知道德之本源矣氣質之拘最大不然何自古聖賢之生不多見與孔子以聖人君子善人有恆者不得而見聖賢之生豈偶然哉人心所具之性從繼之者善來即所謂天命之謂性也夏商周皆有興廢惟唐虞無廢善惡不係於世類多矣以莽賊而有孝平后之貞烈自古來萬變之外物皆泯惟善惡之迹不泯可畏哉夏商周之子孫久而無聞孔子之子孫愈久愈盛何其德之長也心每有妄發即以經書聖賢之言制之程子曰以形體謂之天以主宰謂之帝以功用謂之鬼神以妙用謂之神以性情謂之乾此數言不出理氣二字而天以貫之遊程子之門流於老禪者由致知格物之功未至也程子曰天本廓然無窮即道之廓然無窮也天以形體言道即理也老子曰大道廢有仁義夫仁義即大道也大道既廢又豈有仁義乎至分道德仁義禮為五皆理不明也先儒已辨之矣陳希夷亦遁世離羣者與程子曰性即理也理則自堯舜至於塗人一也此論本然之性又曰才稟於氣氣有清濁稟其清者為賢稟其濁者為愚此論氣質之性朱子之後大儒真西山大學衍義有補於治道朱子言自程子之後論格物致知者皆失程子之意詳見大學或問學者不於身心事物上體認其理而力行之徒矻矻於記誦文辭之間難乎有得矣因惻隱羞惡恭敬是非之情善而知仁義禮智之性善亦猶因水之流清而知其源之清也此先儒之成説特申言之自孔子後數千年易只曰周經乾元亨利貞以下而伏羲先天四圖隱而不傳雖有繫辭易有太極是生兩儀兩儀生四象四象生八卦及説卦天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆之言人亦不知何謂至邵子傳先天圖自陳希夷於是以繫辭説卦之言證圖一一相合而伏羲作易本原復明邵子一分為二二分為四四分為八等語即發明易有太極是生兩儀云云之橫圖也其曰乾坤縱而六子橫等語即發明天地定位云云之圓圖也堯典克明峻德一言貫千萬世君德之始程子稱邵子觀天地之運化隂陽之消長以逹乎萬物之變其意深矣鬼者屈也神者伸也屈伸是隂陽之靈處乾一而實故以質言而曰大坤二而虛故以量言而曰廣乾坤之廣大即易之廣大也人與天地萬物混然一理一氣但分有不同耳孔子以至德稱泰伯文王乃萬世之人極天人一理備見於孔子贊易之辭明德貫大學經傳天人一理湯曰惟皇上帝降衷于下民武王曰惟天地萬物父母惟人萬物之靈詩曰天生蒸民有物有則孔子所謂性與天道子思所謂天命之性孟子所謂知性知天皆有以見天人之一理後世大道不明論天者不及於人言人者無涉於天由是分天人為二致惟董子有道之大原出於天之言亦可見天人之一理至周子作太極圖明人物出於造化之一原而張子程子朱子各有發明天人一理之説大道於是復明學問大本原在天命之性於此所見不差則天下之理不差矣邵康節見造化人事熟所以終不出惟知言窮理則能知人之邪正聖賢成大事業者從戰戰兢兢之小心來孔子言有恆者難見驗之人信然帝王治道治法皆實德實事豈後世無本智力之所及至誠能盡其性盡性即至誠純乎天理而不雜為誠雜則妄而不誠矣克盡已私為誠有一毫之私未盡則非誠矣程子曰有無動靜始終之理聚散而已蓋聚則為有為動為始散則為無為靜為終生死之説不過如此釋氏聚散亦人耳安能以已散者為禍福邪舉前古為其所惑理之不明也甚矣聖人最重民力觀春秋所書可見心無愧怍則廣大寬平而體常舒泰其樂可知矣程子曰釋氏不識隂陽晝夜死生古今愚謂惟其如此故其言誕妄聖人言天地之造化莫備於易論天地之造化而不本於易皆妄也讀書續録卷十
