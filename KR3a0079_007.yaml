body:
  text: 讀書錄卷七明薛瑄撰孟子七篇乃洙泗之正傳經千餘載世儒例以子書視之而無知之者獨唐之韓子謂孟氏醇乎醇者也又曰軻之死不得其傳焉又曰求觀聖人之道必自孟子始又曰孟氏之功不在禹下是則千載之間知孟子者韓子一人而已宋之大儒有徳業聞望重於一世者猶儕孟子於法言之後尚何望於他人邪惟河南程夫子倡明絶學始表章其書發揮其㫖而一時及門之士遂相與翕然服膺其説天下始曉然知其為洙泗之正傳而不敢妄議至朱子又取程氏及羣賢之説㑹萃折衷以釋其義與論語大學中庸列為四書由是洙泗之正傳益以明備千古入道之門造道之閫無越於此矣有志者尚篤所力哉六十四卦三百八十四爻一隂陽也隂陽一太極也太極本無極也頥外實中虛頥頷之象人渾身統體一太極耳目口鼻四肢百骸五臓毛竅各具一太極先天圖左半屬陽故乾健兌説離明震動四卦之徳皆陽右半屬隂故巽入坎陷艮止坤順四卦之徳皆隂此雖先儒所未言竊意其如此四百年之漢文帝培其本三百年之唐太宗養其根三百餘年之宋太祖太宗真宗仁宗浚其源秦晉隋皆不一再傳而遂亡者由無恭儉之君培養浚導其源於前即繼之以殘暴淫侈之主也漢高祖之後非得文景之養民即繼之以武帝之多欲則漢之存亡未可知也唐髙祖之後非得太宗之富民即繼之以高宗之昏懦則唐之存亡未可知也大抵漢唐之所以延綿國祚者率由此數君有以立其本耳程子曰人能克己則仰不愧俯不怍心廣體胖其樂可知竊意顔子之樂亦如此孟子七篇托始於仁義誠能黙識而旁通之則全書之㫖不外是矣釋氏逃世滅倫以為潔正猶陳仲子辟兄離母以為㢘也是安可以其小者信其大者哉康節見盛衰之際甚明康節首尾吟多盛極慮衰之意聖人當盛時即憂衰時既濟曰初吉終亂纔有私便不能推所以為不仁仁義禮智信有則一齊有但各有所主耳如仁主於愛愛莫大於愛親然知所當愛者知也愛得其宜者義也愛有節文者禮也愛出誠實者信也以至事君從兄之類無不皆然日用問身心切要道理只是仁義禮智之性發而為惻隠羞惡辭讓是非之情隨事隨處必體認得了了分明方為見道而無行不著習不察之患矣氣機無須臾之止息如雲在空中飛揚上下浮游往来萬起萬滅頃刻不暫停止亦可見其一端動靜兩端雖相因無窮竊謂動意常多泛觀萬物若草木山石之類皆靜植不動而生意常流行其間雖秋冬翕寂閉蔵之餘而生意未嘗毫髮間㫁故竊謂動多於靜也觀易横圖見生意之無窮一身萬物皆天地公共之器非己所能私也勿恃其不攻恃吾有所不可攻非特兵法為然蓋可以為防小人之法原始反終只是一理故知生則知死矣原始而知其来者如此則反終而知其往也亦如此死生非有二致也原始而知其来也自無而有則反終而知其自有而無也必矣人惟不知原始反終之理故舉俗為異端惑觀雲亦可以知生死之説倐然雲聚而有形者猶精氣為物也倐然雲㪚而無迹者猶逰魂為變也精氣為物者自無而有遊魂為變者自有而無原始而精氣成物神之情狀生之説也反終而逰魂為變鬼之情狀死之説也勑天之歌喜起熈為韻臯陶𢋫歌明叶良康為韻脞惰為韻先儒謂此乃三百篇之權輿良是古人論治必本末兼舉如臯陶陳謨首曰允廸厥徳本也謨明弼諧末也及帝問其詳則曰云云蓋慎厥身脩思永惇叙九族皆允廸厥徳之事庶明勵翼皆謨明弼諧之事邇可遠在兹則通言上文之效臯陶謨典禮刑賞四者萬世為治之大經不出於此先儒謂知人安民臯陶一篇之體要竊謂允廸厥徳又知人安民之本源也蓋允廸厥徳者實踐此徳於身也至若知人知之事安民仁之事則皆此徳之推行耳茍非實踐此徳於身則私欲盛而天理微知人之智何自而明安民之仁何自而行哉故曰允廸厥徳又知人安民之本源也動多靜少故地對天不過地無根附於天耳歐公本論由韓公明先王之道以道之一語以立意也韓子原道篇中欲治其心而外天下國家之語深中異端之病老釋二家皆務潔其身清其心棄絶倫理而不恤正韓子所謂欲治其心而外天下國家者也左右之言不可輕信必審其實僮僕姑取其給使令之役耳切不可聽其言恐大有害於事為政通下情為急集衆人之耳目為一己之耳目合仁義禮智信言之統體一太極分仁義禮智信言之各具一太極也凡詩文出於真情則工昔人所謂出於肺腑者是也如三百篇楚詞武侯出師表李令伯陳情表陶靖節詩韓文公祭兄子老成文歐陽公瀧岡阡表皆所謂出於肺腑者也故皆不求工而自工故凡作詩文皆以真情為主小學只一性字貫之立教者所以教此也明倫者所以明此也敬身者所以敬此也以言乎遠則不禦大而無外也以言乎近則靜而正小而無内也記曰君父之仇不共戴天只是天理人心自不能已而死生存亡非所計也如宋之高宗父兄宗族皆為金人所虜甚至辱及陵寢以大義言之只當以不共戴天為心而求所以必報其仇至於死生存亡非所當計也若區區為自全茍安之計則必不能伸大義於天下矣秦檜所以得售其講和姦謀者正以高宗自全茍安之心有以来之也嗚呼可恨哉湛然純一之謂齋肅然警惕之謂戒程子曰聖人以此洗心退藏於密以此齋戒以神明其徳夫韓文公元和聖徳詩終篇頌美之中多繼以規戒之詞深得古詩遺意愛民而民不親者皆愛之不至也書曰如保赤子誠能以保赤子之心愛民則民豈有不親者哉聖人為治純用徳而刑以輔之後人則純用法術而已不明理者㝠行而已一隂一陽之謂道即張子所謂隂陽兩端循環不已者立天地之大義繼之者善也成之者性也即張子所謂㳺氣紛擾㪚而成質者生人物之萬殊但易兼理氣言張子以氣言然器亦道也道亦器也是則言雖殊而其致一也參同契全是先天圖卦氣方位流行朱子所謂大易圖象隠者隱於此類可見萬物各具一理物物各具一太極也萬物同出於一原萬物統體一太極也勑天之歌正大小雅之權輿也五子之歌變風變雅之權輿也讀五子湯誓泰誓諸篇則知唐虞之盛為不可及矣風氣日降不可返矣今天地萬物人皆知之而所以為天地萬物則人莫得而知之也如欲知之是所謂誠歟道歟理歟命歟性歟帝歟神歟鬼歟太極歟其極一而已矣無所為而為者誠也有所為而為者偽也誠者不息偽者易輟克己之目動兼視聽言三者須㸔無物之先其理如何先儒梅根指太極姑舉一物而言耳如一草一木一人一事一塵一介安往而不可指太極哉畫出天地萬物理象數以示人者六十四卦也一生二就數上説太極生兩儀就理上説佘在黔中夢對衆儒士説書余謂之曰一字尚不能識既覺得此語遂中夜燭下書之天地之化無日不變因在黔中觀柑實初極青日漸至於黄色人之少而壯壯而老亦如此但變之漸而不覺耳以誠感人者人亦以誠應以詐御人者人亦以詐應木火土金水之質在我為肝心脾肺腎木火土金水之神在我為仁義禮智信之徳萬物備於我舉此亦可見至而伸之神反而歸之鬼天人一也天道屈伸兩端而已氣合精凝為神逰魂降魄為鬼鬼者一往而不復觀天地之化可見自頂以及踵皆天之所與但當順天而已一本萬殊萬殊一本之理開眼便見一物各具一太極之中又有統體各具者存焉如一人各具一太極也一人之身心又統體之太極也五臟百骸之理又各具之太極也一草一木各具一太極也一草一木之根榦又統體之太極也枝葉花果又各具之太極也萬物莫不皆然天下無無理之物無無物之理誠者統體之太極也元亨利貞各具之太極也元亨利貞春夏秋冬木火土金水仁義禮智信君臣父子夫婦長㓜朋友青黄赤白黑鹹苦酸辛甘天命人性五常四時五行五色是皆一隂陽也隂陽一太極也於春曰元於夏曰亨扵秋曰利於冬曰貞其命一也在父子曰仁在君臣曰義在長㓜曰禮在夫婦曰智在朋友曰信其性一也程子曰始比不以道隙於終者多矣故結交貴乎謹始宣徳六年十月七日夜余在辰夢從二程夫子逰小程夫子論朱文公大程夫子贊曰揚休山立之語不若中和獨立因記於此物惡太過自造化尚然況人事乎人之饗用當各量其分薄功而厚饗鮮不仆矣錦衣玉食古人謂惟辟可以有此以其功在天下而分所當然也世有一介之士得志一時即侈用無節甚至袒衣皆綾綺之類宜其顛覆之無日此余有目覩其事者可為貪侈之戒不欺君自不欺心始日載月魂載魄載乃加載之載朱子於楚辭辨之詳矣吾心誠志於學天其遂吾願乎正以處心㢘以律已忠以事君恭以事長信以接物寛以待下敬以處事居官之七要也謙以自牧安往而不善為吏不可一事茍且如文移之類皆當明白凡所為當下即求合理勿曰今日姑如此明日改之一事茍其餘無不茍矣未有逆理而能乆者間有之所謂枉之生也幸而免聖賢之言如蓍龜言吉則吉言凶則凶或不然者但有淹速耳時下通塞不足為欣戚要乆而後見人當自信定見明自信篤可以處大事衆曰然而有不然者衆曰不然而有然者惟理明者能知之婦人女子之言不可聽余見仕宦之人多有以是取敗者不可不以為戒忍所不能忍容所不能容惟識量過人者能之嘗過一獨木橋一步不敢慢惟恐蹉跌墜失人之處世每事能畏慎如此安有失者善惡分明有降祥降殃之報間有不然者非常理也河氷解者非自上消也由陽氣自下而上騰也故時至三陽之月則陽氣上達而河氷畢解矣上交諂者人多有此失蓋事上以恭為主恭之過則不覺有趨之之意是即所謂諂也舜好問而好察邇言人須體此舜清問於下民忘其勢而通下情也遇横逆之来當思古人所處有甚於此者則知自寛矣行有不得於外皆當反求諸己求諸己者無不盡善而猶或有不得者當安於命而已唐人詩曰足知造化力不及使君需吾有取焉理自不可冺所遇稍有識者皆能言天理但真知而篤信者少矣春秋於災異不言事應而事應具存見天人合一之理天命甚微聖人所罕言春秋多言之皆微其辭欲事之合理誠難但細微處一一能謹或少過舉矣凡事既濟則盛極而有悔故大象曰思患而豫防之寒中有一半陽暑中有一半隂此造化相攙接處故治不生於治而生於亂亂不生於亂而生於治康節曰思慮未發鬼神莫知不由乎我更由乎誰人能慎所發於將發則無悔矣以其能治不能以其賢治不賢設官之本意不過如此有假官威剥民以自奉者果何心哉一不容二邪正不兩立去弊當治其本本未治而徒去其末雖衆人之所暫快而賢知之所深慮觀野馬而知化機之無息㳺氣紛擾野馬是也禮人不答只當反其敬為人謀而不忠非仁也不為人之非笑而易其所守凡深藏者必重器而顯露者必賤物萬物皆氣機之所為人皆妄意於名位之顯榮而固有之善則無一念之及其不知類也甚矣不怨天不尤人此語當自勉人欲無涯不以禮節之莫知所極矣戲謔甚則氣蕩而心亦為所移不戲謔亦存心養氣之一端四月六陽全而隂已生隂非至此始生也蓋自三月五陽一隂之時而姤之初爻已兆於夬之下矣先儒謂陽亦然者正謂此耳名利闗誠實難過上蔡所謂能言如鸚鵡者真可畏也人能自信則富貴貧賤窮通有不能累矣人開口皆能談禮義論名節及見利必趨見勢必附又不知禮義名節為何物也恭而和處衆之道積誠而人不感者未之有也機事不密則害成易之大戒也即人言可以見所養之淺深知進退存亡而不失其正子房庶幾焉不為衆譽而加喜不為衆毁而加戚其過人遠矣紛華擾擾浮雲之過目耳君子窮以義達以義窮達皆天理也小人窮以利達以利窮達皆人欲也有鳯凰翔於千仞之氣象則不為區區聲利所動矣君子志於道小人志於利利與義之間不能容髮聽言觀行知人之良法君子浩然之氣不勝其大小人自滿之氣不勝其小道大無對故逰於聖人之門者難為言小知之人得用即用漫不知行其所無事以誠而感人者人亦以誠而應以術而馭人者人亦以術而待觀漢初君臣可見禮樂至於棄本尚末乃周衰之弊況末猶不得其正乎噫弊也乆矣聽言即可以知人之失如好色者開口即論女色好貨者開口即論貨財他皆類此至於匿情而言正者又當徐察其行可也世有聞人論道學不非笑之以為狂則憎惡之以為矯噫使學不學道則所學者果何事耶人知天地萬物為一體則薰然慈良惻怛之心有不覺而自發於中者靜能制動沉能制浮寛能制褊緩能制急貧而無怨難富而無驕易宜深體之富莫富於富有大莫大於無方拘於物者不足以語此惡流之濫而决其防未見其能止也一念之欲不能制而禍流於滔天友正直者日益友邪柔者日損醉於欲者汲汲如狂而心莫知所止矣為善勿怠去惡勿疑忠信積乆而後效見私欲盡而惻隱之心見熟於小知自私者不足以語大道滿腔子惻隠之心即藹然天地生物之心傲則仰慙則俯邪則欹正則平恭而不近於諛和而不至於流事上處衆之道被髮而祭於伊川興辛有之歎非知幾之君子孰能與于斯誠意孚于未言之前則言出而人信之氣機之運必無差爽但其理微而人自不察耳君父人之大倫只當竭誠敬盡所以事之之道其合與否有所不恤也茍慮其不合枉道以求之則所失者多矣交朋友事官長皆然蕭何廣市田宅以自汙猶王翦伐楚請美田宅甚衆之意漢初君臣以術相持此亦可見一縷之肉而萬蟻咂之一勺之水而萬魚吸之欲滿其欲可乎人有滿於得意而不覺形於色詞者則其所養可知矣作事快心必慎其悔蓋消息循環自然之理持之有道則雖亢而非滿矣心有毫髮所繫即不得其平天道甚可畏感於此則應於彼但有淹速不同耳揚子曰後而有如揚子雲者必好之矣某之自信亦然人之好諛非特言語為然也而文辭尤甚也素無實徳實才而悦人作文辭以諛已而作文辭者又極口稱譽之彼以諛求此以諛應文詞之弊孰有甚於此乎士無氣節則國勢奄奄以就盡西漢之季是也士之氣節全在上之人奬激則氣節盛茍樂軟熟之士而惡剛正之人則人務容身而氣節消矣事貴審處古人謂天下甚事不因忙後錯了真名言也高深遠近皆是天但以青而在上者為天衆人之見也患得患失之心推其極不仁之甚者也㢘而不公者只是人欲之私世之㢘者有三有見理明而不妄取者有尚名節而不茍取者有畏法律保禄位而不敢取者見理明而不妄取無所為而然上也尚名節而不茍取狷介之士其次也畏法律保禄位而不敢取則勉强而然斯又為次也操得其要則不待深懲重賞而人自化於㢘孔子曰茍子之不欲雖賞之不竊方圖圓圖横圖竒耦皆相對韓子曰澄其源而清其流統於一而應於萬可以形容道體人能𢎞道見氣强而理弱贈言以名位期人不若以徳業勉人先儒謂天包地外竊謂不但包乎地外實行乎地中是則上下内外皆天也吾意天地一終之時昏暗之極未必便得開明觀一日之暮可見但動靜之機未嘗息乆則漸次開明矣一時之末一日之暮一月之晦一嵗之暮一元之終皆氣化之息也但乆速之不同耳復為動之始乾為動之極姤為靜之始坤為靜之極靜極復動動極復靜循環無端非知道者孰能識之復之初爻自坤之初爻来姤之初爻自乾之初爻来隂陽互根此亦可見氣正則生人亦正氣偏則生人亦偏如古今世運可見左氏多有言過其實者昌黎所謂浮誇是也春秋時尚辭命而文過其實者多然亦可以觀世變矣左傳所論是非一一有吉凶成敗驗於後豈盡然乎天開於子山水之原皆在西北故坎艮居之左氏極有膚淺者只是理不明伯宗曰怙其雋才而不以茂徳滋益罪也此可以為後生輕俊者之戒君子語大而天下莫能載語小而天下莫能破須要真見得不能載不能破處左氏論敬處多亦是先王之教有未泯者大學之至善論語之一貫孟子之性善中庸之誠周子之太極言雖殊而其義一也聖賢垂世立教之意大要欲人復其性而已而後之學者讀聖賢之書但資以為詞章之用利禄之階而不知一言之切於身心聖賢垂世立教之意果何在哉楚辭載營魄之載與漢史從與載之載揚子載魄之載韓子畫記以孺子載之載皆加載之意朱子論之詳矣讀書之乆見得書上之理與自家身上之理一一契合方始有得處中庸一書皆性情之徳而所謂誠者即此徳之實也微而草木大而隂陽造化盛衰之理一也余所見誠有惻然不忍者非强然是所不能已也程子常書視民如傷四字於座側曰某於此有愧大賢尚然後之臨民者當何如哉人能心在腔子裏則百事可精所處之地雖靜而心飛颺於外亦不得靜也惟身在是而心亦在是則不擇地而靜矣一切外事與己本無干渉而與之擾擾俱馳是所以為心病也惟知止則心自定矣莊子人間世篇揣摩之術也有所自樂則不為外物所移見理明則遇事迎刃而解一毫省察之不至即處事失宜而悔吝隨之不可不慎處事當沉重詳細堅正不可輕浮忽畧故易多言利艱貞蓋艱貞則不敢輕忽而必以正所以吉也天道只是往復而已觀否泰剥復之類可見感應之理於先天圖見之隂陽迭勝無須臾止息太極動而生陽且從動處説起其實動自靜中來觀右半隂中之陽可見靜又自動中来觀左半陽中之隂可見程子所謂動靜無端隂陽無始張子所謂隂陽之精互蔵其宅者於是可見孟子之書齊梁諸國之君皆稱諡則成於後來弟子無疑易之為教大槩欲人敬慎雖吉事亦不敢易而為之如大壯乃陽壯之事占者吉亨不言可知而必曰利貞是即敬慎之意晝夜昏明居半天地開闢亦如之以元㑹運世觀之天地開闢各有一半昏明即如晝夜可見氣無涯而形有限故天大地小地於天中一毫毛耳以言乎遠則不禦以言乎邇則靜而正以言乎天地之間則備矣即鳶飛魚躍之意乾一而實故以質言而曰大坤二而虛故以量言而曰廣至哉言乎反身而誠最為難事反身而誠則實有諸己矣形而上者謂之道隠也形而下者謂之器費也形而上形而下道器元不相離舉目皆是曾子曰戰戰兢兢如臨深淵如履薄氷君子之守其身可不謹乎必使一言不妄發則庶乎寡過矣聖人言學易可以無大過此非設言也蓋必有己所獨得而人不及知者焉聖賢工夫步步著實如莊老之學儘説得只是不著實小人不知義理或名或利凡可以茍得者無不求之一故神兩故化近觀之人身遠觀之天地無不盡然無行可悔則徳進矣天下大慮惟下情不通為可慮昔人所謂下有危亡之勢而上不知是也聖賢以義制心得志與天下由之不得志獨行其道出處進退富貴貧賤視之如一初不少動其心小人則不然方血氣盛時據位持勢真若剛强不屈者及血氣既衰去位失勢悲感流涕卑屈茍賤之態靡所不至由無義以制心也珠藏澤自媚玉藴山含輝此涵養之至要鄭㳺吉九言曰無始亂無怙富無恃寵無違同無傲禮無驕能無復怒無謀非徳無犯非義竊謂九言之中無犯非義無傲禮二言足以盡蓋其餘范武子曰喜怒以類者鮮易者實多此名言也左傳曰思其終也思其復也思其反也蓋人能每事即始而慮終則必無悔吝之及矣詩三百篇天道人事無不備人只為耳目口鼻四肢百骸做得不是壞了仁義禮智信若耳目口鼻四肢百骸做得是便是仁義禮智信之性詩所謂有物有則孟子所謂踐形者是也程子曰文明則能燭理故能明大同之義剛健則能克己故能盡大同之道晉伯宗每朝其妻必戒曰盜憎主人民惡其上子好直言必及於難伯宗不能用後果為三郤譛而殺之正風未幾而變風繼之正大小雅未幾而變大小雅繼之否泰治亂之相尋理之必然也何足怪哉不忮不求可以為守身之法國風至於弼小雅至於鴻雁大雅至於民勞皆泰極而否隂陽相根之理微矣天地間無物無隂陽偶讀韻書其平聲者陽也側聲者隂也詩一經性情二字括盡闗雎之類言夫婦鹿鳴之類言君臣棠棣之類言兄弟蓼莪之類言父子黄鳥之類言朋友此詩於人倫之道無不備也不欺君不賣法不害民此作官持已之三要也讀正風正雅則心樂讀變風變雅則心不樂者好善惡惡之真情也為政當有張弛張而不弛則過於嚴弛而不張則流於廢一張一弛為政之中道也李景讓母鄭氏曰士不勤而禄猶災其身雖婦人之言亦可以為居官怠職者之戒一五行之疇於八疇無不包誠以五行一隂陽也隂陽一太極也太極本無極也天下之理豈有出於無極太極之外者哉其㫖深矣勢屈於匹夫義不勝也行有不得反之於己使行之是則得不得有命已何與焉使行之非即當改之不可執其非以求勝於人也或曰人有慢己者何以處之曰使己有可慢之事則彼得矣己無可慢之事則彼失矣失得在彼己何與焉此先儒之論重書以為警好勝人之大病富貴易至溺人可不謹哉節儉樸素人之美徳奢侈華麗人之大惡人有不謹者不可以己能病之人遇拂亂之事愈當動心忍性増益其所不能所行有窒碍處必思有以通之則智益明統天地萬物為一理所謂理一也在天有天之理在地有地之理在萬物有萬物之理所謂分殊也理一所以統乎分殊分殊所以行乎理一非有二也如人一身之理理一也四肢百骸各具之理分殊也理一統乎分殊之中分殊不在理一之外本然之性理一也氣質之性分殊也纔自有其能便為心累如顔子雖簞瓢陋巷不改其樂在顔子之心則未嘗自以樂為能也有此理則有此物及有物則理又在物中以不雜者言之謂之本然之性以不離者言之謂之氣質之性非有二也人莫不飲食也鮮能知味也人莫不有道也鮮識其真也造化非隂即陽人事非柔即剛動靜雖屬隂陽而所以能動靜者則太極之所為也如寂感雖屬人心而所以能寂感則性之所為也太極圖解下朱子語録論道器曰如這人身是器語言動作便是人之理竊謂此或記者之悞蓋人身與語言動作皆是器也人身語言動作之則乃理也若指人之語言動作為理則是認氣為道昧於形而上形而下之别矣故疑此言或記者之誤也萬物各受此理如衆水各受此日光但物之清者受此理則理亦明物之昏者受此理則理亦昏昏非理昏也由物之昏蔽之也如水之清者受此日光則光亦明水之濁者受此日光則光亦暗暗非光暗也水之濁以淆之也以是觀之則性本善而無惡可知其惡者皆氣質之拘也人於動處難得恰好纔動便有差所以發而中節為難也人皆有此理聖人與塗人同聖人有耳目鼻口之理塗人亦有耳目鼻口之理聖人有心肝脾肺腎之理塗人亦有心肝脾肺腎之理聖人有君臣父子夫婦長幼朋友之理塗人亦有君臣父子夫婦長幼朋友之理但聖人稟得氣質清粹故能全盡此理衆人稟得氣質昏駁有不能全盡耳將欲翕之必固張之將欲弱之必固强之將欲廢之必固興之將欲奪之必固與之是皆竊春夏之闢而為秋冬之闔程子所謂老子竊弄闢闔者以此乾始能以美利利天下不言所利大矣哉如堯舜利世之功大矣而其心則曷嘗自以為大哉使有一毫自大之心則與乾始利天下不言所利不同而非所以為堯舜矣人之一呼者太極動而陽也一吸者太極靜而隂也吸為呼之根呼為吸之根即隂陽之一動一靜而互為其根也以至一語一黙無不皆然則太極隂陽之妙又豈外於人之一身哉近海斥鹵而地氣亦薄故生物不暢茂觀山東海豐諸邑林木稍長即悴可見一理也得之為天得之為地得之為萬物道無聲之可聞無形之可見惟因夫形而下之器黙識夫形而上之理則謂之見道非若天地萬物真有形之可見也天不以隆冬大寒而息其生物之機緘人不以熟寢大寐而息其虛靈之知覺人心至為神明如来日將早作今夕雖熟寐之甚及至其期而自覺豈非心之神明乎人惟一心操之為君子放之為小人自古興亡治亂之幾皆由於心之存亡一念之差貽患生靈有不可勝言者如漢武只因欲得西域善馬甘心喪師不悔及貳師再舉西伐僅得善馬數十匹而還是以數十匹馬易萬人之命又且作歌被之聲樂誇耀祖宗其為不仁甚矣原其本只由一念之差耳如来旦將早作而中夜屢寐屢寤警愓不安者心之神明使然也滿眼皆實理而人不之信釋氏持一偏空説舉前古之人皆為所惑何哉身體髮膚受之父母不敢毁傷人之大孝也夫婦配偶所以承先世之重延悠遠之緒人之大倫也釋氏乃使人髠其髮絶其配不孝絶倫之罪大矣莊子曰泰宇定發乎天光言心定則明也聖人順天理而盡人倫釋氏逆天理而滅人倫雖上知不能無人心聖人所謂無欲者非若釋氏盡去根塵但人心之得其正者即道心以其不流於人欲之私所謂無欲也造化只是隂陽五行人道只是健順五常皆實理也知者鮮矣聖人一片實心種種道理皆從此出無有大於理氣者作聖作狂此心一轉移耳中庸引詩曰上天之載無聲無臭即無極而太極也莊子曰詩以道志書以道事易以道隂陽春秋以道名分先儒謂莊子是大秀才觀此可見張子曰一故神神即太極也或者謂太極不㑹動靜則神為無用之物矣豈所以為造化之樞紐品彚之根柢哉只一箇太極行乎隂陽五行男女萬物之間無所不在盆成括小有才而不知君子之大道適足以殺其身蓋人知大道則明於進退存亡吉凶消長之理必不至於輕率逞才妄為以取禍也視其色在目而知其色之理在心聴其聲在耳而知其聲之理在心食其味在口而知其味之理在心聞其香在鼻而知其香之理在心此心所以為一身之主宰也天人一理故致乖致和無不感通耳目口鼻各專一事而心則無不通耳順則聲入心通目明則物接理見莊子曰生物以息相吹息是人呼吸之息九萬里之氣亦是此息相吹則人之氣召和召災可知矣七竅鑿而混沌死七情熾而天理亡之譬也舉四海九州生民之氣無不和則自足以感隂陽之和舉四海九州生民之氣既乖則亦足以感隂陽之異此理之必然也固不可假公法以報私仇亦不可假公法以報私徳物各具五行之色如天地有五方土石有五色雲氣有五色之類是則萬物豈出於五行之外哉下民之寃不伸者由長人者之非其人也為官者切不可厭煩惡事茍視民之寃抑一切不理曰我務省事則民不得其死者多矣可不戒哉一命之士茍存心於愛物必有所濟蓋天下事莫非分所當為凡事茍可用力者無不盡心其間則民之受惠者多矣昔人謂律是八分書蓋律之條目莫非防範人欲扶翼天理故謂之八分書慎言謹行是脩已第一事人之所為不犯律條即為義犯之即為非義則律為八分書可見余一夕夢先人告余曰慈温良得非有所警乎心口如一為忠信心口不一非忠信也只四勿念之豈有差乎天下至貴者道得之則生失之則死為天下至貴不亦宜乎偶讀醫書有曰洗心日齊防患日戒吾有取焉乞墦之富貴恬不知恥可怪也夫責人當反求諸己釋氏本是自潔其身紛紛之言皆其徒附㑹之也道家者流如老子道徳經是也如符録科儀飛昇黄白之術皆後人附㑹為道家之事道徳經豈有是哉朱子於吾無隠乎爾章以作止語黙無非教也釋之蓋作與語屬陽動之發也止與黙屬隂靜之為也動靜隂陽曷莫非是道之著至於動而靜靜而復動循環無端則又道之至妙者也其示人之意豈不顯而可見哉曾㸃之鼔瑟希鏗爾舍瑟而作對曰異乎三子者之撰其動靜從容者此理也莫春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸者亦此理也是則人欲盡處天理流行隨處充滿無少欠缺安往而不然哉聖人一身動靜無非仁義禮智之徳充乎中而發乎外其示人可謂無隠矣認得為已何所不至此言當深翫味體認不虐無告不廢困窮聖人之仁也勿以小事而忽之大小必求合義法立而行則人不翫事合義雖大不懼不合義雖小當謹道有正有邪徳有凶有吉此韓子所謂道與徳為虛位也氣質之蔽最深民不可使知之是皆蔽之深不能有以開其識也如佛老之教分明非正理而舉世趨之雖先儒開示精切而猶不能祛其惑是皆氣質蔽之深也偶一事發不中節終夕不快命性道教只是一理臨屬官公事外不可泛及他事不仁者不可乆處約不可長處樂朱子釋之謂不仁之人失其本心乆約必濫乆樂必淫濫即為貧賤所移而更其節也淫即為富貴所淫而蕩其心也若貧賤不能移即仁者能乆處約矣富貴不能淫即仁者能長處樂矣孔孟之言互相發明如此讀書録卷七
