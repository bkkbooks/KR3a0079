body:
  text: 讀書録卷十明薛瑄撰在天為命在人為性一而二二而一者也理無空缺與人心之性渾合無間敬以直內之語自夫子始發之至程朱發明其義無餘蘊矣陽動之時太極在陽中隂靜之時太極在隂中以至天地萬物無所不在此理不雜乎氣亦不離乎氣也太極圗上一圈之中冲漠無朕而隂陽五行男女萬物之象已具所謂體用一源也隂陽五行男女萬物而太極之理隨在所謂顯微無間也程子曰以小人貪求不已之心移於進德則何善如之此即孟子所謂求有益於得者求在已者也董卓郿塢之金亦愚矣哉身行不義自斃而已其能有之乎治亂無不自微至大看復姤初爻可見惡由微以至大坤之初六可見尚義則道日長尚利則道日消天下治忽分焉朱子超然逺引當時小人方欲以利祿輕重之是何異鴟梟得腐鼠而嚇鵷鸞也滔滔趨利之勢不已必至於亂非聖賢孰能救之此孟子之書首言仁義以拔本塞源也人己一也浚人之脂膏以自肥何其不仁如是哉姤一隂生於下羣陽不能自立君子謹之夏月陽氣充盛萬物暢茂嘉美之㑹也春秋最重民力凡有興作小大必書聖人仁民之意深矣秦惡聞其過而亡漢好謀能聽而興豈非千古之永鑑天理本順而自逆之是故惡夫鑿者鳥知擇巢人不知擇所處可以人而不如鳥乎南宋之君大抵無剛明者雖朱子之賢不能用群姦得志終至僨國豈非後世之鑑昭烈孔明抑於史筆之不公至朱子綱目然後大義明於萬世朱子楚詞集注成於晚年所感者深矣元劉靖修不屑就其意微矣司馬公勸仁宗建儲一事可謂大忠忠臣事君視天下猶一家非為身謀也聖賢之言專務明理不尚文彩然理明字順自無不文常人之言專尚文彩理茍未明文亦何用萬物美惡精粗不齊者皆氣之為也耳目口鼻小體也皆能知聲色臭味心大體也反不能知義理是非惑莫大焉或問太虛程子曰亦無虛遂指虛曰皆是理安得謂之虛天下無實于理者朱子曰天下之理至虛之中有至實者存至無之中有至有者存夫理者寓於至有之中不可以目擊而指數也觀程朱之言可以知道矣萬事差錯只是是非顛倒人欲肆而羞惡之心亡矣人猶知論人之是非而已之是非則不知也吮癰䑛痔而得車多者小人之無恥也朱子曰程子言仁本末甚備今撮其要不過數言蓋曰仁者生之性也而愛其情也孝弟其用也公者所以體仁猶克己復禮為仁也學者於前之三言者可以識仁之名義於後一言可以知用力之方矣因默念一隂一陽之謂道繼之者善也成之者性也竊以繼成皆以氣言貼隂陽字說善性皆以理言貼道字說及撿陳北溪性理字義與鄙意合因志之朱子曰一隂一陽之謂道太極也繼之者善生生不已之意屬陽成之者性各正性命之意屬隂隂陽之外無一物繼善成性無須臾止息往年在湖南嘗行沅州北澗谷中霧雨蒸濕及登髙山絶頂則日光晴霽俯視沅州城郭及衆山之低小者雲氣浮繞往來其間駛如奔馬開闔萬變是時必雨於其下矣以是知雲氣最低方雲合而雨之時日在雲上未嘗不光霽也天最髙日月星辰次之雲氣最低凡雲氣皆在日月星辰之下以是知其最低也邵子曰乾四十八而四分之一分為所剋之隂也蓋自乾至泰乾夬大有大壯小畜需大畜泰凡八卦共四十八爻分作四分每分十二爻其三分三十六陽爻其一分十二隂爻也又曰坤四十八而四分之一分為所剋之陽也蓋自坤至否坤剝比觀豫晉萃否凡八卦共四十八爻分作四分每分十二爻其三分三十六隂爻其一分十二陽爻也忠如水之源恕如水之流一箇忠做出百千箇恕來一箇源流出百千道水來即忠恕而一貫之㫖明矣自然體立用行者聖人之忠恕也盡已推己者學者之忠恕也曾子言夫子之道忠恕而已矣非謂學者盡已為忠推已為恕也姑借忠以明一之體借恕以明貫之用故知盡已推已其施無窮則知一貫之理不盡矣中庸之忠恕乃學者盡已推已之正名即程子所謂動以人也論語之忠恕乃聖人自然之忠恕即程子所謂動以天也太極圗見天人合一之妙太史公言漢武帝譴死鈎弋夫人與凡有子之嬪御為能杜絶後來之女亂是則然矣亦非仁者之心也誠使家法嚴倫理明則後世之女亂非所憂也如文王之修身齊家以及天下欲使萬物皆得其所何至不仁如是乎張子曰鬼神者二氣之良能也良能是其自然能伸能屈之妙朱子曰鬼者隂之靈神者陽之靈靈即所謂良能也天地之開闔世運之興衰日月之往來晝夜之變化寒暑之推遷萬物之始終皆隂陽之氣屈伸消息為之主此鬼神所以體物而不可遺也海水是衆水之聚與山澤通氣有源之水不同嘗問海上居人海水味鹹其海中山島井泉之水却甘以是知海水與有源之水不同隂陽不在五行外太極亦豈在隂陽外所謂精粗本末無彼此也周子言男女而萬物在其中言萬物而男女在其內互文也魏公子無忌從車騎虛左迎侯生生直上載公子上坐此載字亦加載之意與老子屈子揚子載魄之載字同義聖賢之言皆平易易知後世儒者有作禪語以見於文辭者雖曰明理失平易之意矣陳平以金間楚即戰國之術有以釋老機巧之言解吾書者幾何而不陷於異端乎文武成康之治一變而為春秋再變而為戰國極矣朱子曰乾一而實故以質言而曰大地二而虛故以量言而曰廣程子易傳質慤精深廣大微妙朱子本義亦有不能出其外者程子之易主孔子但與本義不合人之為學當於性情上用功尤切知而不去為智雖知不能固守而去之焉得為智四方上下往來古今實理實氣無絲毫之空隙無一息之間斷西銘只是欲人存天理人物皆得天地之氣以成形所謂天地之塞吾其體皆得天地之理以成性所謂天地之帥吾其性體性人與物皆同所謂理一也然人得其氣之正而理亦全物得其氣之偏而理亦偏聖人尤得其氣之最清最秀者故性極其全與天地合德賢者禀其次乎聖人故其德出乎凡民皆分殊也致知力行惟在於實一有不實則不能造其極矣夫子四教忠信為文行之本思量萬事萬理不過一實為學不實無可據之地人之所為一有不實即為妄矣人而不實無一而可人於實之一字當念念不忘隨事隨處省察於言動居處應事接物之間必使一念一事皆出於實斯有進德之地千言萬語只在實因讀天地之塞吾其體之塞字益知上下四方氣之充塞無絲毫之空隙天地之塞吾其體得天地之氣以成形也天地之帥吾其性得天地之理以成性也踐形則能全天賦我之體盡性則能全天賦我之理知化窮神者樂天而能踐形盡性也無愧無忝者畏天而求踐形盡性也古語云天定能勝人人定亦能勝天如古者無道之世若秦若隋若武氏之流方其勢盛之時虐熖如烈火不可近此人定勝天也及其罪盈惡稔人怨天怒勦絶覆亡之無遺育此天定勝人也善惡之報豈不明甚信古語之不誣繼之者善化育之始流行而未已陽也成之者性人物禀受一定而不易隂也繼之者善就造化流行上說成之者性就人物禀受說萬物至大者皆有外惟理之大無外萬物至小者皆有內惟理之小無內天地萬物皆虛惟理最實隂陽五行男女萬物太極都在裏許朱子謂河圗之數不過一隂一陽一竒一偶以兩其五行而已蓋河圗一六水二七火三八木四九金五十土皆兩其五行也自其著者觀之則動靜不同時隂陽不同位而太極無不在焉所謂顯微無間也自其微者而觀之則冲漠無朕之中而動靜隂陽之理已具於其中矣所謂體用一源也理氣象數初不相離如乾之健理也其象天象也其所以為象者氣也氣之有次第節限者數也豫上九曰冥豫成有渝無咎復六三頻復厲無咎皆廣遷善之門也以五乘十二六十也以十二乘五亦六十也即參伍之義易曰憂悔吝者存乎介介即周子所謂幾善惡也朱子曰大概看易須謹守彖象之言聖人自解得極精密平易竊觀朱子解文王彖辭惟主孔子能艮其背便不獲其身行其庭不見其人孔子惡利口之覆邦家者千萬世國家亂亡皆由於此大人虎變未占有孚如成湯自其征伐之先已有傒蘇之望是未占有孚也朱子之易惟主卜筮與程子異其論亦有不出程傳之外者聖賢千言萬語只要人存天理去人欲天之道知也地之道仁也聖人與天地相似者知仁而已知周乎萬物者知也道濟乎天下者仁也樂天知命故不憂知也安土敦仁故能愛仁也天地之道不外乎仁智聖人之道亦不外乎仁智此聖人與天地合德也易曰一隂一陽之謂道繼之者善也成之者性也繼成以氣言從隂陽字來善性以理言從道字來程復心大學章句圗首畫太極圗中間著一氣字是以氣言太極周子無極而太極專以理言也程說曰太極未有象惟一氣耳是即漢儒異端之說又豈識所謂太極哉河圗之一竒一偶造化之一動一靜人之一呼一吸皆一隂陽也東漢之規模不如西漢者政以光武好吏事不如髙祖得人君之體也光武以䜟緯論學何以為出治之本隂陽無時不相勝隂退則陽勝隂陽退則隂勝陽一隂一陽相勝而不已也剝盡為坤陽生為復夬盡為乾隂生為姤聖人於陽曰復於隂曰姤扶陽抑隂之意也東漢黨錮諸君子正不知羣隂並長之時而欲力勝之難矣聖人之進退存亡與造化消息盈虛之理為一異乎漢末諸賢矣漢末諸賢先儒謂一變則至於道後漢賢者刻意尚行若不可及概以中庸之道則有不合者矣太極理也生物之本隂陽五行氣也生物之具男女萬物皆自此出而理氣則渾融無間也至大者道也聖人之門而道存焉游其門者難為言可知矣三代之後有漢世道之大降也地處天中而有盡天包地外而無窮三代聖人皆以道治天下漢髙不喜詩書至溺儒冠豈非世道之大降與漢髙有功於天下固大矣其修身無本治家無法以詐御臣下視禹湯文武為何如哉上下四方理氣充塞無窮盡無方體無一時一事而無理故當無一時一事而不習此學而時習之也今人特以執卷誦習為習此特習所知之一端耳又豈能盡時習之功哉時時皆道處處皆道事事皆道道不可離如此存養省察之功不可須臾或間也隂陽變易自人身以至天地萬物無時不然知此則知易矣人動作皆以天則無妄不以天則妄矣曾㸃見夫人欲盡處天理流行鳶飛魚躍之意蓍龜雖是卜筮之物聖人却未必用而神靈之理已具如武雖是殺人事聖人却存此神武而不殺不假卜筮而知吉凶所以說神武而不殺神武得其理而不假其物猶蓍龜得其神之理而不假卜筮也顔子問仁專言之仁朱子以心之全德釋之則仁義禮智之德無不包矣論語多專言之仁體用一源是隱而費顯微無間是費而隱程子曰豫所傳者辭也由辭以得其意則在人焉爾讀書之法皆當由辭以得意徒得其辭而不得其意章句文字之學也只是循天理便有序而和故仁者禮樂之本也實理皆在乎萬物萬事之間聖賢之書不過摸寫其理耳讀書而不知實理之所在徒滯於言辭之末夫何益之有大德敦化理一也小德川流分殊也維天之命於穆不已者理一也乾道變化各正性命者分殊也讀西銘理明而心廣統天地萬物言之一理也天地萬物各有一理分殊也就天言之天一理也而天之風雲雷雨之屬各有一理其分殊也就地言之地一理也而地之山川草木之類各有一理其分殊也就人一家言之一理也而人之父子夫婦長幼之類各有一理分殊也就人一身言之一理也而四肢百骸各有一理分殊也就一國天下言之莫不皆然就一草一木言之一理也而枝幹花葉之不同分殊也理一行乎分殊之中分殊不在理一之外一本萬殊萬殊一本也一以貫之即大德敦化小德川流即一理而分殊也天地間游塵紛擾無須臾止息無毫髮間斷是皆氣機使然觀日射窗屋之間可見因有詩曰日射屋山內烟華幾丈虹游塵從此見長滿太虛中為學第一工夫立心為本心存則讀書窮理躬行踐履皆自此進孟子曰學問之道無他求其放心而已程子曰聖賢千言萬語只是欲人將已放之心收之反入身來自能尋向上去皆此意也天地有動靜之復無善惡之復人有善惡之復有動靜之復聖人無復者以善惡而言也聖人之心渾然至善未嘗間斷故不見其復若動靜之復則亦有之趙宋立國規模不如漢者以封建之法不立無藩屏根柢之固故一遭變故蕩然不可維持也趙普自謂以半部論語佐太祖定天下蓋亦大言而已其實未見行論語一言也如伯夷叔齊求仁而得仁使趙普真知此理其肯定陳橋之策乎趙普克伐怨欲必行其功雖大而德或未也尹和靖謂動靜一理伊川曰試喻之適聞鐘響尹曰譬如未撞時聲固在也伊川喜曰且更涵養竊謂鐘未撞時聲固在即心未感時理已存隂未動時陽已具皆動靜一理也讀書録卷十
