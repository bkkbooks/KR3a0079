body:
  text: 讀書録卷六明薛瑄撰讀隂符經雜言并序伊川程子曰老子甚雜如隂符經却不雜然皆窺天道之未至者也間閲其書而録所得之語如左上篇經曰天道天行五賦天性人心一也天道者元亨利貞天行者春夏秋冬五賦者仁義禮智信天性者即天道天行五賦之德具於人心者也人心萃理氣之靈有作為運用之妙觀天道執天行見五賦而施行於天囊括宇宙而造化在我皆由此心而已故曰人心機也機之一字又隂符經之至要至要者歟天性人也人心機也立天之道以定人也總結上兩節而言機發太過而變怪見機發得宜而萬化定理欲之謂也性有巧拙以氣質之稟清濁而言清者巧而濁者拙巧者識其機而能伏藏拙者昧其機而不能伏藏能伏藏者九竅之邪不能動其中也不能伏藏者九竅之邪皆得以汩其天也九竅之中有三要耳目口是也巧者於三要動靜皆不失其宜而能伏藏拙者誠能變拙為巧而能致力於視聽言之間使皆一出於正則餘邪悉皆退聽而亦可以收伏藏之效矣火生於木禍發必剋姦生於國時動必潰機之過也知之修煉謂之聖人機之宜也中篇天生天殺道之理也隂陽生殺消息盈虧理之自然也天地萬物之盜萬物人之盜人萬物之盜三盜既宜人物乃安盜得其宜則生也殺也皆順其理而萬物安矣盜失其宜則生也殺也皆逆其理而萬物病矣食其時則百骸理人能利天地自然之利則一身得其養矣動其機則萬化安人能合天地自然之機則萬化得其宜矣人知其神之神者貴於耳而好聞其異也不知其不神之所以神者習於目而不察其理也程子所謂惡亦不可不謂之性者三盜之謂也聖功生神明出知化窮神之事也盜機在人而莫能見莫能知者蔽於氣稟之偏也君子善用之而逢昌小人不善用之而罹殃微矣深矣下篇瞽者善聽聾者善視絶利一源致一也用師十倍其效也三返晝夜致一之精也用師萬倍其效也心生於物物誘也心死於物物化也物化物誘其機皆在於目乾始能以美利利天下而不言所利天之無恩而大恩生也迅雷烈風莫不蠢然無恩之謂也主樂順理故其性廣大而有餘至淨無染故其性廉潔而無私生死恩害隂陽相根理之自然隂符經雜言終夫子曰人之生也直罔之生也幸而免君子之獲福宜也小人之獲福幸也六十四卦三百八十四爻惟貴乎時君子之處世亦曰時而已矣位與時學易者宜深體之理無窮而氣亦無窮但理無改變而氣有消息如溫熱涼寒氣也所以溫熱涼寒理也溫盡熱生熱盡涼生涼盡寒生寒盡溫復生循環不已氣有消息而理則常主消息而不與之消息也氣有聚散理無聚散於此又可見人有矜伐者亦勞矣無形皆是道有形皆是氣氣形而下者也道形而上者也人只於身內求道殊不知身外皆道渾合無間初無內外也不可將身外地面作虛空看蓋身外無非真實之理與身內之理渾合無間也程子所謂廓然而大公物來而順應正周子胸中灑落如光風霽月之氣象聖人之心應物即休元不少動聖人應物雖以此理應之其實理只在彼物上彼此元不移也外慕者內不足萬物各有定分已不得一毫侵預之未應不是先已應不是後造化亦然如此物未生時此理不是先此物已生時此理不是後一以貫之應事既以理依舊在此元不隨去聖人治人不是將自己道理分散與人只是物各付物知無極而太極者窮神之事也只主於敬才有卓立不然東倒西歪卒無可立之地薛子宴坐水亭忽鬱然而雲興滃然而雨集泠然而風生鏘然而蟲急羽者飛秀者植童者侍鱗者適羣物雜然而聲其聲形其色薛子窈然深思獨得其所以為是聲與色者而中心悅敬為百聖傳心之要凡見於書者尤詳程子發明其所以為敬之義精矣敬則卓然敬則光明才到理處便難言滯於言則愈蔽孔子曰天何言哉四時行焉百物生焉天何言哉天何言哉即無極之妙千古為學要法無過於敬敬則心有主而諸事可為人為外物所動者只是淺相業自大學經學中來者深自史學俗學中來者淺要見古人之相業伊傳之書宜熟讀後世非無救時之相只是淺相業有格心之學則其規模宏逺矣歷代世變固不可不考然當以明理為本春秋謹嚴不止於謹華夷之辨字字謹嚴句句謹嚴全篇謹嚴春秋意在言表春秋詞簡而旨微欲盡得聖人之心於千載之上難矣興師以正任帥得人吉之大者師卦辭最明興師擇將行賞用人之要備於師興師之義既正又得丈人為之主帥在我者先勝矣征伐其有不克乎才説理便無可言者理氣無縫隙故曰器亦道也道亦器也太極不可以動靜言然舍動靜便無太極理是天地萬物之極至處更復何言公則四通八達私則偏向一隅書終於秦誓殆聖人之微意歟書所載皆帝王經世之大法而終之以侯國之書豈非衰世之意邪孟子曰不下帶而道存焉舉目而皆物即物而道存陳司敗謂孔子有黨孔子曰丘也幸茍有過人必知之其氣象之大可想程子謂人天資有量者雖江海之大皆有滿唯聖人之量道也自無滿時近觀人素稱有量者不能不滿益信程子之言矣道大無窮盡無方體聖人體道無二其量無所不容又安有滿時邪此理真實無妄如天地日月風雲雨露草木昆蟲隂陽五行萬物萬事皆有常形定則旦古今而不易若非實理為之主則嵗改而月不同矣一理一切穿透又不黏帶其妙不可言觀人之法只觀含蓄則淺深可見人心公則如燭四方上下無所不照私則如燈只有一面光不能遍照也觀人之法聽言最先雖不能盡亦可得七八分人有才而露只是淺深則不露方為一事即欲人知淺之尤者淤泥塞流水人欲塞天理去其塞則沛然矣人當大著眼目則不為小小者所動如極品之貴舉俗之所歆重殊不知自有天地來若彼者多矣吾聞其人亦衆矣是又足動吾念邪惟仁義道德之君子雖願為之執鞭可也凝重之人德在此福亦在此當如是者即是理如春當溫夏當熱秋當涼冬當寒皆理也不如是則非理矣如父當慈子當孝君當仁臣當義夫婦當别朋友當信理也不如是則非理矣推之萬物莫不皆然堯舜之心萬古如見乾坤毁則無以見易天地毁則無以見聖人之心道學明而異論息程朱之功也本然氣質之性具見於太極圗天心豫本於吾心豫凡有形者皆氣無形者皆密內外合一無纎毫之間惟時惟幾聖人警戒之心曷嘗有頃刻毫髮間斷余直不欲妄笞一人前時妄笞人或終日不樂或連日不樂事少有處置不得其宜心即不快必皆得宜心乃快然而足萬物皆有精日月五星為隂陽之精聖賢為人之精金玉為石之精珠貝為水之精文木為木之精是皆得氣之清明秀異而成象成形者也成王問史佚曰何德而民親其上史佚曰使之以時而敬順之忠而愛之布令信而不食言如臨深淵如履薄氷此名言也知止則有定不知止則心不定理明則心定萬物各具一理萬理同出一原故一以貫之一以貫之只為理同天之生物一本故一以貫之聖人之心萬事之理絲毫無間故一以貫之一以貫之觀太極圗可見持已得一敬字接物得一謙字敬以持已謙以接人可以寡過矣愈收斂愈充拓愈細密愈廣大愈深妙愈髙明時然後言惟有德者能之一只是性天下無性外之物而性無不在一以心言貫以情言所謂心統性情者也順理則心悅豫不順理則心阻戚順理都無一事順理則泰然行之無所窒礙不順理則鑿矣理明後見天地萬物截然各安其分私欲盡而心體無量虛明廣大氣象到人欲淨盡處自見匪言所能喻也理明則心定萬事定所惡有甚於死者人皆有是心也觀小學所載夏侯令女盧氏竇氏二女之事皆婦人女子非素嫻於禮教者一旦臨利害之際寧就殘毁危迫糜軀之禍而不肯易其節非所惡有甚於死者能然乎字雖人制而其理實出於天如一而大為天二而小為地之類可見沖漠無朕之中萬象森然已具書其一也河圗數之始字畫之原水火二字分明乃坎離二卦順置之可見常使有已則不隨俗而變韓文公交友忠而不返於退面可以為百世之師矣舍而不求為忘求之太過為助長勿忘勿助長漢文帝嬖鄧通武帝嬖韓嫣哀帝嬖董賢男色之溺人也如此心定氣平而身體之委和舒泰不可言李牧守邊每丐奴入寇輒入保不戰如此數嵗一旦出兵大破丐奴威震漠北此正老子所謂大國以下小國則取小國以下大國則取大國又曰欲上民必以言下之欲先民必以身後之孫子所謂始如處女敵人開戶後如脫兔敵不及拒古人用兵之術大率類此顔子仰彌髙鑽彌堅在前在後皆指此理而言博文是明此理約禮是體此理欲罷不能是悅此理既竭吾才如有所立卓爾是目中了了見此理雖欲從之末由也已是不可熟此理理者何即天命之性具於聖人之心率性之道由於聖人之身者也大本者太極之全體達道者太極之流行太極之理中庸言之詳矣太極者理之别名非有二也太極即是理就太極上愈生議論去道愈逺統體各具之太極非有二也大德敦化萬物統體一太極也小德川流物物各具一太極也合仁義禮智言之是統體一太極分仁義禮智言之是各具一太極後學不知太極即是性因見其名異駭而不敢求其説大道隱矣四書通則太極之理不待講説而明矣孔子言太極是指理言周子言無極是指此理無形而言丙吉深厚不伐張安世謹慎周密皆可為人臣之法丙吉為相上寬大好禮讓不親小事時人以為知大體清而有容乃不自見其清清而不能容是自有其清而心反為其所纍矣以己之廉病人之貪取怨之道也廉而自忘其廉則人髙其行而服其德心者氣之靈而理之樞也道理浩浩無窮惟心足以管之萬化常然者理自如此蟲不得不鳴者理也吾思人有貴而自滿者所謂位不期驕也此不可不戒聖賢之文乃道之精華聖賢之文自道中流出如江河之有源而條理貫通後人不知道而有意為文猶斷港絶潢之無本雖強加疏鑿終亦不能貫通為一真無用之贅言也隂陽變易而理常存所謂恆也所以隂陽變易者固理之所為而理則一定而不易所謂恆也人之所從不可不慎觀諸卦爻或吉或凶多係於所從知賢而不知用知惡而不知退不若不知之為愈何也不知賢則人猶冀其能知而有進用之時不知惡則人猶冀其能知而有退逺之望若知賢而不知用則人知其必不能用矣知其惡而不知去則人知其必不能去矣是使賢者終無以行其志惡者愈得以肆其惡也漢元帝因京房之言知石顯之姦而卒不能逺所謂惡惡而不能去也聖賢學性理學其本衆人學詞章學其末所以為學者只為人固有之善或蔽於氣質物欲有時而失故須學以復之及其既復則本分之外不加毫末後人不知學其所固有而學文辭字畫之類求工求竒徒弊精神於無用其失逺矣三代之學皆所以明人倫也外此便是世俗之學孔子稱直哉史魚君子哉蘧伯玉二者君子必慎所取焉君子如玉反復觀之溫潤瑩徹無瑕史稱韓信知髙帝畏惡其能乃知髙帝欲去信之心久矣雖無陳豨之事殆必不免吕后殺韓信事竊意髙祖必有言史稱帝畏惡其能以畏惡之語觀之則知其欲去信之心必露於左右其討陳豨也空國逺征信留京師帝豈無防信之密謀乎但他人不知而吕后自知之故告變一上即用蕭何之計詐而斬之不然信以蓋世之功為國功臣后安得因一時之飛語不待奏報而遽殺之乎以是觀之則欲去信之心久而有密計也審矣凡有條理明白者皆謂之文非特語言詞章之謂也如天髙地下其分截然而不易山峙川流其理秩然而不紊此天地之文也日月星辰之照耀太虛雲物之斑布草木之花葉紋縷鳥獸之羽毛綵色金玉珠璣之精粹此又萬物之文也以至三綱五常之道古今昭然而不昧三千三百之禮小大粲然而有章此又人倫日用之文也至於衣服器用之有等級次第果蔬魚肉之有頓放行列此又萬事之文也推之天地之間凡有條理明粲者無往而非文又豈特見於文辭言語者然後謂之文哉愛流而為淫溺仁之過也物物各具一太極一而二也萬物統體一太極二而一也程子論恭敬曰聰明睿智皆由此出蓋人能恭敬則心肅容莊視明聽聰乃可以窮衆理之妙不敬則志氣昏逸四體放肆雖粗淺之事尚茫然而不能察况精微之事乎以是知居敬窮理二者不可偏廢而居敬又窮理之本也家人卦初九曰間有家悔亡九三曰家人嗃嗃悔厲吉上九曰有孚威如吉大率治家過嚴雖非中而吉莊子曰夫事其親者不擇地而安之孝之至也夫事其君不擇事而安之忠之盛也此言甚正先儒謂曹操之死於分香賣履細碎之事無不區處獨不言禪代之事乃其姦計此固也然觀孫權稱臣於操稱説天命之時操之羣臣因是勸曹即真操曰若天命在吾吾為周文王矣觀此一言已以文王自處是以武王待其子也禪代之計蓋昭然已露又豈臨死姦計所能掩哉聖賢之言如法律條貫循之則安悖之則危其有不然者幸不幸而已天地睽而其事同也男女睽而其志通也萬物睽而其事類也是皆物形雖異而理則同衆人見物形之異聖人明物理之同天下無二理古今無二道聖人無二心道體本深逺難言故詩曰維天之命於穆不已唐虞三代之治皆自聖人一心推之無非順天理因人心而立法也莊子曰通於一而萬事畢形容道體之言也論萬事皆當以三綱五常為本天地間至大者莫過於三綱五常之道帝王之為治聖賢之為學皆不外乎是觀史不可以成敗優劣人只當論其是非學者之所講明踐履仕者之所表倡推明皆當以三綱五常為本舍此則學非所學仕非所仕也三綱五常之道根於天命而具於人心歷萬世如一日循之則為順天理而治悖之則為逆天理而亂自堯舜三代歷唐漢以至宋上下數千年蓋可考其迹而驗其實也溫太真為劉琨奉檄將命江左其母崔固止之不能得至絶裾而行千載之下他人念其母之情者猶不覺感愴於心太真乃忍此而行其本心可謂死矣後雖有功惜乎不能掩其失也取人觀大節大節者何三綱五常之道是也孟子論陳仲子之事正謂大節既失小者無足觀也蓋人之大節莫過於倫理辟兄離母大節失矣區區小廉何足道哉古之智士料事多中如羊祜告晉武帝曰取吳不必臣行但既平之後當勞聖慮耳又曰若事了當有所付授願審其人正謂建儲一事也郭欽以降戶居內地非所宜不徙將有變故後來惠帝昏愚紀綱頽弛天下大亂皆如二子所料其可謂智士矣言敬莫詳於書但挈出其要以示學者則自宋儒始性外無道率性即道也學道固自聖賢之書而入茍徒玩心章句之間而不求實理之所在則亦無以有諸己矣理真實無名既曰理夫復何言只是人物之所以然者便是也三綱五常之道日用而不可須臾舍猶布帛菽粟不可一日而無也舍此他求則非所以為道矣人之邪正必謹於所習習與正人居則正習與不正人居則不正此前賢之至論萬世之明戒便辟側媚小童最能順人志意使人不覺傾向幾至心不能持自非明理剛特有守之君子鮮不為所移者以是知古人比頑童之訓其慮深矣意才有向便失其正不可不察挺特剛介之志常存則有以起偷惰而勝人欲一有頽靡不立之志則甘為小人流於卑汚之中而不能振拔矣自治之要寧過於剛不可過於柔顔子克己之功非至剛不能敬則立怠則廢莊敬日強安肆日偷之語宜深體玩蓋莊敬則志以帥氣卓然有立為善亹亹不倦而不知老之將至安肆則志氣昏惰柔懦無立玩愒嵗月悠悠無成矣古人衣冠偉博皆所以莊其外而肅其內後人服一切簡便短窄之衣起居動靜惟務安適外無所嚴內無所肅鮮不習而為輕佻浮薄者孟子曰以力假仁者霸以德行仁者王論王霸之分莫切於此守約者為學之至要守約則無事矣守約者心自定知言者書無不通理無不明之謂所博者是則自得其要所博者非則不能守約矣約者要也博而約一以貫之守約則能泛應學至於約則有得矣道是總體義是支節道如水之源義則流而為支𣲖者也分而言之則二合而言之則一所謂體用一源也人心寬平則光明狹險則幽暗光明者君子幽暗者小人天道人倫渾合無間有我之私極難克貴乎明與剛而已螻蟻之微或誤戕之即瞿然心動乃知惻隱之端非由外鑠也行有不得皆當反之於己中庸所求乎子以事父未能之類大抵人之責人常重自責常輕故當以責人者責已待人當寬而有節處已接物事上使下皆當以敬為主卦之六爻皆隂陽自然之數如一年有十二月自十一月一陽生至四月六陽滿五月一隂生至十月六隂滿十一月又一陽生如日有十二時子時一陽生至已時六陽滿午時一隂生至亥時六隂滿子時又陽生大而一年小而一日之運六爻無不包括故六爻添一爻亦不成造化減一爻亦不成造化是皆隂陽自然之數聖人不過因而畫之耳卦六畫之上固可倍之以至無窮要不若六畫彌綸天地之化約而盡聖人治天下公而已公王道私霸道王者所存所行皆天理之公霸者則假天理之名以濟己私耳漢治分明是霸如髙帝為義帝發喪乃其一端漢初諸將如英布韓彭猶悍馬􅡟虎常有跋扈屈強之氣非髙祖莫能御也漢祖御將之術皆以詐而不以誠知一人之性十人之性百人之性千萬億人之性無不同也知一物之性十物之性百物之性千萬億物之性無不同也知人物古今之性無不同則心之全體大用無不該貫初無限量之可言矣漢初猶是戰國之餘習觀其人才可見周勃遣使迎文帝於代或曰諸將皆習詐用兵此類可見在物曰性在天曰天天也性也一源也故知性則知天矣理無窮故聖人立言亦無窮孔子因道不行於當時不得已而刪述六經垂法萬世後之儒者乃有意於續經著書其立心固不同矣夫子之心萬世如見漢初之將桀驁中興之將循謹夫子之道德匪言語所能盡太極本只是天地萬物自然之理不外乎人倫日用之間學者因見其立名之髙欲以玄逺求之誤矣接物大宜含宏如行曠野而有展步之地不然太狹而無以自容矣人只見已然而不見未然已然者其形也未然者其幾也欲有水意故窒欲如止水人實不易知更須慎其儀杜詩之近理者也氣化真實是一往而遂盡其來者乃方生之氣自十一月一陽生而為復至四月換盡六隂而為純陽之乾則已往之隂遂盡而方來之隂已生至五月成一隂而為姤至十月換盡六陽而為純隂之坤則已往之陽遂盡而方來之陽已生至十一月成一陽而又為復以是見天地之氣往者遂消而向盡來者方息而無窮初非已往之氣又為方來之氣也程子以是辨釋氏之誕信矣鼎九二鼎有實我仇有疾不我能即吉初六以非正求二二以剛中自守不與之合所以吉也君子能剛正自守不為小人甘媚而遂與之合亦猶是矣太極圗説不過反覆推明隂陽五行之理健順五常之性蓋天人合一之道也太極圗動而生陽是從動處説起動却自靜中來靜又自動中來直是動靜無端隂陽無始孟子之言光明俊偉如答景春大丈夫章讀之再三直使人有壁立萬仞氣象如濯江漢而暴秋陽也快哉快哉作事只是求心安而自然須理明則知其可安者安之理有未明則以不當安者為安矣陽居陽位隂居隂位為正二五為中程子曰諸卦二五雖不當位多以中為美三四雖當位或以不中為過中常重於正也震來􅊒􅊒笑言啞啞以安失之者衆矣嚴恭寅畏天命自度不敢荒寧乃無逸一書之要萬起萬滅而本體湛然有常者其心之謂歟沈靜詳密者能立事浮躁忽略者反此書稱舜濬哲文明蓋人深則明淺則暗盛之極者衰之始天遇風也消之極者息之端地逢雷也一盛一衰一消一息氣化之自然也惟精所以知之惟一所以行之精一是工夫允執厥中是功效六爻之吉凶惟觀其所值之時位而已孟子論王政大要不出乎教養二端程子謂善固性也惡亦不可不謂之性也疑其自太極圗説中來圗説曰五性感動而善惡分謂之分則二者皆自性中來但順則為善不順則為惡耳書雖古而道常新天下無獨必有對河圗水與火對金與木對天與地對先天圗皆竒與偶對推之萬事萬物吉凶是非君子小人夷狄中國無無對者只是一隂一陽而已不可以方所求不可以隱顯分忮心一生而天地否良心一發而天地泰心本寬大無邊一有已私則不勝其小矣秦誓如有一箇臣斷斷猗至實能容之此非幾於無我者不能也性理之書日益多亦理之自然也蓋理無窮盡故聖賢之書亦無窮盡雖先聖賢發揮此理極其詳盡及後聖賢有作亦必有繼往開來垂世立教之書焉是皆理之自然不能已也天地不以萬物已生而不生聖賢不以往哲已言而不言聖賢之書所以然者密也理無所不有如天地之初都無一物只有此理而天地萬物自能生假使後世天地萬物一時俱盡而此理既常存又自能生萬物可謂萬物必待有種而後能生乎天地之道只是消息盈虛而已非明則動無所之非動則明無所用知行不可偏廢也人臣得行其志全在有應茍無應雖聖賢亦末如之何也已程子易傳有無窮之義理知者鮮矣率性之謂道所惡於知者為其鑿也凡卦上三爻應下三爻下三爻應上三爻巽卦一隂伏於二陽之下巽而能入也人之思索義理亦必柔巽其志乃能入若性氣粗暴者決不能有入矣兌九五孚於剝有厲君子不可以小人假善悅己而信之若信之適墮其計中乃危道也君子所貴乎知言如中庸大學皆聖賢之微言大訓雜於禮記中經千百年儒者莫能識由不知言故也至程子乃始表章之遂為萬世道學之正傳非知言者其能然乎夫子以孔文子敏而好學不恥下問為文取其微善而不及其顯惡聖人道大德宏此亦可見自後人言之必以其人為不足道而并沒其微善矣凡有形於天地之間者皆謂之文古人佩韋佩弦亦變化氣質之一法也如一字有一理即是一太極喜怒哀懼愛惡欲七情總之為好惡二端而已喜哀愛欲四者屬好怒懼屬惡聖人之忠厚不可勝言如以微罪去魯不顯其君之過真天地之量也此可以觀聖人之氣象矣孟子去齊終不言齊王之失其亦學孔者歟聖人言人過處皆優柔不迫含蓄不露此可以觀聖人之氣象或人譏夫子言甚峻夫子曰是禮也言甚和子曰事君盡禮人以為諂也只平説不見有人我之間若曰我事君盡禮即彼此相形而非無我之氣象矣孔子微罪去魯之心非孟子莫能知餘事量力所及而已非可必也惟讀書一事乃吾之本心所得肆力其間而莫余止者也韓子吾老嗜讀書餘事不挂眼之句實獲我心焉讀書録卷六
